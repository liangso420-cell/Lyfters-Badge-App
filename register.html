<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — Lyfter Badge App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { primary: '#6C63FF', 'primary-soft': '#EEEDFF', base: '#F8F9FA' },
          borderRadius: { card: '16px', btn: '8px' },
          boxShadow: { soft: '0 4px 20px rgba(0,0,0,0.08)' },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U = window.LyfterUtils;

      var user = API.currentUser();
      if (user) { window.location.replace(user.role === 'admin' ? 'admin-event.html' : 'profile.html'); return; }

      var app = document.getElementById('app');

      app.innerHTML =
        '<section class="device-frame px-4 pt-12 pb-12">' +
          '<div class="card-soft p-8 anim-fade">' +
            '<div class="text-center mb-6">' +
              '<div class="text-4xl mb-2">🏆</div>' +
              '<h2 class="text-2xl font-bold">Crear cuenta</h2>' +
              '<p class="text-gray-400 text-sm mt-1">Únete y empieza a coleccionar badges</p>' +
            '</div>' +
            '<form id="register-form" class="space-y-4" novalidate>' +
              U.inputField({ label: 'Nombre completo', name: 'name', placeholder: 'Ana Pérez' }) +
              U.inputField({ label: 'Email', type: 'email', name: 'email', placeholder: 'tu@correo.com' }) +
              U.inputField({ label: 'Contraseña', type: 'password', name: 'password', placeholder: '••••••••' }) +
              U.inputField({ label: 'Confirmar contraseña', type: 'password', name: 'confirm', placeholder: '••••••••' }) +
              U.primaryButton('Crear cuenta', 'type="submit"') +
              '<div class="divider text-gray-400 text-xs my-2">o continúa con</div>' +
              '<button type="button" id="btn-google" ' +
                'class="btn w-full border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 font-medium gap-2 normal-case">' +
                '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google" />' +
                'Continuar con Google' +
              '</button>' +
              '<p class="text-center text-sm text-gray-500">¿Ya tienes cuenta? <a href="login.html" class="text-primary font-medium">Inicia sesión</a></p>' +
            '</form>' +
          '</div>' +
        '</section>';

      var TAGS = ['Desarrollo Web','Mobile','Inteligencia Artificial','Data Science','Ciberseguridad',
        'DevOps','Cloud','Blockchain','UX/UI','Product Management','Emprendimiento','Marketing Digital',
        'Diseño','Videojuegos','Robótica','Fintech','Educación Tech','Open Source','Backend','Frontend'];

      function showInterestsStep() {
        var selected = [];
        app.innerHTML =
          '<section class="device-frame px-4 pt-12 pb-12">' +
            '<div class="card-soft p-8 anim-fade">' +
              '<div class="text-center mb-6">' +
                '<div class="text-4xl mb-2">🎯</div>' +
                '<h2 class="text-xl font-bold">¿Cuáles son tus intereses?</h2>' +
                '<p class="text-gray-400 text-sm mt-1">Selecciona los temas que te interesan para recibir recomendaciones personalizadas</p>' +
              '</div>' +
              '<div id="tags-container" class="flex flex-wrap gap-2 mb-6">' +
                TAGS.map(function(tag) {
                  return '<button type="button" data-tag="' + U.esc(tag) + '" class="tag-btn px-3 py-1.5 rounded-full text-sm border border-gray-200 text-gray-600 hover:border-primary hover:text-primary transition">' + U.esc(tag) + '</button>';
                }).join('') +
              '</div>' +
              '<button id="save-interests" class="w-full py-3 rounded-btn text-white font-semibold mb-3" style="background:#6C63FF;">Guardar y continuar</button>' +
              '<button id="skip-interests" class="w-full py-2 text-sm text-gray-400 hover:text-primary">Omitir por ahora</button>' +
            '</div>' +
          '</section>';

        Array.prototype.forEach.call(document.querySelectorAll('.tag-btn'), function(btn) {
          btn.addEventListener('click', function() {
            var tag = btn.getAttribute('data-tag');
            var idx = selected.indexOf(tag);
            if (idx === -1) {
              selected.push(tag);
              btn.style.background = '#6C63FF';
              btn.style.color = 'white';
              btn.style.borderColor = '#6C63FF';
            } else {
              selected.splice(idx, 1);
              btn.style.background = '';
              btn.style.color = '';
              btn.style.borderColor = '';
            }
          });
        });

        async function saveAndContinue() {
          try {
            if (selected.length) await API.updateInterests(selected);
          } catch(e) {}
          U.toastNextPage('¡Cuenta creada! 🎉', 'success');
          window.location.href = 'profile.html';
        }

        document.getElementById('save-interests').addEventListener('click', saveAndContinue);
        document.getElementById('skip-interests').addEventListener('click', saveAndContinue);
      }

      var form = document.getElementById('register-form');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var name = form.elements['name'], email = form.email, pass = form.password, confirm = form.confirm, ok = true;
        ok = U.setFieldError(name,    name.value.trim() ? '' : 'Ingresa tu nombre') && ok;
        ok = U.setFieldError(email,   U.EMAIL_RE.test(email.value.trim()) ? '' : 'Email no válido') && ok;
        ok = U.setFieldError(pass,    pass.value.length >= 6 ? '' : 'Mínimo 6 caracteres') && ok;
        ok = U.setFieldError(confirm, (confirm.value === pass.value && confirm.value) ? '' : 'Las contraseñas no coinciden') && ok;
        if (!ok) return;
        var btn = form.querySelector('[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Cargando...';
        try {
          var newUser = await API.register({ name: name.value.trim(), email: email.value.trim(), password: pass.value });
          if (newUser.role !== 'admin') {
            showInterestsStep();
          } else {
            window.location.href = 'admin-event.html';
          }
        } catch (err) {
          U.setFieldError(email, err.message || 'No se pudo crear la cuenta');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Crear cuenta';
        }
      });

      // ── Registro/Login con Google (Firebase) ─────
      // Google hace login y registro al mismo tiempo: si el usuario no existe,
      // el backend lo crea automáticamente.
      if (!firebase.apps.length) {
        firebase.initializeApp(window.FIREBASE_CONFIG);
      }
      var firebaseAuth = firebase.auth();

      document.getElementById('btn-google').addEventListener('click', async function () {
        var btn = this;
        btn.disabled = true;
        btn.textContent = 'Conectando...';
        try {
          var provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          var result = await firebaseAuth.signInWithPopup(provider);
          var idToken = await result.user.getIdToken();
          var loggedUser = await API.loginWithGoogle({
            idToken: idToken,
            email:   result.user.email,
            name:    result.user.displayName,
            photo:   result.user.photoURL
          });
          if (loggedUser.role !== 'admin') {
            showInterestsStep();
          } else {
            window.location.href = 'admin-event.html';
          }
        } catch (err) {
          var mensajes = {
            'auth/popup-closed-by-user':    'Cerraste la ventana antes de completar el inicio.',
            'auth/cancelled-popup-request': 'Solo puede haber una ventana activa.',
            'auth/network-request-failed':  'Error de red. Revisa tu conexión.'
          };
          U.toast(mensajes[err.code] || err.message || 'No se pudo iniciar con Google', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google" /> Continuar con Google';
        }
      });
    })();
  </script>
</body>
</html>
