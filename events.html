<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorar eventos — Lyfter Badge App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { primary: '#6C63FF', 'primary-soft': '#EEEDFF', base: '#F8F9FA' },
          borderRadius: { card: '16px', btn: '8px' },
          boxShadow: { soft: '0 4px 20px rgba(0,0,0,0.08)' },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function() {
      'use strict';
      var API = window.LyfterAPI;
      var U = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html'); return; }
      if (user.role === 'admin') { window.location.replace('admin-event.html'); return; }

      var app = document.getElementById('app');
      app.innerHTML = U.loadingHtml();

      function fmtDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' }); }
        catch(e) { return ''; }
      }

      var STATUS_LABELS = {
        upcoming:  { label: 'Próximo',           color: '#3b82f6' },
        open:      { label: 'Abierto',           color: '#16a34a' },
        ongoing:   { label: 'En curso',          color: '#6C63FF' },
        closed:    { label: 'Registro cerrado',  color: '#d97706' },
        postponed: { label: 'Pospuesto',         color: '#9333ea' },
      };

      function eventCard(e, isRecommended) {
        var photoHtml = e.photo
          ? '<img src="' + U.esc(e.photo) + '" class="w-full h-40 object-cover" />'
          : '<div class="w-full h-40 bg-primary-soft flex items-center justify-center text-5xl">🎪</div>';
        var tags = (e.tags || []).slice(0, 3).map(function(t) {
          return '<span class="px-2 py-0.5 rounded-full text-xs bg-white/20 text-white">' + U.esc(t) + '</span>';
        }).join('');
        var badge = isRecommended
          ? '<span class="absolute top-3 left-3 px-2 py-1 rounded-full text-xs font-semibold text-white" style="background:#6C63FF;">✨ Recomendado</span>'
          : '';
        var statusInfo = STATUS_LABELS[e.status];
        var statusBadge = statusInfo
          ? '<span class="absolute top-3 right-3 px-2 py-1 rounded-full text-xs font-semibold text-white" style="background:' + statusInfo.color + ';">' + statusInfo.label + '</span>'
          : '';
        return '<div class="bg-white rounded-card overflow-hidden shadow-soft cursor-pointer hover:shadow-md transition" data-eid="' + e.id + '">' +
          '<div class="relative">' +
            photoHtml +
            '<div class="absolute inset-0 flex flex-col justify-end p-3" style="background:linear-gradient(transparent,rgba(0,0,0,0.6));">' +
              '<p class="text-white font-bold text-sm truncate">' + U.esc(e.name) + '</p>' +
              '<div class="flex gap-1 flex-wrap mt-1">' + tags + '</div>' +
            '</div>' +
            badge +
            statusBadge +
          '</div>' +
          '<div class="p-4">' +
            '<p class="text-xs text-gray-400 mb-1">📅 ' + fmtDate(e.start) + ' — ' + fmtDate(e.end) + '</p>' +
            (e.prize ? '<p class="text-xs text-gray-500">🎁 ' + U.esc(e.prize) + '</p>' : '') +
          '</div>' +
        '</div>';
      }

      function showEventModal(e) {
        var modalRoot = document.getElementById('modal-root') || document.body;
        if (!document.getElementById('modal-root')) {
          var mr = document.createElement('div');
          mr.id = 'modal-root';
          document.body.appendChild(mr);
          modalRoot = mr;
        }
        var photoHtml = e.photo
          ? '<img src="' + U.esc(e.photo) + '" class="w-full h-48 object-cover rounded-t-card" />'
          : '<div class="w-full h-32 bg-primary-soft flex items-center justify-center text-5xl rounded-t-card">🎪</div>';
        var tags = (e.tags || []).map(function(t) {
          return '<span class="px-2 py-1 rounded-full text-xs border border-primary text-primary">' + U.esc(t) + '</span>';
        }).join('');
        var statusInfo = STATUS_LABELS[e.status];

        modalRoot.innerHTML =
          '<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6 anim-fade" style="background:rgba(17,24,39,0.75);" id="event-modal-overlay">' +
            '<div class="bg-white w-full sm:max-w-md rounded-t-card sm:rounded-card overflow-hidden shadow-soft anim-pop">' +
              photoHtml +
              '<div class="p-5">' +
                '<div class="flex items-start justify-between mb-2">' +
                  '<h2 class="text-lg font-bold text-gray-800 flex-1">' + U.esc(e.name) + '</h2>' +
                  (statusInfo ? '<span class="ml-2 px-2 py-1 rounded-full text-xs font-semibold text-white flex-shrink-0" style="background:' + statusInfo.color + ';">' + statusInfo.label + '</span>' : '') +
                '</div>' +
                (e.description ? '<p class="text-sm text-gray-500 mb-3">' + U.esc(e.description) + '</p>' : '') +
                '<div class="space-y-2 mb-4">' +
                  '<p class="text-xs text-gray-500 flex items-center gap-2">📅 ' + fmtDate(e.start) + ' — ' + fmtDate(e.end) + '</p>' +
                  (e.location ? '<p class="text-xs text-gray-500 flex items-center gap-2">📍 ' + U.esc(e.location) + '</p>' : '') +
                  (e.prize ? '<p class="text-xs text-gray-500 flex items-center gap-2">🎁 ' + U.esc(e.prize) + '</p>' : '') +
                '</div>' +
                (tags ? '<div class="flex flex-wrap gap-2 mb-4">' + tags + '</div>' : '') +
                '<div class="p-3 rounded-card mb-4" style="background:#EEEDFF;">' +
                  '<p class="text-xs text-primary font-semibold">🔑 ¿Cómo participar?</p>' +
                  '<p class="text-xs text-gray-600 mt-1">Escanea el QR del evento para unirte y empezar a coleccionar badges.</p>' +
                '</div>' +
                '<button id="modal-close" class="w-full py-2.5 rounded-btn border border-gray-200 text-sm font-medium text-gray-600">Cerrar</button>' +
              '</div>' +
            '</div>' +
          '</div>';

        document.getElementById('modal-close').addEventListener('click', function() { modalRoot.innerHTML = ''; });
        document.getElementById('event-modal-overlay').addEventListener('click', function(ev) {
          if (ev.target === this) modalRoot.innerHTML = '';
        });
      }

      async function init() {
        try {
          var allEvents, recommended;
          var results = await Promise.all([
            API.listEvents(),
            API.getRecommended().catch(function() { return []; })
          ]);
          allEvents = results[0];
          recommended = results[1];

          var recommendedIds = recommended.map(function(e) { return e.id; });
          var otherEvents = allEvents.filter(function(e) { return recommendedIds.indexOf(e.id) === -1; });

          var recommendedSection = recommended.length
            ? '<div class="mb-8">' +
                '<h2 class="text-lg font-bold text-gray-800 mb-4">✨ Recomendados para ti</h2>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                  recommended.map(function(e) { return eventCard(e, true); }).join('') +
                '</div>' +
              '</div>'
            : '';

          var allSection = otherEvents.length
            ? '<div>' +
                '<h2 class="text-lg font-bold text-gray-800 mb-4">🎪 Todos los eventos</h2>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                  otherEvents.map(function(e) { return eventCard(e, false); }).join('') +
                '</div>' +
              '</div>'
            : '';

          var emptyHtml = (!recommended.length && !otherEvents.length)
            ? '<div class="text-center py-16 text-gray-400">' +
                '<div class="text-5xl mb-4">🎪</div>' +
                '<p class="text-sm">No hay eventos disponibles por ahora.</p>' +
              '</div>'
            : '';

          app.innerHTML =
            '<div class="max-w-2xl mx-auto px-4 py-6 pb-28">' +
              '<div class="flex items-center gap-3 mb-6">' +
                '<button id="back-btn" class="w-9 h-9 rounded-full bg-white shadow-soft flex items-center justify-center text-gray-600 hover:bg-gray-50">←</button>' +
                '<h1 class="text-xl font-bold text-gray-800">Explorar eventos</h1>' +
              '</div>' +
              recommendedSection +
              allSection +
              emptyHtml +
            '</div>' +
            '<div class="fixed bottom-0 left-0 right-0 flex justify-center pb-6 pointer-events-none z-30">' +
              '<button id="fab-scan" class="pointer-events-auto px-7 py-4 rounded-full text-white font-semibold shadow-soft flex items-center gap-2 active:scale-95 transition" ' +
                'style="background:#6C63FF; box-shadow:0 4px 24px rgba(108,99,255,0.5);">📷 Escanear QR</button>' +
            '</div>';
          Array.prototype.forEach.call(document.querySelectorAll('p, h1, h2, h3, h4, button, label, span'), function(el) {
            if (el.children.length === 0 && el.textContent.trim()) { el.setAttribute('data-i18n', el.textContent.trim()); }
          });
          U.applyStoredLang();

          document.getElementById('back-btn').addEventListener('click', function() { window.location.href = 'profile.html'; });
          document.getElementById('fab-scan').addEventListener('click', function() { window.location.href = 'scan.html'; });

          Array.prototype.forEach.call(document.querySelectorAll('[data-eid]'), function(card) {
            card.addEventListener('click', function() {
              var eid = card.getAttribute('data-eid');
              var eventData = allEvents.concat(recommended).find(function(e) { return e.id === eid; });
              if (!eventData) return;
              showEventModal(eventData);
            });
          });

        } catch(err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
      }

      init();
    })();
  </script>
</body>
</html>
