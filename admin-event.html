<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos — Lyfter Badge App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { primary: '#6C63FF', 'primary-soft': '#EEEDFF', base: '#F8F9FA' },
          borderRadius: { card: '16px', btn: '8px' },
          boxShadow: { soft: '0 4px 20px rgba(0,0,0,0.08)' },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function () {
      'use strict';
      var TAGS_LIST = ['Desarrollo Web','Mobile','Inteligencia Artificial','Data Science','Ciberseguridad','DevOps','Cloud','Blockchain','UX/UI','Product Management','Emprendimiento','Marketing Digital','Diseño','Videojuegos','Robótica','Fintech','Educación Tech','Open Source','Backend','Frontend'];
      var STATUS_MAP = {
        draft:     { label: 'Borrador',             color: 'text-gray-500 border-gray-300',    bg: 'bg-gray-50' },
        pending:   { label: 'Pendiente aprobación', color: 'text-yellow-600 border-yellow-300', bg: 'bg-yellow-50' },
        upcoming:  { label: 'Próximo',              color: 'text-blue-600 border-blue-300',    bg: 'bg-blue-50' },
        open:      { label: 'Abierto registro',     color: 'text-green-600 border-green-300',  bg: 'bg-green-50' },
        closed:    { label: 'Registro cerrado',     color: 'text-orange-600 border-orange-300', bg: 'bg-orange-50' },
        ongoing:   { label: 'En curso',             color: 'text-primary border-primary',      bg: 'bg-primary-soft' },
        paused:    { label: 'Pausado',              color: 'text-gray-500 border-gray-300',    bg: 'bg-gray-50' },
        finished:  { label: 'Finalizado',           color: 'text-gray-600 border-gray-300',    bg: 'bg-gray-100' },
        cancelled: { label: 'Cancelado',            color: 'text-red-500 border-red-300',      bg: 'bg-red-50' },
        postponed: { label: 'Pospuesto',            color: 'text-purple-600 border-purple-300', bg: 'bg-purple-50' },
        archived:  { label: 'Archivado',            color: 'text-gray-400 border-gray-200',    bg: 'bg-gray-50' },
      };
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html'); return; }
      if (user.role !== 'admin') { window.location.replace('profile.html'); return; }

      var app = document.getElementById('app');
      app.innerHTML = U.loadingHtml();
      U.showPendingToast();

      function fmtDate(iso) {
        if (!iso) return '—';
        try { return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' }); }
        catch(e) { return iso; }
      }
      function isoDate(s) { return s ? s.split('T')[0] : ''; }

      var expandedId = null;

      function showAddBadgesStep(createdEvent) {
        var section = document.getElementById('create-form-section');
        if (section) {
          section.innerHTML =
            '<div class="bg-white rounded-card p-6 shadow-soft mb-6 anim-fade">' +
              '<div class="flex items-center gap-3 mb-4">' +
                '<div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600 text-sm">✅</div>' +
                '<div>' +
                  '<p class="font-semibold text-gray-800">Evento "' + U.esc(createdEvent.name) + '" creado</p>' +
                  '<p class="text-xs text-gray-400">Ahora agrega los badges del evento</p>' +
                '</div>' +
              '</div>' +
              '<form id="quick-badge-form" class="space-y-3" novalidate>' +
                '<div class="grid grid-cols-1 sm:grid-cols-3 gap-2">' +
                  '<input type="text" name="emoji" placeholder="Emoji (ej: 🏅)" maxlength="4" class="px-3 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
                  '<input type="text" name="name" placeholder="Nombre del badge *" class="px-3 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
                  '<input type="text" name="desc" placeholder="Descripción" class="px-3 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
                '</div>' +
                '<div class="flex gap-2">' +
                  '<button type="submit" class="px-5 py-2.5 rounded-btn text-white font-medium text-sm" style="background:#6C63FF;">➕ Agregar badge</button>' +
                  '<button type="button" id="finish-create" class="px-5 py-2.5 rounded-btn text-sm font-medium border border-gray-200 text-gray-600 hover:bg-gray-50">Terminar</button>' +
                '</div>' +
              '</form>' +
              '<div id="quick-badge-list" class="mt-4 space-y-2"></div>' +
            '</div>';

          var quickForm = document.getElementById('quick-badge-form');
          var badgeList = document.getElementById('quick-badge-list');
          var addedBadges = [];

          quickForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            var nameField = quickForm.elements['name'];
            if (!nameField.value.trim()) { U.toast('Ingresa un nombre para el badge', 'error'); return; }
            var submitBtn = quickForm.querySelector('[type="submit"]');
            submitBtn.disabled = true; submitBtn.textContent = 'Agregando...';
            try {
              var b = await API.addBadge(createdEvent.id, {
                name: nameField.value.trim(),
                desc: quickForm.elements['desc'].value.trim(),
                emoji: quickForm.elements['emoji'].value.trim() || '🏅'
              });
              addedBadges.push(b);
              badgeList.innerHTML = addedBadges.map(function(badge) {
                return '<div class="flex items-center gap-3 p-3 rounded-card bg-base">' +
                  '<span class="text-xl">' + (badge.emoji || '🏅') + '</span>' +
                  '<span class="text-sm font-medium text-gray-700">' + U.esc(badge.name) + '</span>' +
                  '<span class="text-xs text-green-500 ml-auto">✅ Agregado</span>' +
                '</div>';
              }).join('');
              quickForm.reset();
              U.toast('Badge agregado', 'success');
            } catch(err) { U.toast(err.message || 'Error', 'error'); }
            submitBtn.disabled = false; submitBtn.textContent = '➕ Agregar badge';
          });

          document.getElementById('finish-create').addEventListener('click', function() {
            expandedId = createdEvent.id;
            init();
          });
        }
      }

      async function init() {
        try {
          var events = await API.listAdminEvents();
          var activeId = U.ensureActive(events);

          var createForm =
            '<div class="bg-white rounded-card p-6 shadow-soft mb-6 anim-fade">' +
              '<h2 class="text-lg font-bold mb-1 text-gray-800">Crear evento</h2>' +
              '<p class="text-sm text-gray-400 mb-5">Configura un nuevo evento de badges</p>' +
              '<form id="event-form" class="space-y-4" novalidate>' +
                U.inputField({ label: 'Nombre del evento', name: 'name', placeholder: 'Lyfter Summit 2026' }) +
                '<div><label class="text-sm font-medium text-gray-600">Descripción</label>' +
                  '<textarea name="description" rows="2" placeholder="Descripción del evento..." ' +
                  'class="w-full mt-1 px-4 py-3 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm resize-none"></textarea></div>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                  U.inputField({ label: 'Fecha inicio', type: 'date', name: 'start' }) +
                  U.inputField({ label: 'Fecha fin', type: 'date', name: 'end' }) +
                '</div>' +
                U.inputField({ label: 'Premio sorpresa 🎁', name: 'prize', placeholder: 'Entrada VIP al after-party' }) +
                U.inputField({ label: 'Ubicación 📍', name: 'location', placeholder: 'Ciudad, País o enlace virtual' }) +
                '<div class="pt-2 border-t border-gray-100">' +
                  '<p class="text-sm font-semibold text-gray-700 mb-2 mt-4">🏷️ Tags del evento</p>' +
                  '<p class="text-xs text-gray-400 mb-3">Ayudan a recomendar este evento a usuarios interesados</p>' +
                  '<div id="create-tags-container" class="flex flex-wrap gap-2 mb-4">' +
                    TAGS_LIST.map(function(tag) {
                      return '<button type="button" data-ctag="' + U.esc(tag) + '" class="ctag-btn px-3 py-1.5 rounded-full text-xs border border-gray-200 text-gray-600 hover:border-primary hover:text-primary transition">' + U.esc(tag) + '</button>';
                    }).join('') +
                  '</div>' +
                  '<p class="text-sm font-semibold text-gray-700 mb-2">➕ Badges del evento</p>' +
                  '<p class="text-xs text-gray-400 mb-3">Agrega los badges que los participantes podrán ganar</p>' +
                  '<div id="create-badges-preview" class="space-y-2 mb-3"></div>' +
                  '<div class="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-2">' +
                    '<input type="text" id="create-badge-emoji" placeholder="Emoji (ej: 🏅)" maxlength="4" class="px-3 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
                    '<input type="text" id="create-badge-name" placeholder="Nombre del badge *" class="px-3 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
                    '<input type="text" id="create-badge-desc" placeholder="Descripción" class="px-3 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
                  '</div>' +
                  '<button type="button" id="create-add-badge-btn" class="px-4 py-2 rounded-btn text-sm font-medium border border-primary text-primary hover:bg-primary-soft mb-4">➕ Agregar badge</button>' +
                '</div>' +
                U.primaryButton('Crear evento', 'type="submit" id="create-btn"') +
              '</form>' +
            '</div>';

          var eventCards = events.length ? events.map(function(e) {
            var isExpanded = expandedId === e.id;
            var photoHtml = e.photo
              ? '<img src="' + e.photo + '" class="w-full h-32 object-cover rounded-card mb-3" />'
              : '<div class="w-full h-24 rounded-card mb-3 flex items-center justify-center bg-gray-100 text-gray-300 text-sm cursor-pointer hover:bg-gray-200" id="photo-placeholder-' + e.id + '">📷 Agregar foto</div>';

            return '<div class="bg-white rounded-card shadow-soft mb-4 overflow-hidden anim-fade">' +
              '<div class="p-5">' +
                '<div id="photo-area-' + e.id + '" class="cursor-pointer">' + photoHtml + '</div>' +
                '<div class="flex items-start justify-between gap-2">' +
                  '<div class="flex-1 min-w-0 cursor-pointer" data-expand="' + e.id + '">' +
                    '<div class="flex items-center gap-2 mb-0.5">' +
                      '<span class="px-2 py-0.5 rounded-full text-xs font-medium border ' + (STATUS_MAP[e.status] ? STATUS_MAP[e.status].color + ' ' + STATUS_MAP[e.status].bg : 'text-gray-500 border-gray-300 bg-gray-50') + '">' + (STATUS_MAP[e.status] ? STATUS_MAP[e.status].label : (e.status || 'draft')) + '</span>' +
                      '<p class="font-semibold text-gray-800">' + U.esc(e.name) + '</p>' +
                    '</div>' +
                    '<p class="text-xs text-gray-400">' + fmtDate(e.start) + ' — ' + fmtDate(e.end) + '</p>' +
                    (e.prize ? '<p class="text-xs text-gray-500 mt-0.5">🎁 ' + U.esc(e.prize) + '</p>' : '') +
                  '</div>' +
                  '<div class="flex gap-1.5 flex-shrink-0">' +
                    '<select data-status-sel="' + e.id + '" class="status-sel px-2 py-1.5 rounded-btn text-xs font-medium border ' + (STATUS_MAP[e.status] ? STATUS_MAP[e.status].color : 'text-gray-500 border-gray-300') + ' outline-none cursor-pointer">' +
                      Object.keys(STATUS_MAP).map(function(k) {
                        return '<option value="' + k + '"' + (e.status === k ? ' selected' : '') + '>' + STATUS_MAP[k].label + '</option>';
                      }).join('') +
                    '</select>' +
                    '<button data-edit="' + e.id + '" class="edit-btn px-2.5 py-1.5 rounded-btn text-xs font-medium text-primary border border-primary hover:bg-primary-soft">✏️</button>' +
                    '<button data-del="' + e.id + '" data-name="' + U.esc(e.name) + '" class="del-btn px-2.5 py-1.5 rounded-btn text-xs font-medium text-red-500 border border-red-300 hover:bg-red-50">🗑</button>' +
                  '</div>' +
                '</div>' +
                '<div id="edit-form-' + e.id + '" class="hidden mt-4 pt-4 border-t border-gray-100">' +
                  '<form class="space-y-3 inline-edit-form" data-eid="' + e.id + '" novalidate>' +
                    '<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">' +
                      '<div><label class="text-xs font-medium text-gray-500">Nombre</label><input type="text" name="nombre" value="' + U.esc(e.name) + '" class="w-full mt-1 px-3 py-2 text-sm bg-white rounded-btn border border-gray-200 focus:border-primary outline-none" /></div>' +
                      '<div><label class="text-xs font-medium text-gray-500">Premio</label><input type="text" name="premio" value="' + U.esc(e.prize || '') + '" class="w-full mt-1 px-3 py-2 text-sm bg-white rounded-btn border border-gray-200 focus:border-primary outline-none" /></div>' +
                    '</div>' +
                    '<div><label class="text-xs font-medium text-gray-500">Descripción</label><input type="text" name="descripcion" value="' + U.esc(e.description || '') + '" class="w-full mt-1 px-3 py-2 text-sm bg-white rounded-btn border border-gray-200 focus:border-primary outline-none" /></div>' +
                    '<div><label class="text-xs font-medium text-gray-500">Ubicación 📍</label><input type="text" name="location" value="' + U.esc(e.location || '') + '" placeholder="Ciudad, País o enlace virtual" class="w-full mt-1 px-3 py-2 text-sm bg-white rounded-btn border border-gray-200 focus:border-primary outline-none" /></div>' +
                    '<div class="grid grid-cols-2 gap-3">' +
                      '<div><label class="text-xs font-medium text-gray-500">Inicio</label><input type="date" name="fecha_inicio" value="' + isoDate(e.start) + '" class="w-full mt-1 px-3 py-2 text-sm bg-white rounded-btn border border-gray-200 focus:border-primary outline-none" /></div>' +
                      '<div><label class="text-xs font-medium text-gray-500">Fin</label><input type="date" name="fecha_fin" value="' + isoDate(e.end) + '" class="w-full mt-1 px-3 py-2 text-sm bg-white rounded-btn border border-gray-200 focus:border-primary outline-none" /></div>' +
                    '</div>' +
                    '<div class="mt-3 pt-3 border-t border-gray-100">' +
                      '<p class="text-xs font-semibold text-gray-600 mb-2">🏷️ Tags</p>' +
                      '<div class="flex flex-wrap gap-1.5 mb-3">' +
                        TAGS_LIST.map(function(tag) {
                          var isSel = (e.tags || []).indexOf(tag) !== -1;
                          return '<button type="button" data-eitag="' + U.esc(tag) + '" ' + (isSel ? 'data-sel="1" ' : '') + 'class="inline-etag-btn px-2.5 py-1 rounded-full text-xs border transition ' +
                            (isSel ? 'text-white" style="background:#6C63FF;border-color:#6C63FF;"' : 'border-gray-200 text-gray-600"') + '>' +
                            U.esc(tag) + '</button>';
                        }).join('') +
                      '</div>' +
                      '<p class="text-xs font-semibold text-gray-600 mb-2">➕ Agregar badge</p>' +
                      '<div class="flex gap-1.5">' +
                        '<input type="text" id="ib-emoji-' + e.id + '" placeholder="🏅" maxlength="4" class="w-14 px-2 py-1.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-xs" />' +
                        '<input type="text" id="ib-name-' + e.id + '" placeholder="Nombre del badge *" class="flex-1 px-2 py-1.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-xs" />' +
                        '<button type="button" id="ib-add-' + e.id + '" class="px-3 py-1.5 rounded-btn text-xs font-medium border border-primary text-primary hover:bg-primary-soft">➕</button>' +
                      '</div>' +
                    '</div>' +
                    '<div class="flex gap-2 mt-3"><button type="submit" class="px-4 py-2 rounded-btn text-white text-sm font-medium" style="background:#6C63FF;">Guardar</button><button type="button" class="cancel-edit px-4 py-2 rounded-btn text-sm font-medium border border-gray-200 text-gray-600">Cancelar</button></div>' +
                  '</form>' +
                '</div>' +
              '</div>' +
              '<div id="expanded-' + e.id + '" class="' + (isExpanded ? '' : 'hidden') + ' border-t border-gray-100 bg-gray-50 p-5">' +
                '<div id="expanded-content-' + e.id + '"><div class="text-center text-gray-400 text-sm py-4">Cargando...</div></div>' +
              '</div>' +
            '</div>';
          }).join('') : '<p class="text-sm text-gray-400 text-center py-6">No hay eventos. Crea el primero arriba.</p>';

          var eventListHtml =
            '<div class="bg-white rounded-card p-6 shadow-soft anim-fade mb-4">' +
              '<div class="flex items-center justify-between mb-4">' +
                '<h2 class="text-lg font-bold text-gray-800">Eventos (' + events.length + ')</h2>' +
              '</div>' +
              '<input id="event-search" type="text" placeholder="🔍 Buscar evento..." class="w-full px-4 py-2.5 rounded-btn border border-gray-200 bg-base focus:border-primary outline-none text-sm" />' +
            '</div>' +
            '<div id="events-list">' + eventCards + '</div>';

          var createFormHtml = '<div id="create-form-section">' + createForm + '</div>';
          var inner = createFormHtml + eventListHtml;

          app.innerHTML = U.adminShell('event', inner, events, activeId);
          U.mountAdminShell();
          Array.prototype.forEach.call(document.querySelectorAll('p, h1, h2, h3, h4, button, label, span:not(.text-primary):not(.text-white)'), function(el) {
            if (el.children.length === 0 && el.textContent.trim()) { el.setAttribute('data-i18n', ''); }
          });
          if (U.getCurrentLang() !== 'es') U.translatePage();

          var createPendingBadges = [];
          var createSelectedTags = [];

          Array.prototype.forEach.call(document.querySelectorAll('.ctag-btn'), function(btn) {
            btn.addEventListener('click', function() {
              var tag = btn.getAttribute('data-ctag');
              var idx = createSelectedTags.indexOf(tag);
              if (idx === -1) {
                createSelectedTags.push(tag);
                btn.style.background = '#6C63FF';
                btn.style.color = 'white';
                btn.style.borderColor = '#6C63FF';
              } else {
                createSelectedTags.splice(idx, 1);
                btn.style.background = '';
                btn.style.color = '';
                btn.style.borderColor = '';
              }
            });
          });

          document.getElementById('create-add-badge-btn').addEventListener('click', function() {
            var name = document.getElementById('create-badge-name').value.trim();
            if (!name) { U.toast('Ingresa un nombre para el badge', 'error'); return; }
            var badge = {
              name: name,
              desc: document.getElementById('create-badge-desc').value.trim(),
              emoji: document.getElementById('create-badge-emoji').value.trim() || '🏅'
            };
            createPendingBadges.push(badge);
            document.getElementById('create-badges-preview').innerHTML = createPendingBadges.map(function(b, i) {
              return '<div class="flex items-center gap-3 p-3 rounded-card bg-base">' +
                '<span class="text-xl">' + (b.emoji || '🏅') + '</span>' +
                '<span class="text-sm font-medium text-gray-700 flex-1">' + U.esc(b.name) + '</span>' +
                '<button type="button" data-idx="' + i + '" class="remove-badge-btn text-xs text-red-400 hover:text-red-600">✕</button>' +
              '</div>';
            }).join('');
            Array.prototype.forEach.call(document.querySelectorAll('.remove-badge-btn'), function(rbtn) {
              rbtn.addEventListener('click', function() {
                createPendingBadges.splice(parseInt(rbtn.getAttribute('data-idx')), 1);
                rbtn.closest('.flex').remove();
              });
            });
            document.getElementById('create-badge-name').value = '';
            document.getElementById('create-badge-desc').value = '';
            document.getElementById('create-badge-emoji').value = '';
          });

          var eventSearch = document.getElementById('event-search');
          if (eventSearch) {
            eventSearch.addEventListener('input', function() {
              var q = eventSearch.value.trim().toLowerCase();
              var list = document.getElementById('events-list');
              if (!list) return;
              Array.prototype.forEach.call(list.children, function(card) {
                var name = card.querySelector('.font-semibold');
                if (!name) return;
                var match = !q || name.textContent.toLowerCase().includes(q);
                card.style.display = match ? '' : 'none';
              });
            });
          }

          // Foto del evento
          Array.prototype.forEach.call(document.querySelectorAll('[id^="photo-area-"]'), function(area) {
            area.addEventListener('click', function() {
              var eid = area.id.replace('photo-area-', '');
              var input = document.createElement('input');
              input.type = 'file'; input.accept = 'image/*';
              input.onchange = function() {
                var file = input.files[0];
                if (!file) return;
                if (file.size > 3 * 1024 * 1024) { U.toast('La imagen no puede superar 3MB', 'error'); return; }
                var reader = new FileReader();
                reader.onload = async function(ev) {
                  try {
                    await API.updateEventPhoto(eid, ev.target.result);
                    U.toast('Foto actualizada', 'success');
                    init();
                  } catch(err) { U.toast(err.message || 'Error al guardar foto', 'error'); }
                };
                reader.readAsDataURL(file);
              };
              input.click();
            });
          });

          // Expandir evento
          Array.prototype.forEach.call(document.querySelectorAll('[data-expand]'), function(el) {
            el.addEventListener('click', async function() {
              var eid = el.getAttribute('data-expand');
              var panel = document.getElementById('expanded-' + eid);
              if (!panel) return;
              if (expandedId === eid) {
                expandedId = null;
                panel.classList.add('hidden');
                return;
              }
              if (expandedId) {
                var prev = document.getElementById('expanded-' + expandedId);
                if (prev) prev.classList.add('hidden');
              }
              expandedId = eid;
              panel.classList.remove('hidden');
              await loadEventDetail(eid);
            });
          });

          // Estado del evento
          Array.prototype.forEach.call(document.querySelectorAll('.status-sel'), function(sel) {
            sel.addEventListener('change', async function() {
              var eid = sel.getAttribute('data-status-sel');
              var newStatus = sel.value;
              var active = ['upcoming','open','ongoing','closed'].indexOf(newStatus) !== -1;
              sel.disabled = true;
              try {
                await API.updateEvent(eid, { status: newStatus, activo: active });
                U.toast('Estado actualizado a "' + STATUS_MAP[newStatus].label + '"', 'success');
                init();
              } catch(err) {
                U.toast(err.message || 'Error', 'error');
                sel.disabled = false;
              }
            });
          });

          // Editar
          Array.prototype.forEach.call(document.querySelectorAll('.edit-btn'), function(btn) {
            btn.addEventListener('click', function() {
              var form = document.getElementById('edit-form-' + btn.getAttribute('data-edit'));
              if (form) form.classList.toggle('hidden');
            });
          });
          Array.prototype.forEach.call(document.querySelectorAll('.cancel-edit'), function(btn) {
            btn.addEventListener('click', function() {
              var form = btn.closest('[id^="edit-form-"]');
              if (form) form.classList.add('hidden');
            });
          });
          Array.prototype.forEach.call(document.querySelectorAll('.inline-edit-form'), function(form) {
            var eid = form.getAttribute('data-eid');
            form._selectedTags = [];
            Array.prototype.forEach.call(form.querySelectorAll('.inline-etag-btn'), function(btn) {
              if (btn.getAttribute('data-sel')) form._selectedTags.push(btn.getAttribute('data-eitag'));
              btn.addEventListener('click', function() {
                var tag = btn.getAttribute('data-eitag');
                var idx = form._selectedTags.indexOf(tag);
                if (idx === -1) {
                  form._selectedTags.push(tag);
                  btn.style.background = '#6C63FF';
                  btn.style.color = 'white';
                  btn.style.borderColor = '#6C63FF';
                } else {
                  form._selectedTags.splice(idx, 1);
                  btn.style.background = '';
                  btn.style.color = '';
                  btn.style.borderColor = '';
                }
              });
            });
            var addBtn = document.getElementById('ib-add-' + eid);
            if (addBtn) {
              addBtn.addEventListener('click', async function() {
                var nameInput = document.getElementById('ib-name-' + eid);
                var name = nameInput ? nameInput.value.trim() : '';
                if (!name) { U.toast('Ingresa un nombre para el badge', 'error'); return; }
                addBtn.disabled = true;
                try {
                  var emojiInput = document.getElementById('ib-emoji-' + eid);
                  await API.addBadge(eid, {
                    name: name,
                    desc: '',
                    emoji: (emojiInput ? emojiInput.value.trim() : '') || '🏅'
                  });
                  U.toast('Badge agregado ✅', 'success');
                  if (nameInput) nameInput.value = '';
                  if (emojiInput) emojiInput.value = '';
                  if (expandedId === eid) await loadEventDetail(eid);
                } catch(err) { U.toast(err.message || 'Error', 'error'); }
                addBtn.disabled = false;
              });
            }
            form.addEventListener('submit', async function(e) {
              e.preventDefault();
              var saveBtn = form.querySelector('[type="submit"]');
              saveBtn.disabled = true; saveBtn.textContent = 'Guardando...';
              try {
                var saves = [API.updateEvent(eid, {
                  nombre: form.elements['nombre'].value.trim(),
                  descripcion: form.elements['descripcion'].value.trim(),
                  premio: form.elements['premio'].value.trim(),
                  fecha_inicio: form.elements['fecha_inicio'].value,
                  fecha_fin: form.elements['fecha_fin'].value,
                  location: form.elements['location'] ? form.elements['location'].value.trim() : '',
                })];
                if (form._selectedTags && form._selectedTags.length) saves.push(API.updateEventTags(eid, form._selectedTags));
                await Promise.all(saves);
                U.toast('Evento actualizado ✅', 'success'); init();
              } catch(err) { U.toast(err.message || 'Error', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Guardar'; }
            });
          });

          // Eliminar
          Array.prototype.forEach.call(document.querySelectorAll('.del-btn'), function(btn) {
            btn.addEventListener('click', function() {
              var eid = btn.getAttribute('data-del');
              var ename = btn.getAttribute('data-name');
              U.showConfirm('¿Eliminar "' + ename + '"? Se eliminarán todos sus badges y canjes.', async function() {
                btn.disabled = true;
                try { await API.deleteEvent(eid); U.toast('Evento eliminado', 'success'); init(); }
                catch(err) { U.toast(err.message || 'Error', 'error'); btn.disabled = false; }
              });
            });
          });

          // Crear evento
          var createFormEl = document.getElementById('event-form');
          createFormEl.addEventListener('submit', async function(e) {
            e.preventDefault();
            var nameField = createFormEl.elements['name'];
            var ok = true;
            ok = U.setFieldError(nameField, nameField.value.trim() ? '' : 'Ingresa un nombre') && ok;
            ok = U.setFieldError(createFormEl.start, createFormEl.start.value ? '' : 'Selecciona fecha de inicio') && ok;
            ok = U.setFieldError(createFormEl.end, createFormEl.end.value ? '' : 'Selecciona fecha de fin') && ok;
            if (!ok) return;
            var btn = document.getElementById('create-btn');
            btn.disabled = true; btn.textContent = 'Creando...';
            try {
              var created = await API.createEvent({
                name: nameField.value.trim(),
                description: createFormEl.description.value.trim(),
                start: createFormEl.start.value,
                end: createFormEl.end.value,
                prize: createFormEl.prize.value.trim(),
                location: createFormEl.location ? createFormEl.location.value.trim() : ''
              });
              var savePromises = [];
              if (createSelectedTags.length) savePromises.push(API.updateEventTags(created.id, createSelectedTags));
              for (var i = 0; i < createPendingBadges.length; i++) {
                savePromises.push(API.addBadge(created.id, createPendingBadges[i]));
              }
              await Promise.all(savePromises);
              U.setActiveId(created.id);
              expandedId = created.id;
              U.toast('Evento creado ✅', 'success');
              init();
            } catch(err) { U.toast(err.message || 'Error', 'error'); btn.disabled = false; btn.textContent = 'Crear evento'; }
          });

          // Re-expandir si había uno expandido
          if (expandedId) {
            var panel = document.getElementById('expanded-' + expandedId);
            if (panel) { panel.classList.remove('hidden'); await loadEventDetail(expandedId); }
          }

        } catch(err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
        window.scrollTo(0, 0);
      }

      async function loadEventDetail(eid) {
        var contentEl = document.getElementById('expanded-content-' + eid);
        if (!contentEl) return;
        try {
          var data = await API.listAdminBadges(eid);
          var blist = data.badges;

          var accessQrHtml = '<div class="mb-5 p-4 rounded-card bg-white shadow-soft">' +
            '<p class="text-sm font-semibold text-gray-700 mb-2">🔑 QR de acceso al evento</p>' +
            '<p class="text-xs text-gray-400 mb-3">Los usuarios escanean este QR para unirse al evento</p>' +
            '<div id="access-qr-area-' + eid + '" class="text-center">' +
              (data.event.access_qr
                ? '<img src="' + data.event.access_qr + '" class="w-32 h-32 mx-auto mb-2" />' +
                  '<button id="dl-access-qr-' + eid + '" class="px-4 py-2 rounded-btn text-white text-sm font-medium" style="background:#6C63FF;">⬇️ Descargar</button>'
                : '<button id="gen-access-qr-' + eid + '" class="px-4 py-2 rounded-btn text-white text-sm font-medium" style="background:#6C63FF;">Generar QR de acceso</button>') +
            '</div>' +
          '</div>';

          var badgeItems = blist.length
            ? blist.map(function(b) {
                return '<div class="flex items-center justify-between p-3 rounded-card bg-white mb-2 shadow-soft">' +
                  '<div class="flex items-center gap-3 flex-1 min-w-0">' +
                    '<span class="text-2xl">' + (b.emoji || b.icon || '🏅') + '</span>' +
                    '<div><p class="font-medium text-sm text-gray-800 truncate">' + U.esc(b.name || b.nombre) + '</p>' +
                    '<p class="text-xs text-gray-400">' + (b.redeemed || 0) + ' canjes</p></div>' +
                  '</div>' +
                  '<div class="flex gap-1.5">' +
                    '<button data-qr-b="' + b.id + '" data-qr-url="' + U.esc(b.redeemUrl || b.redeem_url || '') + '" data-qr-img="' + U.esc(b.qrImage || b.qr_image || '') + '" data-qr-name="' + U.esc(b.name || b.nombre) + '" class="badge-qr-btn px-3 py-1.5 rounded-btn text-xs font-medium text-primary border border-primary hover:bg-primary-soft">QR</button>' +
                    '<button data-del-b="' + b.id + '" data-del-eid="' + eid + '" data-del-bname="' + U.esc(b.name || b.nombre) + '" class="badge-del-btn px-2.5 py-1.5 rounded-btn text-xs text-red-500 border border-red-300 hover:bg-red-50">🗑</button>' +
                  '</div>' +
                '</div>';
              }).join('')
            : '<p class="text-sm text-gray-400 text-center py-4">Sin badges. Agrega el primero abajo.</p>';

          contentEl.innerHTML =
            accessQrHtml +
            '<div class="mb-4">' +
              '<p class="text-sm font-semibold text-gray-700 mb-3">🏅 Badges (' + blist.length + ')</p>' +
              badgeItems +
              '<div id="badge-qr-preview-' + eid + '"></div>' +
            '</div>';

          // Generar QR de acceso
          var genBtn = document.getElementById('gen-access-qr-' + eid);
          if (genBtn) {
            genBtn.addEventListener('click', async function() {
              genBtn.disabled = true; genBtn.textContent = 'Generando...';
              try {
                var r = await API.generateEventAccessQr(eid);
                var area = document.getElementById('access-qr-area-' + eid);
                area.innerHTML = '<img src="' + r.access_qr + '" class="w-32 h-32 mx-auto mb-2" />' +
                  '<button id="dl-access-qr-' + eid + '" class="px-4 py-2 rounded-btn text-white text-sm font-medium" style="background:#6C63FF;">⬇️ Descargar</button>';
                document.getElementById('dl-access-qr-' + eid).addEventListener('click', function() {
                  var a = document.createElement('a');
                  a.href = r.access_qr; a.download = 'acceso-evento.png'; a.click();
                });
              } catch(err) { U.toast(err.message || 'Error', 'error'); genBtn.disabled = false; genBtn.textContent = 'Generar QR de acceso'; }
            });
          }

          // Descargar QR de acceso existente
          var dlBtn = document.getElementById('dl-access-qr-' + eid);
          if (dlBtn) {
            dlBtn.addEventListener('click', function() {
              var img = dlBtn.previousElementSibling;
              if (img) { var a = document.createElement('a'); a.href = img.src; a.download = 'acceso-evento.png'; a.click(); }
            });
          }

          // Ver QR de badge
          Array.prototype.forEach.call(contentEl.querySelectorAll('.badge-qr-btn'), function(btn) {
            btn.addEventListener('click', function() {
              var preview = document.getElementById('badge-qr-preview-' + eid);
              var qrImg = btn.getAttribute('data-qr-img');
              var qrUrl = btn.getAttribute('data-qr-url');
              var name  = btn.getAttribute('data-qr-name');
              if (qrImg) {
                preview.innerHTML = '<div class="mt-3 p-4 rounded-card text-center" style="background:#EEEDFF;">' +
                  '<p class="text-xs font-semibold text-primary mb-2">QR — ' + U.esc(name) + '</p>' +
                  '<img src="' + qrImg + '" class="w-32 h-32 mx-auto mb-2" />' +
                  '<button id="dl-badge-qr" class="px-4 py-2 rounded-btn text-white text-sm font-medium" style="background:#6C63FF;">⬇️ Descargar</button>' +
                '</div>';
                document.getElementById('dl-badge-qr').addEventListener('click', function() {
                  var a = document.createElement('a'); a.href = qrImg; a.download = 'badge-' + name + '.png'; a.click();
                });
              }
            });
          });

          // Eliminar badge
          Array.prototype.forEach.call(contentEl.querySelectorAll('.badge-del-btn'), function(btn) {
            btn.addEventListener('click', function() {
              U.showConfirm('¿Eliminar el badge "' + btn.getAttribute('data-del-bname') + '"?', async function() {
                btn.disabled = true;
                try {
                  await API.deleteBadge(btn.getAttribute('data-del-eid'), btn.getAttribute('data-del-b'));
                  U.toast('Badge eliminado', 'success');
                  await loadEventDetail(eid);
                } catch(err) { U.toast(err.message || 'Error', 'error'); btn.disabled = false; }
              });
            });
          });

        } catch(err) {
          if (contentEl) contentEl.innerHTML = '<p class="text-sm text-red-400 text-center py-4">Error al cargar: ' + U.esc(err.message) + '</p>';
        }
      }

      init();
    })();
  </script>
</body>
</html>
