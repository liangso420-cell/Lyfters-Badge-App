<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi actividad — Lyfter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando actividad...</span>
  </div>
  <div id="app" style="position:relative;z-index:1;width:100%;max-width:100%;margin:0 auto;padding:24px clamp(16px,4vw,44px) 70px;"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }

    var app = document.getElementById('app');

    async function init() {
      var profile = await API.getProfile();
      U.hideLoading();

      var allEvents = profile.events || [];
      var savedRes = await fetch(API.base + '/events/saved', { headers: API.authHeaders() }).then(function(r){ return r.json(); }).catch(function(){ return []; });
      var saved = savedRes || [];
      var participating = allEvents.filter(function(ev){ return ev.status === 'ongoing' && (ev.obtained||0) > 0; });
      var completed = allEvents.filter(function(ev){ return ev.status === 'finished' || (ev.obtained > 0 && ev.total > 0 && ev.obtained >= ev.total); });

      function eventCard(ev) {
        var pct = ev.total ? Math.round((ev.obtained||0)/ev.total*100) : 0;
        return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:12px;padding:14px;margin-bottom:10px;">' +
          '<div style="font-family:Poppins,sans-serif;font-size:13px;font-weight:700;color:#f4f6f9;">' + U.esc(ev.name||ev.nombre||'') + '</div>' +
          '<div style="font-size:11px;color:#8b93a3;margin-top:3px;">' + U.esc(ev.workspace_name||'') + '</div>' +
          (ev.total ? '<div style="margin-top:8px;"><div style="height:4px;background:#2e323d;border-radius:999px;"><div style="width:' + pct + '%;height:100%;background:#d897e7;border-radius:999px;"></div></div><div style="font-size:11px;color:#8b93a3;margin-top:3px;">' + (ev.obtained||0) + '/' + ev.total + ' badges</div></div>' : '') +
        '</div>';
      }

      var sections = [
        { title: 'Guardados', emoji: '<img src="assets/icons/ui/icono-reclamado.png" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;">', events: saved, empty: 'No tenés eventos guardados. Explorá eventos y guárdalos.' },
        { title: 'Participando', emoji: '<img src="assets/icons/ui/icono-evento.png" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;">', events: participating, empty: 'No estás participando en ningún evento activo.' },
        { title: 'Completados', emoji: '<img src="assets/icons/ui/icono-reclamado.png" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;">', events: completed, empty: 'Aún no has completado ningún evento.' },
      ];

      var initials = (user.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
      var avatarEl = user.avatar
        ? '<img src="' + U.esc(user.avatar) + '" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(216,151,231,0.4);" />'
        : '<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#d897e7,#e68a8d);display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;font-size:13px;font-weight:800;color:#1c1f27;">' + initials + '</div>';

      app.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:space-between;margin:24px 0 20px;">' +
          '<div style="display:flex;align-items:center;gap:12px;">' +
            '<button onclick="history.back()" style="width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#f4f6f9;font-size:18px;cursor:pointer;">←</button>' +
            '<h1 style="font-family:Poppins,sans-serif;font-size:20px;font-weight:700;color:#f4f6f9;margin:0;">Mi actividad</h1>' +
          '</div>' +
          '<button id="home-avatar-btn" style="background:none;border:none;cursor:pointer;padding:0;">' + avatarEl + '</button>' +
        '</div>' +
        sections.map(function(sec) {
          return '<div style="margin-bottom:24px;">' +
            '<h3 style="font-family:Poppins,sans-serif;font-size:15px;font-weight:700;color:#f4f6f9;margin:0 0 10px;">' + sec.title + '</h3>' +
            (sec.events.length
              ? sec.events.map(eventCard).join('')
              : '<p style="font-size:13px;color:#8b93a3;padding:8px 0;">' + sec.empty + '</p>') +
          '</div>';
        }).join('');

      var avatarBtn = document.getElementById('home-avatar-btn');
      if (avatarBtn) {
        avatarBtn.addEventListener('click', function() {
          var _u = API.currentUser();
          U.showDrawer(_u ? (_u.avatar||null) : null, _u ? (_u.name||null) : null, null, false);
        });
      }
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
  <nav class="lyfter-bottom-nav">
    <a href="inicio.html" class="lyfter-nav-item"><i class="bi bi-house-fill"></i><span>Inicio</span></a>
    <a href="profile.html" class="lyfter-nav-item"><i class="bi bi-compass"></i><span>Explorar</span></a>
    <a href="scan.html" class="lyfter-nav-item"><i class="bi bi-qr-code-scan"></i><span>Escanear</span></a>
    <a href="user-events.html" class="lyfter-nav-item"><img src="assets/icons/ui/icono-evento.png" style="width:22px;height:22px;object-fit:contain;opacity:0.5;" class="nav-evento-icon" /><span>Eventos</span></a>
    <a href="profile-new.html" class="lyfter-nav-item active" id="nav-perfil-btn"><div class="lyfter-nav-dot"></div></a>
  </nav>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API && API.currentUser();
    if (!API || !user) return;
    API.getProfile().then(function(profile) {
      var profileAvatar = profile.avatar || (user && user.avatar) || null;
      var initials = (user && user.name ? user.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase() : '?');
      var navAvatar = profileAvatar
        ? '<img src="' + U.esc(profileAvatar) + '" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(216,151,231,0.5);" />'
        : '<div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#d897e7,#e68a8d);display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;font-size:9px;font-weight:800;color:#1c1f27;">' + initials + '</div>';
      var navPerfilBtn = document.getElementById('nav-perfil-btn');
      if (navPerfilBtn) navPerfilBtn.insertAdjacentHTML('afterbegin', navAvatar);
    }).catch(function() {});
  })();
  </script>
</body>
</html>
