<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes de usuarios — Lyfter Badge App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body style="margin:0;background:#15171d;font-family:Manrope,system-ui,sans-serif;">
  <div id="app"></div>
  <div id="toast-root" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U   = window.LyfterUtils;

    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }
    if (user.role !== 'god_admin') { window.location.replace('workspace-select.html'); return; }

    var app = document.getElementById('app');

    var styles = '<style>' +
      '.gu-header{background:#1a1d24;border-bottom:1px solid #262a33;padding:16px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}' +
      '.gu-title{font-family:Poppins,sans-serif;font-size:20px;font-weight:700;color:#f4f6f9;}' +
      '.gu-main{position:relative;z-index:1;margin:0 auto;padding:36px 24px 80px;min-height:100vh;}' +
      '.gu-card{background:#1c1f27;border:1px solid #2f343f;border-radius:20px;padding:28px 30px;margin-bottom:20px;}' +
      '.gu-card-title{font-family:Poppins,sans-serif;font-size:17px;font-weight:700;color:#f4f6f9;margin-bottom:18px;}' +
      // Tabla reciclada de workspace.html (.ws-table) para mantener idéntico el render de reportes
      '.ws-table{width:100%;border-collapse:collapse;}' +
      '.ws-table th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#6f7686;font-weight:700;padding:10px 14px;border-bottom:1px solid #262a33;text-align:left;}' +
      '.ws-table td{padding:12px 14px;border-bottom:1px solid #20242d;font-size:14px;color:#cdd2db;}' +
      '@media (max-width:640px){' +
        '.gu-header{padding:14px 16px;}' +
        '.gu-main{padding:24px 14px 80px;}' +
        '.gu-card{padding:20px 16px;}' +
      '}' +
    '</style>';

    app.innerHTML = styles +

      '<div class="gu-header">' +
        '<a href="workspace-select.html" style="display:inline-flex;align-items:center;gap:6px;color:#8b93a3;text-decoration:none;font-size:14px;font-family:Manrope,sans-serif;font-weight:600;">' +
          '<span style="font-size:18px;">←</span> Volver' +
        '</a>' +
        '<img src="assets/icons/ui/icono-alerta.png" style="width:24px;height:24px;object-fit:contain;opacity:.8;margin-left:4px;" />' +
        '<div class="gu-title">Reportes de usuarios</div>' +
      '</div>' +

      '<div class="gu-main">' +

        '<div class="gu-card" id="reports-section-card" style="border-color:rgba(251,191,36,0.25);">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;">' +
            '<div class="gu-card-title" style="margin-bottom:0;color:#fbbf24;display:flex;align-items:center;gap:8px;">' +
              '<img src="assets/icons/ui/icono-alerta.png" style="width:20px;height:20px;object-fit:contain;" /> Reportes de usuarios' +
            '</div>' +
            '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">' +
              '<select id="reports-status-filter" onchange="loadReports()" style="height:36px;padding:0 10px;border-radius:8px;border:1px solid #353a46;background:#2e323d;color:#f4f6f9;font-family:Manrope,sans-serif;font-size:13px;outline:none;">' +
                '<option value="">Todos</option>' +
                '<option value="pending" selected>Pendientes</option>' +
                '<option value="confirmed">Confirmados</option>' +
                '<option value="dismissed">Descartados</option>' +
              '</select>' +
              '<button onclick="loadReports()" style="height:36px;padding:0 16px;border-radius:8px;border:1px solid rgba(251,191,36,0.35);background:rgba(251,191,36,0.1);color:#fbbf24;font-family:Poppins,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Cargar reportes</button>' +
            '</div>' +
          '</div>' +
          '<div id="reports-list"><p style="font-size:13px;color:#6f7686;text-align:center;padding:24px 0;">Hacé clic en "Cargar reportes" para ver la lista.</p></div>' +
        '</div>' +

      '</div>';

    function pagerHtml(total, page, size, gotoFn) {
      if (total <= size) return '';
      var totalPages = Math.ceil(total / size);
      var from = page * size + 1;
      var to = Math.min((page + 1) * size, total);
      var btns = '';
      for (var p = 0; p < totalPages; p++) {
        if (totalPages > 7 && p !== 0 && p !== totalPages - 1 && Math.abs(p - page) > 1) {
          if (p === page - 2 || p === page + 2) btns += '<span style="color:#4a5060;align-self:center;padding:0 2px;">…</span>';
          continue;
        }
        var active = p === page;
        btns += '<button onclick="' + gotoFn + '(' + p + ')" style="min-width:32px;height:32px;padding:0 6px;border-radius:8px;border:1px solid ' + (active ? '#d897e7' : '#2f343f') + ';background:' + (active ? 'rgba(216,151,231,0.15)' : 'transparent') + ';color:' + (active ? '#d897e7' : '#8b93a3') + ';font-family:Poppins,sans-serif;font-size:13px;font-weight:' + (active ? '700' : '500') + ';cursor:pointer;">' + (p + 1) + '</button>';
      }
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0 4px;border-top:1px solid #2f343f;margin-top:8px;flex-wrap:wrap;gap:8px;">' +
        '<span style="font-size:12px;color:#8b93a3;font-family:Manrope,sans-serif;">' + from + '–' + to + ' de ' + total + '</span>' +
        '<div style="display:flex;gap:4px;flex-wrap:wrap;">' +
          (page > 0 ? '<button onclick="' + gotoFn + '(' + (page-1) + ')" style="height:32px;padding:0 10px;border-radius:8px;border:1px solid #2f343f;background:transparent;color:#8b93a3;font-size:13px;cursor:pointer;">←</button>' : '') +
          btns +
          (page < totalPages - 1 ? '<button onclick="' + gotoFn + '(' + (page+1) + ')" style="height:32px;padding:0 10px;border-radius:8px;border:1px solid #2f343f;background:transparent;color:#8b93a3;font-size:13px;cursor:pointer;">→</button>' : '') +
        '</div>' +
      '</div>';
    }

    // ── Modal de ban (reciclado de gestion-usuarios.html / workspace.html) ──
    var _banModalTarget = null;
    var _banSuccessCb = null;

    window.openBanModal = function(userId, userName) {
      _banModalTarget = userId;
      var old = document.getElementById('ban-modal-overlay');
      if (old) old.remove();

      var DURATIONS = [
        {label:'1 hora',   val:'1'},
        {label:'6 horas',  val:'6'},
        {label:'24 horas', val:'24', checked:true},
        {label:'7 días',   val:'168'},
        {label:'30 días',  val:'720'},
        {label:'Permanente', val:'perm'},
      ];

      var overlay = document.createElement('div');
      overlay.id = 'ban-modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML =
        '<div style="background:#1c1f27;border:1px solid #353a46;border-radius:20px;padding:28px 30px;max-width:460px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.5);">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">' +
            '<div style="font-family:Poppins,sans-serif;font-size:17px;font-weight:700;color:#ffc850;">Banear a ' + U.esc(userName) + '</div>' +
            '<button onclick="closeBanModal()" style="background:none;border:none;color:#6f7686;font-size:22px;cursor:pointer;line-height:1;padding:0 4px;">×</button>' +
          '</div>' +

          '<div style="margin-bottom:18px;">' +
            '<div style="font-size:11px;font-weight:700;color:#8b93a3;margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase;">Duración</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;">' +
              DURATIONS.map(function(d) {
                return '<label style="display:flex;align-items:center;gap:6px;padding:9px 12px;border-radius:10px;border:1px solid #353a46;cursor:pointer;font-size:13px;color:#cdd2db;">' +
                  '<input type="radio" name="ban-dur" value="' + d.val + '"' + (d.checked ? ' checked' : '') + ' style="accent-color:#ffc850;flex-shrink:0;"/> ' + d.label + '</label>';
              }).join('') +
            '</div>' +
          '</div>' +

          '<div style="margin-bottom:18px;">' +
            '<div style="font-size:11px;font-weight:700;color:#8b93a3;margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase;">Alcance</div>' +
            '<div style="display:flex;flex-direction:column;gap:8px;">' +
              '<label style="display:flex;align-items:flex-start;gap:8px;padding:11px 14px;border-radius:10px;border:1px solid #353a46;cursor:pointer;font-size:13px;color:#cdd2db;">' +
                '<input type="radio" name="ban-scope" value="account" checked style="accent-color:#ffc850;flex-shrink:0;margin-top:2px;"/> ' +
                '<div><div style="font-weight:600;">Solo la cuenta</div><div style="font-size:11px;color:#8b93a3;margin-top:2px;">El usuario no puede iniciar sesión con esta cuenta.</div></div>' +
              '</label>' +
              '<label style="display:flex;align-items:flex-start;gap:8px;padding:11px 14px;border-radius:10px;border:1px solid #353a46;cursor:pointer;font-size:13px;color:#cdd2db;">' +
                '<input type="radio" name="ban-scope" value="account_ip" style="accent-color:#ffc850;flex-shrink:0;margin-top:2px;"/> ' +
                '<div><div style="font-weight:600;">Cuenta + IP</div><div style="font-size:11px;color:#8b93a3;margin-top:2px;">Bloquea también el acceso desde la IP de su último login (si disponible).</div></div>' +
              '</label>' +
            '</div>' +
          '</div>' +

          '<div style="margin-bottom:22px;">' +
            '<div style="font-size:11px;font-weight:700;color:#8b93a3;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;">Razón (opcional)</div>' +
            '<input id="ban-reason-input" type="text" placeholder="Ej: spam, comportamiento inapropiado..." ' +
              'style="width:100%;height:44px;border-radius:10px;border:1px solid #353a46;background:#2e323d;color:#f4f6f9;font-family:Manrope,sans-serif;font-size:14px;padding:0 14px;outline:none;box-sizing:border-box;" />' +
          '</div>' +

          '<div style="display:flex;gap:10px;">' +
            '<button onclick="closeBanModal()" style="flex:1;height:44px;border-radius:10px;border:1px solid #353a46;background:transparent;color:#aab1bf;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Cancelar</button>' +
            '<button id="confirm-ban-btn" onclick="confirmBanUser()" style="flex:2;height:44px;border-radius:10px;border:1px solid rgba(255,200,80,0.4);background:rgba(255,200,80,0.15);color:#ffc850;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Confirmar ban</button>' +
          '</div>' +
        '</div>';

      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) closeBanModal(); });
    };

    window.closeBanModal = function() {
      var el = document.getElementById('ban-modal-overlay');
      if (el) el.remove();
      _banModalTarget = null;
      _banSuccessCb = null;
    };

    window.confirmBanUser = async function() {
      if (!_banModalTarget) return;
      var durEl   = document.querySelector('input[name="ban-dur"]:checked');
      var scopeEl = document.querySelector('input[name="ban-scope"]:checked');
      var reason  = (document.getElementById('ban-reason-input').value || '').trim();
      var dur     = durEl ? durEl.value : '24';
      var scope   = scopeEl ? scopeEl.value : 'account';
      var duration_hours = dur === 'perm' ? null : parseInt(dur, 10);

      var btn = document.getElementById('confirm-ban-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Procesando...'; }
      try {
        var res = await fetch(API.base + '/workspaces/platform/users/' + _banModalTarget + '/ban', {
          method: 'POST',
          headers: Object.assign({}, API.authHeaders(), {'Content-Type': 'application/json'}),
          body: JSON.stringify({ duration_hours: duration_hours, ban_scope: scope, reason: reason }),
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        var cb = _banSuccessCb;
        closeBanModal();
        U.toast('Usuario baneado', 'success');
        if (cb) cb(); else loadReports();
      } catch(e) {
        U.toast(e.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = 'Confirmar ban'; }
      }
    };

    // ── Reports (god_admin) ───────────────────────────────────
    var _reportsCache = [], _repPage = 0, REP_PAGE = 15;

    window.loadReports = async function() {
      var container = document.getElementById('reports-list');
      if (!container) return;
      container.innerHTML = '<p style="font-size:13px;color:#8b93a3;text-align:center;padding:20px;">Cargando...</p>';
      var statusSel = document.getElementById('reports-status-filter');
      var status = statusSel ? statusSel.value : '';
      try {
        var url = API.base + '/reports/' + (status ? '?status=' + status : '');
        var res = await fetch(url, { headers: API.authHeaders() });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        _reportsCache = data;
        _repPage = 0;
        renderReportsPage(data, 0);
        if (!data.length) container.innerHTML = '<p style="font-size:13px;color:#6f7686;text-align:center;padding:24px 0;">No hay reportes con ese filtro.</p>';
      } catch(e) {
        container.innerHTML = '<p style="color:#e68a8d;font-size:13px;text-align:center;padding:20px;">Error: ' + U.esc(e.message) + '</p>';
      }
    };

    function renderReportsPage(list, page) {
      var container = document.getElementById('reports-list');
      if (!container) return;
      if (!list.length) return;
      var slice = list.slice(page * REP_PAGE, (page + 1) * REP_PAGE);
      var STATUS_LABELS = { pending: 'Pendiente', confirmed: 'Confirmado', dismissed: 'Descartado' };
      var STATUS_COLORS = { pending: '#fbbf24', confirmed: '#e68a8d', dismissed: '#6f7686' };
      var rows = slice.map(function(r) {
        var statusColor = STATUS_COLORS[r.status] || '#8b93a3';
        var statusLabel = STATUS_LABELS[r.status] || r.status;
        var safeId = U.esc(r.id);
        var actions = '';
        if (r.status === 'pending') {
          actions = reportActionsHtml(r);
        }
        return '<tr>' +
          '<td style="font-size:12px;color:#8b93a3;">' + (r.reported_name ? U.esc(r.reported_name) : '—') + '<br/><span style="font-size:10px;opacity:.7;">' + U.esc(r.reported_email || '') + '</span></td>' +
          '<td style="font-size:12px;">' + U.esc(r.reason || '') + '</td>' +
          '<td><button onclick="viewReportDescription(\'' + safeId + '\')" style="height:28px;font-size:11px;padding:0 12px;border-radius:6px;border:1px solid #353a46;background:transparent;color:#8b93a3;cursor:pointer;white-space:nowrap;">Ver descripción</button></td>' +
          '<td><span style="font-size:11px;font-weight:700;color:' + statusColor + ';">' + statusLabel + '</span></td>' +
          '<td style="font-size:11px;color:#6f7686;">' + (r.created_at ? r.created_at.slice(0, 10) : '') + '</td>' +
          '<td id="rep-actions-' + safeId + '" style="white-space:nowrap;">' + actions + '</td>' +
        '</tr>';
      }).join('');
      container.innerHTML =
        '<div style="overflow-x:auto;">' +
          '<table class="ws-table"><thead><tr>' +
            '<th>Reportado</th><th>Razón</th><th>Descripción</th><th>Estado</th><th>Fecha</th><th>Acciones</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>' +
        '</div>' +
        pagerHtml(list.length, page, REP_PAGE, '_goRepPage');
    }

    window._goRepPage = function(p) { _repPage = p; renderReportsPage(_reportsCache, p); window.scrollTo(0, 0); };

    // Popup con la descripción completa del reporte (reutiliza estilos del modal de confirm-report).
    window.viewReportDescription = function(reportId) {
      var r = null;
      for (var i = 0; i < _reportsCache.length; i++) {
        if (String(_reportsCache[i].id) === String(reportId)) { r = _reportsCache[i]; break; }
      }
      if (!r) return;
      var old = document.getElementById('report-desc-modal');
      if (old) old.remove();
      var overlay = document.createElement('div');
      overlay.id = 'report-desc-modal';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML =
        '<div style="background:#1c1f27;border:1px solid rgba(230,138,141,0.3);border-radius:20px;padding:28px 30px;max-width:440px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.5);">' +
          '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">' +
            '<div>' +
              '<div style="font-family:Poppins,sans-serif;font-size:17px;font-weight:700;color:#f4f6f9;">' + (r.reported_name ? U.esc(r.reported_name) : '—') + '</div>' +
              '<div style="font-size:12px;color:#8b93a3;margin-top:2px;">' + U.esc(r.reported_email || '') + '</div>' +
            '</div>' +
            '<button onclick="document.getElementById(\'report-desc-modal\').remove();" style="background:none;border:none;color:#6f7686;font-size:22px;cursor:pointer;line-height:1;padding:0 4px;">×</button>' +
          '</div>' +
          '<div style="margin-bottom:16px;">' +
            '<div style="font-size:11px;font-weight:700;color:#8b93a3;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;">Razón</div>' +
            '<div style="font-size:14px;color:#cdd2db;">' + U.esc(r.reason || '—') + '</div>' +
          '</div>' +
          '<div style="margin-bottom:22px;">' +
            '<div style="font-size:11px;font-weight:700;color:#8b93a3;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;">Descripción</div>' +
            '<div style="font-size:14px;color:#cdd2db;line-height:1.5;white-space:pre-wrap;word-break:break-word;">' + U.esc(r.description || '—') + '</div>' +
          '</div>' +
          '<div style="display:flex;gap:10px;">' +
            '<button onclick="document.getElementById(\'report-desc-modal\').remove();" style="flex:1;height:44px;border-radius:10px;border:1px solid #353a46;background:transparent;color:#aab1bf;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Cerrar</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.remove();
      });
    };

    window.dismissReport = async function(reportId) {
      if (!confirm('¿Descartar este reporte?')) return;
      try {
        var res = await fetch(API.base + '/reports/' + reportId + '/dismiss', {
          method: 'POST',
          headers: Object.assign({}, API.authHeaders(), {'Content-Type': 'application/json'}),
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        U.toast('Reporte descartado', 'success');
        loadReports();
      } catch(e) { U.toast(e.message, 'error'); }
    };

    // Acciones de la fila de reporte: Descartar + Banear/Desbanear + badge de estado
    // (botones, popups y estilos reciclados de gestion-usuarios.html)
    function reportActionsHtml(r) {
      var safeId     = U.esc(r.id);
      var reportedId = U.esc(r.reported_id || '');
      var jsName     = String(r.reported_name || '?').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      var dismissBtn = '<button onclick="dismissReport(\'' + safeId + '\')" ' +
        'style="height:28px;font-size:11px;padding:0 10px;border-radius:6px;border:1px solid #353a46;background:transparent;color:#8b93a3;cursor:pointer;margin-right:6px;">Descartar</button>';
      var banBtn = r.banned
        ? '<button onclick="unbanReportUser(\'' + reportedId + '\',\'' + safeId + '\')" ' +
            'style="width:120px;height:30px;box-sizing:border-box;text-align:center;font-size:12px;padding:0 12px;border-radius:8px;border:1px solid #353a46;background:transparent;color:#aab1bf;cursor:pointer;margin-right:8px;">Desbanear</button>'
        : '<button onclick="openReportBanModal(\'' + reportedId + '\',\'' + jsName + '\',\'' + safeId + '\')" ' +
            'style="width:120px;height:30px;box-sizing:border-box;text-align:center;font-size:12px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,200,80,0.3);background:rgba(255,200,80,0.1);color:#ffc850;cursor:pointer;margin-right:8px;">Banear</button>';
      var statusBadge = r.banned
        ? '<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(230,138,141,0.15);color:#e68a8d;border:1px solid rgba(230,138,141,0.2);">Baneado</span>'
        : '<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(171,209,148,0.15);color:#abd194;">Activo</span>';
      return dismissBtn + banBtn + statusBadge;
    }

    // Reutiliza el modal de ban (openBanModal/confirmBanUser);
    // al confirmar, intercambia los botones de la fila en sitio en vez de recargar.
    window.openReportBanModal = function(userId, userName, reportId) {
      _banSuccessCb = function() { updateReportRowBan(reportId, true); };
      openBanModal(userId, userName);
    };

    // Copia exacta de unbanPlatformUser (mismo popup y endpoint), con swap en sitio.
    window.unbanReportUser = async function(userId, reportId) {
      if (!confirm('¿Desbanear a este usuario?')) return;
      try {
        var res = await fetch(API.base + '/workspaces/platform/users/' + userId + '/unban', {
          method: 'POST',
          headers: Object.assign({}, API.authHeaders(), {'Content-Type': 'application/json'}),
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        U.toast('Usuario desbaneado', 'success');
        updateReportRowBan(reportId, false);
      } catch(e) { U.toast(e.message, 'error'); }
    };

    window.updateReportRowBan = function(reportId, banned) {
      for (var i = 0; i < _reportsCache.length; i++) {
        if (_reportsCache[i].id === reportId) {
          _reportsCache[i].banned = banned;
          var cell = document.getElementById('rep-actions-' + reportId);
          if (cell) cell.innerHTML = reportActionsHtml(_reportsCache[i]);
          break;
        }
      }
    };

    var _reportModalTarget = null;

    window.openConfirmReportModal = function(reportId, reportedName) {
      _reportModalTarget = reportId;
      var old = document.getElementById('confirm-report-modal');
      if (old) old.remove();
      var overlay = document.createElement('div');
      overlay.id = 'confirm-report-modal';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML =
        '<div style="background:#1c1f27;border:1px solid rgba(230,138,141,0.3);border-radius:20px;padding:28px 30px;max-width:440px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.5);">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
            '<div style="font-family:Poppins,sans-serif;font-size:17px;font-weight:700;color:#e68a8d;">Confirmar reporte · ' + U.esc(reportedName) + '</div>' +
            '<button onclick="document.getElementById(\'confirm-report-modal\').remove();_reportModalTarget=null;" style="background:none;border:none;color:#6f7686;font-size:22px;cursor:pointer;line-height:1;padding:0 4px;">×</button>' +
          '</div>' +
          '<div style="margin-bottom:16px;">' +
            '<div style="font-size:11px;font-weight:700;color:#8b93a3;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;">Acción</div>' +
            '<div style="display:flex;flex-direction:column;gap:8px;">' +
              '<label style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid #353a46;cursor:pointer;font-size:13px;color:#cdd2db;"><input type="radio" name="rep-action" value="warn" checked style="accent-color:#e68a8d;"/> Solo registrar (sin ban)</label>' +
              '<label style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid #353a46;cursor:pointer;font-size:13px;color:#cdd2db;"><input type="radio" name="rep-action" value="ban" style="accent-color:#e68a8d;"/> Banear usuario</label>' +
            '</div>' +
          '</div>' +
          '<div id="rep-ban-opts" style="display:none;margin-bottom:16px;">' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;">' +
              ['1 día|1','3 días|3','7 días|7','30 días|30','Permanente|perm'].map(function(d) {
                var parts = d.split('|');
                return '<label style="display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;border:1px solid #353a46;cursor:pointer;font-size:12px;color:#cdd2db;"><input type="radio" name="rep-ban-dur" value="' + parts[1] + '"' + (parts[1]==='7'?' checked':'') + ' style="accent-color:#e68a8d;flex-shrink:0;"/> ' + parts[0] + '</label>';
              }).join('') +
            '</div>' +
          '</div>' +
          '<div style="margin-bottom:18px;">' +
            '<div style="font-size:11px;font-weight:700;color:#8b93a3;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;">Razón del ban (opcional)</div>' +
            '<input id="rep-ban-reason" type="text" placeholder="Motivo..." style="width:100%;height:40px;border-radius:10px;border:1px solid #353a46;background:#2e323d;color:#f4f6f9;font-family:Manrope,sans-serif;font-size:14px;padding:0 14px;outline:none;box-sizing:border-box;" />' +
          '</div>' +
          '<div style="display:flex;gap:10px;">' +
            '<button onclick="document.getElementById(\'confirm-report-modal\').remove();_reportModalTarget=null;" style="flex:1;height:44px;border-radius:10px;border:1px solid #353a46;background:transparent;color:#aab1bf;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Cancelar</button>' +
            '<button id="rep-confirm-btn" onclick="submitConfirmReport()" style="flex:2;height:44px;border-radius:10px;border:1px solid rgba(230,138,141,0.4);background:rgba(230,138,141,0.15);color:#e68a8d;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Confirmar reporte</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) { overlay.remove(); _reportModalTarget = null; }
      });
      Array.prototype.forEach.call(overlay.querySelectorAll('input[name="rep-action"]'), function(radio) {
        radio.addEventListener('change', function() {
          var opts = document.getElementById('rep-ban-opts');
          if (opts) opts.style.display = radio.value === 'ban' ? '' : 'none';
        });
      });
    };

    window.submitConfirmReport = async function() {
      if (!_reportModalTarget) return;
      var actionEl = document.querySelector('input[name="rep-action"]:checked');
      var action   = actionEl ? actionEl.value : 'warn';
      var payload  = { action: action };
      if (action === 'ban') {
        var durEl   = document.querySelector('input[name="rep-ban-dur"]:checked');
        var dur     = durEl ? durEl.value : '7';
        var reason  = (document.getElementById('rep-ban-reason').value || '').trim();
        if (dur === 'perm') { payload.permanent = true; }
        else { payload.ban_days = parseInt(dur, 10); }
        payload.ban_reason = reason || 'Reporte confirmado por administrador';
      }
      var btn = document.getElementById('rep-confirm-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Procesando...'; }
      try {
        var res = await fetch(API.base + '/reports/' + _reportModalTarget + '/confirm', {
          method: 'POST',
          headers: Object.assign({}, API.authHeaders(), {'Content-Type': 'application/json'}),
          body: JSON.stringify(payload),
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        var modal = document.getElementById('confirm-report-modal');
        if (modal) modal.remove();
        _reportModalTarget = null;
        U.toast('Reporte confirmado' + (action === 'ban' ? ' · Usuario baneado' : ''), 'success');
        loadReports();
      } catch(e) {
        U.toast(e.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = 'Confirmar reporte'; }
      }
    };

    loadReports();
  })();
  </script>
  <script src="js/stars.js"></script>
</body>
</html>
