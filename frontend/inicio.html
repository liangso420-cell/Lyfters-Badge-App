<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando...</span>
  <div id="server-wakeup-notice" style="display:none;margin-top:16px;font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;text-align:center;max-width:240px;">
    <img src="assets/icons/ui/reloj-de-arena.png" style="width:32px;height:32px;object-fit:contain;display:block;margin:0 auto 6px;opacity:0.7;" />
    El servidor está despertando...<br>Esto puede tardar hasta 1 minuto.
  </div>
  </div>
  <main id="app" style="padding:24px 16px 80px;max-width:480px;margin:0 auto;"></main>
  <nav class="lyfter-bottom-nav">
    <a href="inicio.html" class="lyfter-nav-item active"><i class="bi bi-house-fill"></i><span>Inicio</span></a>
    <a href="profile.html" class="lyfter-nav-item"><i class="bi bi-compass"></i><span>Explorar</span></a>
    <a href="scan.html" class="lyfter-nav-item"><i class="bi bi-qr-code-scan"></i><span>Escanear</span></a>
    <a href="user-ranking.html" class="lyfter-nav-item"><i class="bi bi-trophy"></i><span>Ranking</span></a>
    <a href="profile-new.html" class="lyfter-nav-item"><i class="bi bi-person-circle"></i><span>Perfil</span></a>
  </nav>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
  (function() {
    'use strict';
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }
    if (['admin','superadmin','god_admin'].indexOf(user.role) !== -1) {
      window.location.replace('workspace-select.html'); return;
    }

    var app = document.getElementById('app');

    function esc(s) { return U ? U.esc(s) : String(s).replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

    async function init() {
      var xpData = null, eventsData = null;
      try {
        var xpRes = await fetch(API.base + '/profile/xp', { headers: API.authHeaders() });
        if (xpRes.ok) xpData = await xpRes.json();
      } catch(e) {}
      try {
        var evRes = await fetch(API.base + '/events', { headers: API.authHeaders() });
        if (evRes.ok) eventsData = await evRes.json();
      } catch(e) {}

      U.hideLoading();

      var xp = xpData || { xp_total: 0, level: 1, level_name: 'Explorador' };
      var firstName = (user.name || '').split(' ')[0] || 'Lyfter';
      var hour = new Date().getHours();
      var greeting = hour < 12 ? 'Buenos días' : hour < 18 ? 'Buenas tardes' : 'Buenas noches';

      var XP_PER_LEVEL = [0, 0, 100, 300, 600, 1000];
      var lvl = xp.level || 1;
      var xpCurr = XP_PER_LEVEL[lvl] || 0;
      var xpNext = XP_PER_LEVEL[lvl + 1] || (xpCurr + 500);
      var xpPct = xpNext > xpCurr
        ? Math.min(100, Math.round(((xp.xp_total - xpCurr) / (xpNext - xpCurr)) * 100))
        : 100;

      var eventsList = (eventsData && (eventsData.events || eventsData)) || [];
      if (!Array.isArray(eventsList)) eventsList = [];

      var evCards = '';
      if (eventsList.length === 0) {
        evCards = '<p style="font-family:Manrope,sans-serif;font-size:14px;color:#8b93a3;text-align:center;padding:24px 0;">No hay eventos disponibles ahora.</p>';
      } else {
        eventsList.slice(0, 4).forEach(function(ev) {
          var s = ev.status || 'active';
          var pillCls = s === 'live' ? 'home-pill home-pill-green' : s === 'upcoming' ? 'home-pill home-pill-purple' : 'home-pill home-pill-orange';
          var pillLbl = s === 'live' ? '<span class="dot-live"></span>En vivo' : s === 'upcoming' ? 'Próximo' : 'Activo';
          evCards +=
            '<a href="event-detail.html?id=' + esc(ev._id || '') + '" class="ev-mini-card">' +
              '<div style="flex:1;min-width:0;">' +
                '<div style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(ev.title || ev.name || 'Evento') + '</div>' +
                '<div style="font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;margin-top:2px;">' + esc(ev.location || ev.workspace_name || '') + '</div>' +
              '</div>' +
              '<span class="' + pillCls + '">' + pillLbl + '</span>' +
            '</a>';
        });
      }

      app.innerHTML =
        '<div style="margin-bottom:22px;">' +
          '<p style="font-family:Manrope,sans-serif;font-size:14px;color:#8b93a3;margin:0 0 2px;">' + greeting + ',</p>' +
          '<h1 style="font-family:Poppins,sans-serif;font-size:26px;font-weight:800;color:#f4f6f9;margin:0;">' + esc(firstName) + '</h1>' +
        '</div>' +

        '<div class="xp-hero-card">' +
          '<div style="display:flex;align-items:baseline;gap:8px;">' +
            '<span class="xp-hero-num">' + (xp.xp_total || 0) + '</span>' +
            '<span class="xp-hero-unit">XP</span>' +
            '<span class="home-pill home-pill-purple" style="margin-left:auto;">Nv. ' + lvl + ' · ' + esc(xp.level_name || 'Explorador') + '</span>' +
          '</div>' +
          '<div class="xp-prog-bar"><div class="xp-prog-fill" style="width:' + Math.max(3, xpPct) + '%;"></div></div>' +
          '<p style="font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;margin:6px 0 0;">' + xpPct + '% hacia el siguiente nivel</p>' +
          '<div class="xp-stat-row">' +
            '<div class="xp-stat-box">' +
              '<div class="xp-stat-num">' + lvl + '</div>' +
              '<div class="xp-stat-lbl">Nivel</div>' +
            '</div>' +
            '<div class="xp-stat-box">' +
              '<div class="xp-stat-num">' + (xpNext - (xp.xp_total || 0) > 0 ? xpNext - (xp.xp_total || 0) : 0) + '</div>' +
              '<div class="xp-stat-lbl">XP para subir</div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        '<a href="scan.html" class="scan-action-btn">' +
          '<div class="scan-icon-circle"><i class="bi bi-qr-code-scan"></i></div>' +
          '<div>' +
            '<div style="font-family:Poppins,sans-serif;font-size:15px;font-weight:700;color:#f4f6f9;">Escanear badge</div>' +
            '<div style="font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;">Gana XP en tu próximo evento</div>' +
          '</div>' +
          '<i class="bi bi-chevron-right" style="margin-left:auto;color:#8b93a3;font-size:16px;"></i>' +
        '</a>' +

        '<div style="margin-top:22px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
            '<h2 style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#f4f6f9;margin:0;">Eventos</h2>' +
            '<a href="profile.html" style="font-family:Manrope,sans-serif;font-size:13px;color:#d897e7;text-decoration:none;">Ver todos</a>' +
          '</div>' +
          evCards +
        '</div>';
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
  <script>
    window.addEventListener('load', function() {
      var ls = document.getElementById('loading-screen');
      ls.style.opacity = '0';
      ls.style.pointerEvents = 'none';
    });
  </script>
</body>
</html>
