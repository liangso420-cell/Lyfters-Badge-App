<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorar eventos — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando...</span>
  <div id="server-wakeup-notice" style="display:none;margin-top:16px;font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;text-align:center;max-width:240px;">
    <img src="assets/icons/ui/reloj-de-arena.png" style="width:32px;height:32px;object-fit:contain;display:block;margin:0 auto 6px;opacity:0.7;" />
    El servidor está despertando...<br>Esto puede tardar hasta 1 minuto.
  </div>
  </div>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function() {
      'use strict';
      var API = window.LyfterAPI;
      var U = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html'); return; }
      if (['admin','superadmin','god_admin'].indexOf(user.role) !== -1) { window.location.replace('workspace-select.html'); return; }

      var app = document.getElementById('app');
      var savedIds = [];

      window.toggleSave = function(eventId) {
        var saved = JSON.parse(localStorage.getItem('saved_events') || '[]');
        var idx = saved.indexOf(eventId);
        if (idx > -1) {
          saved.splice(idx, 1);
          U.toast('Evento eliminado de guardados', 'info');
        } else {
          saved.push(eventId);
          U.toast('Evento guardado', 'success');
        }
        localStorage.setItem('saved_events', JSON.stringify(saved));
        savedIds = saved;
        var btn = document.getElementById('save-btn-' + eventId);
        if (btn) {
          var isSaved = saved.indexOf(eventId) > -1;
          btn.innerHTML = '🔖';
          btn.style.color = isSaved ? '#d897e7' : '#8b93a3';
          btn.style.borderColor = isSaved ? 'rgba(216,151,231,0.4)' : '#2f343f';
          btn.style.background = isSaved ? 'rgba(216,151,231,0.1)' : 'rgba(0,0,0,0.4)';
        }
      };

      function fmtDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' }); }
        catch(e) { return ''; }
      }

      var STATUS_LABELS = {
        upcoming:  { label: 'Próximo',           color: '#3b82f6' },
        open:      { label: 'Abierto',           color: '#16a34a' },
        ongoing:   { label: 'En curso',          color: '#6C63FF' },
        closed:    { label: 'Registro cerrado',  color: '#d97706' },
        postponed: { label: 'Pospuesto',         color: '#9333ea' },
      };

      function eventCard(e, isRecommended) {
        var photoHtml = e.photo
          ? '<img src="' + U.esc(e.photo) + '" class="w-full h-40 object-cover" />'
          : '<div class="w-full h-40 bg-primary-soft flex items-center justify-center"><img src="assets/icons/ui/icono-evento.png" style="width:48px;height:48px;object-fit:contain;opacity:0.7;"></div>';
        var tags = (e.tags || []).slice(0, 3).map(function(t) {
          return '<span class="px-2 py-0.5 rounded-full text-xs bg-white/20 text-white">' + U.esc(t) + '</span>';
        }).join('');
        var badge = isRecommended
          ? '<span class="absolute top-3 left-3 px-2 py-1 rounded-full text-xs font-semibold text-white" style="background:#6C63FF;">' + U.t('recommended_badge') + '</span>'
          : '';
        var statusInfo = STATUS_LABELS[e.status];
        var statusBadge = statusInfo
          ? '<span class="absolute top-3 right-3 px-2 py-1 rounded-full text-xs font-semibold text-white" style="background:' + statusInfo.color + ';">' + statusInfo.label + '</span>'
          : '';
        var isSaved = savedIds.indexOf(e.id) > -1;
        var saveBtnHtml = '<button id="save-btn-' + e.id + '" onclick="event.stopPropagation();toggleSave(\'' + e.id + '\')" ' +
          'style="position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:8px;' +
          'border:1px solid ' + (isSaved ? 'rgba(216,151,231,0.4)' : '#2f343f') + ';' +
          'background:' + (isSaved ? 'rgba(216,151,231,0.1)' : 'rgba(0,0,0,0.4)') + ';' +
          'color:' + (isSaved ? '#d897e7' : '#8b93a3') + ';' +
          'font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">🔖</button>';
        return '<div class="bg-white rounded-card overflow-hidden shadow-soft cursor-pointer hover:shadow-md transition" data-eid="' + e.id + '">' +
          '<div class="relative">' +
            photoHtml +
            '<div class="absolute inset-0 flex flex-col justify-end p-3" style="background:linear-gradient(transparent,rgba(0,0,0,0.6));">' +
              '<p class="text-white font-bold text-sm truncate">' + U.esc(e.name) + '</p>' +
              '<div class="flex gap-1 flex-wrap mt-1">' + tags + '</div>' +
            '</div>' +
            badge +
            statusBadge +
            saveBtnHtml +
          '</div>' +
          '<div class="p-4">' +
            (e.workspace_name ? '<p class="text-xs font-semibold mb-1" style="color:#6C63FF;display:flex;align-items:center;gap:3px;"><img src="assets/icons/ui/icono-evento.png" style="width:12px;height:12px;object-fit:contain;"> ' + U.esc(e.workspace_name) + '</p>' : '') +
            '<p class="text-xs text-gray-400 mb-1" style="display:flex;align-items:center;gap:3px;"><img src="assets/icons/ui/icono-calendario-blanco.png" style="width:14px;height:14px;object-fit:contain;opacity:0.7;filter:brightness(0);"> ' + fmtDate(e.start) + ' — ' + fmtDate(e.end) + '</p>' +
            (e.prize ? '<p class="text-xs text-gray-500">🎁 ' + U.esc(e.prize) + '</p>' : '') +
          '</div>' +
        '</div>';
      }

      function showEventModal(e) {
        var modalRoot = document.getElementById('modal-root') || document.body;
        if (!document.getElementById('modal-root')) {
          var mr = document.createElement('div');
          mr.id = 'modal-root';
          document.body.appendChild(mr);
          modalRoot = mr;
        }
        var photoHtml = e.photo
          ? '<img src="' + U.esc(e.photo) + '" class="w-full h-48 object-cover rounded-t-card" />'
          : '<div class="w-full h-32 bg-primary-soft flex items-center justify-center rounded-t-card"><img src="assets/icons/ui/icono-evento.png" style="width:40px;height:40px;object-fit:contain;opacity:0.7;"></div>';
        var tags = (e.tags || []).map(function(t) {
          return '<span class="px-2 py-1 rounded-full text-xs border border-primary text-primary">' + U.esc(t) + '</span>';
        }).join('');
        var statusInfo = STATUS_LABELS[e.status];

        modalRoot.innerHTML =
          '<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6 anim-fade" style="background:rgba(17,24,39,0.75);" id="event-modal-overlay">' +
            '<div class="bg-white w-full sm:max-w-md rounded-t-card sm:rounded-card overflow-hidden shadow-soft anim-pop">' +
              photoHtml +
              '<div class="p-5">' +
                '<div class="flex items-start justify-between mb-2">' +
                  '<h2 class="text-lg font-bold text-gray-800 flex-1">' + U.esc(e.name) + '</h2>' +
                  (statusInfo ? '<span class="ml-2 px-2 py-1 rounded-full text-xs font-semibold text-white flex-shrink-0" style="background:' + statusInfo.color + ';">' + statusInfo.label + '</span>' : '') +
                '</div>' +
                (e.workspace_name ? '<p class="text-xs font-semibold mb-2" style="color:#6C63FF;display:flex;align-items:center;gap:3px;"><img src="assets/icons/ui/icono-evento.png" style="width:12px;height:12px;object-fit:contain;"> ' + U.esc(e.workspace_name) + '</p>' : '') +
                (e.description ? '<p class="text-sm text-gray-500 mb-3">' + U.esc(e.description) + '</p>' : '') +
                '<div class="space-y-2 mb-4">' +
                  '<p class="text-xs text-gray-500 flex items-center gap-2"><img src="assets/icons/ui/icono-calendario-blanco.png" style="width:14px;height:14px;object-fit:contain;opacity:0.6;filter:brightness(0);"> ' + fmtDate(e.start) + ' — ' + fmtDate(e.end) + '</p>' +
                  (e.location ? '<p class="text-xs text-gray-500 flex items-center gap-2"><img src="assets/icons/ui/icono-ubicacion.png" style="width:14px;height:14px;object-fit:contain;opacity:0.7;filter:brightness(0);"> ' + U.esc(e.location) + '</p>' : '') +
                  (e.prize ? '<p class="text-xs text-gray-500 flex items-center gap-2">🎁 ' + U.esc(e.prize) + '</p>' : '') +
                '</div>' +
                (tags ? '<div class="flex flex-wrap gap-2 mb-4">' + tags + '</div>' : '') +
                '<div class="p-3 rounded-card mb-4" style="background:#EEEDFF;">' +
                  '<p class="text-xs text-primary font-semibold">' + U.t('how_to_participate') + '</p>' +
                  '<p class="text-xs text-gray-600 mt-1">' + U.t('how_to_participate_desc') + '</p>' +
                '</div>' +
                '<button id="modal-close" class="w-full py-2.5 rounded-btn border border-gray-200 text-sm font-medium text-gray-600">' + U.t('close') + '</button>' +
              '</div>' +
            '</div>' +
          '</div>';

        document.getElementById('modal-close').addEventListener('click', function() { modalRoot.innerHTML = ''; });
        document.getElementById('event-modal-overlay').addEventListener('click', function(ev) {
          if (ev.target === this) modalRoot.innerHTML = '';
        });
      }

      async function init() {
        try {
          savedIds = JSON.parse(localStorage.getItem('saved_events') || '[]');
          var allEvents, recommended;
          var results = await Promise.all([
            API.listEvents(),
            API.getRecommended().catch(function() { return []; })
          ]);
          allEvents = results[0];
          recommended = results[1];

          var recommendedIds = recommended.map(function(e) { return e.id; });
          var otherEvents = allEvents.filter(function(e) { return recommendedIds.indexOf(e.id) === -1; });

          var recommendedSection = recommended.length
            ? '<div class="mb-8">' +
                '<h2 class="text-lg font-bold text-gray-800 mb-4">' + U.t('recommended_for_you') + '</h2>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                  recommended.map(function(e) { return eventCard(e, true); }).join('') +
                '</div>' +
              '</div>'
            : '';

          var allSection = otherEvents.length
            ? '<div>' +
                '<h2 class="text-lg font-bold text-gray-800 mb-4">' + U.t('all_events') + '</h2>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                  otherEvents.map(function(e) { return eventCard(e, false); }).join('') +
                '</div>' +
              '</div>'
            : '';

          var emptyHtml = (!recommended.length && !otherEvents.length)
            ? '<div class="text-center py-16 text-gray-400">' +
                '<div class="mb-4"><img src="assets/icons/ui/icono-evento.png" style="width:48px;height:48px;object-fit:contain;opacity:0.5;"></div>' +
                '<p class="text-sm">' + U.t('no_events_available') + '</p>' +
              '</div>'
            : '';

          app.innerHTML =
            '<div class="max-w-2xl mx-auto px-4 py-6 pb-28">' +
              '<div class="flex items-center gap-3 mb-6">' +
                '<button id="back-btn" class="w-9 h-9 rounded-full bg-white shadow-soft flex items-center justify-center text-gray-600 hover:bg-gray-50">←</button>' +
                '<h1 class="text-xl font-bold text-gray-800 flex-1">' + U.t('explore_events_title') + '</h1>' +
                '<button id="global-lb-btn" class="px-3 py-1.5 rounded-btn text-xs font-medium text-primary border border-primary hover:bg-primary-soft">🌍 Ranking</button>' +
              '</div>' +
              '<div style="position:relative;margin-bottom:20px;">' +
                '<input id="events-search" type="text" placeholder="Buscar por nombre o tag..." ' +
                'style="width:100%;padding:12px 16px 12px 44px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#f4f6f9;font-size:14px;outline:none;box-sizing:border-box;" />' +
                '<span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;">🔍</span>' +
              '</div>' +
              '<div id="active-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;"></div>' +
              recommendedSection +
              allSection +
              emptyHtml +
            '</div>' +
            '<div class="fixed bottom-0 left-0 right-0 flex justify-center pb-6 pointer-events-none z-30">' +
              '<button id="fab-scan" class="pointer-events-auto px-7 py-4 rounded-full text-white font-semibold shadow-soft flex items-center gap-2 active:scale-95 transition" ' +
                'style="background:#6C63FF; box-shadow:0 4px 24px rgba(108,99,255,0.5);">' + U.t('scan_qr') + '</button>' +
            '</div>';
          U.hideLoading();
          document.getElementById('back-btn').addEventListener('click', function() { window.location.href = 'profile.html'; });
          document.getElementById('fab-scan').addEventListener('click', function() { window.location.href = 'scan.html'; });
          document.getElementById('global-lb-btn').addEventListener('click', function() { window.location.href = 'leaderboard.html'; });

          Array.prototype.forEach.call(document.querySelectorAll('[data-eid]'), function(card) {
            card.addEventListener('click', function() {
              var eid = card.getAttribute('data-eid');
              var eventData = allEvents.concat(recommended).find(function(e) { return e.id === eid; });
              if (!eventData) return;
              showEventModal(eventData);
            });
          });

          var eventsSearch = document.getElementById('events-search');
          if (eventsSearch) {
            eventsSearch.addEventListener('input', function() {
              var q = eventsSearch.value.trim().toLowerCase();

              Array.prototype.forEach.call(document.querySelectorAll('[data-eid]'), function(card) {
                if (!q) { card.style.display = ''; return; }
                var eid = card.getAttribute('data-eid');
                var eventData = allEvents.concat(recommended).find(function(e) { return e.id === eid; });
                if (!eventData) { card.style.display = ''; return; }
                var name = eventData.name.toLowerCase();
                var tags = (eventData.tags || []).join(' ').toLowerCase();
                var match = name.includes(q) || tags.includes(q);
                card.style.display = match ? '' : 'none';
              });

              var activeTags = document.getElementById('active-tags');
              if (activeTags && q.length > 1) {
                var matchingTags = [];
                allEvents.concat(recommended).forEach(function(e) {
                  (e.tags || []).forEach(function(tag) {
                    if (tag.toLowerCase().includes(q) && matchingTags.indexOf(tag) === -1) {
                      matchingTags.push(tag);
                    }
                  });
                });
                activeTags.innerHTML = matchingTags.slice(0, 8).map(function(tag) {
                  return '<button class="tag-filter-btn" data-tag="' + U.esc(tag) + '" ' +
                    'style="padding:4px 12px;border-radius:999px;border:1px solid #6C63FF;background:rgba(108,99,255,0.15);color:#6C63FF;font-size:12px;cursor:pointer;">' +
                    U.esc(tag) + '</button>';
                }).join('');

                Array.prototype.forEach.call(activeTags.querySelectorAll('.tag-filter-btn'), function(btn) {
                  btn.addEventListener('click', function() {
                    eventsSearch.value = btn.getAttribute('data-tag');
                    eventsSearch.dispatchEvent(new Event('input'));
                    activeTags.innerHTML = '';
                  });
                });
              } else if (activeTags) {
                activeTags.innerHTML = '';
              }
            });
          }

        } catch(err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          U.hideLoading();
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
      }

      setTimeout(U.hideLoading, 6000);
      init();
    })();
  </script>
  <script>
    window.addEventListener('load', () => {
      const ls = document.getElementById('loading-screen');
      ls.style.opacity = '0';
      ls.style.pointerEvents = 'none';
    });
  </script>
  <script src="js/stars.js"></script>
</body>
</html>
