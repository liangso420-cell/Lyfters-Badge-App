<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reseñas — Lyfter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando reseñas...</span>
  </div>
  <div id="app" style="position:relative;z-index:1;max-width:600px;margin:0 auto;padding:24px 16px;"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/particles.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }

    var qs = new URLSearchParams(window.location.search);
    var eventId = qs.get('event');
    var eventName = qs.get('name') || 'Evento';
    var app = document.getElementById('app');

    if (!eventId) { window.location.replace('user-events.html'); return; }

    async function init() {
      app.innerHTML =
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">' +
          '<button onclick="history.back()" style="width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#f4f6f9;font-size:18px;cursor:pointer;">←</button>' +
          '<h1 style="font-family:Poppins,sans-serif;font-size:20px;font-weight:700;color:#f4f6f9;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Reseñas</h1>' +
        '</div>' +
        '<div id="reviews-container"><p style="color:#8b93a3;text-align:center;padding:32px;">Cargando...</p></div>';

      U.hideLoading();

      try {
        var data = await fetch(API.base + '/events/' + eventId + '/reviews', {
          headers: API.authHeaders()
        }).then(r => r.json());

        var reviewsList = data.reviews || [];
        var container = document.getElementById('reviews-container');

        if (!reviewsList.length) {
          container.innerHTML =
            '<div style="text-align:center;padding:48px 24px;">' +
              '<div style="font-size:48px;margin-bottom:12px;">⭐</div>' +
              '<p style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#f4f6f9;margin:0 0 8px;">Sin reseñas aún</p>' +
              '<p style="font-family:Manrope,sans-serif;font-size:13px;color:#8b93a3;">Sé el primero en dejar una reseña.</p>' +
            '</div>';
          return;
        }

        var labels = {
          recommend: { si: 'Sí', no: 'No', talvez: 'Tal vez' },
          best_part: { organizacion: 'Organización', contenido: 'Contenido', networking: 'Networking', badges: 'Badges', otro: 'Otro' },
          return_again: { si: 'Sí', no: 'No', depende: 'Depende' }
        };

        container.innerHTML =
          '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:16px;padding:20px;margin-bottom:20px;text-align:center;">' +
            '<div style="font-size:48px;font-weight:800;color:#ffc850;font-family:Poppins,sans-serif;">' + data.avg_rating + '</div>' +
            '<div style="font-size:24px;color:#ffc850;">' + '★'.repeat(Math.round(data.avg_rating)) + '<span style="color:#2e323d;">' + '★'.repeat(5 - Math.round(data.avg_rating)) + '</span></div>' +
            '<div style="font-size:13px;color:#8b93a3;margin-top:6px;">' + data.total + ' reseña' + (data.total !== 1 ? 's' : '') + '</div>' +
          '</div>' +

          reviewsList.map(function(r) {
            var initials = (r.user_name || '?').split(' ').map(function(w){ return w[0]||''; }).join('').slice(0,2).toUpperCase();
            var stars = '★'.repeat(r.rating) + '<span style="color:#2e323d;">' + '★'.repeat(5 - r.rating) + '</span>';
            return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:18px;margin-bottom:12px;">' +
              '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
                '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d897e7,#e68a8d);display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;font-size:12px;font-weight:700;color:#1c1f27;flex-shrink:0;">' + initials + '</div>' +
                '<div style="flex:1;min-width:0;">' +
                  '<div style="font-family:Poppins,sans-serif;font-size:13px;font-weight:700;color:#f4f6f9;">' + U.esc(r.user_name) + '</div>' +
                  '<div style="font-size:16px;color:#ffc850;">' + stars + '</div>' +
                '</div>' +
              '</div>' +
              '<div style="display:flex;flex-wrap:wrap;gap:8px;">' +
                (r.recommend ? pill('¿Recomendaría?', labels.recommend[r.recommend] || r.recommend, '#70cfff') : '') +
                (r.best_part ? pill('Lo mejor', labels.best_part[r.best_part] || r.best_part, '#d897e7') : '') +
                (r.return_again ? pill('¿Volvería?', labels.return_again[r.return_again] || r.return_again, '#4ade80') : '') +
              '</div>' +
            '</div>';
          }).join('');

      } catch(e) {
        document.getElementById('reviews-container').innerHTML =
          '<p style="color:#e68a8d;text-align:center;padding:32px;">Error al cargar reseñas.</p>';
      }
    }

    function pill(label, value, color) {
      return '<div style="background:rgba(255,255,255,0.04);border:1px solid #2f343f;border-radius:8px;padding:6px 10px;">' +
        '<div style="font-size:10px;color:#8b93a3;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">' + label + '</div>' +
        '<div style="font-size:12px;color:' + color + ';font-weight:700;margin-top:2px;">' + value + '</div>' +
      '</div>';
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
</body>
</html>
