<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logros — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando...</span>
  <div id="server-wakeup-notice" style="display:none;margin-top:16px;font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;text-align:center;max-width:240px;">
    <img src="assets/icons/ui/reloj-de-arena.png" style="width:32px;height:32px;object-fit:contain;display:block;margin:0 auto 6px;opacity:0.7;" />
    El servidor está despertando...<br>Esto puede tardar hasta 1 minuto.
  </div>
  </div>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search)); return; }
      if (['admin','superadmin','god_admin'].indexOf(user.role) !== -1) { window.location.replace('workspace-select.html'); return; }

      var app = document.getElementById('app');

      function navHtml() {
        return '<div style="display:flex;gap:4px;margin-bottom:24px;background:#1c1f27;border:1px solid #2f343f;border-radius:12px;padding:4px;">' +
          '<a href="profile.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Explorar</a>' +
          '<a href="user-events.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Eventos</a>' +
          '<a href="scan.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Escanear</a>' +
          '<a href="user-achievements.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:700;background:linear-gradient(135deg,rgba(216,151,231,0.3),rgba(230,138,141,0.2));color:#f4f6f9;">Logros</a>' +
          '<a href="user-ranking.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Ranking</a>' +
        '</div>';
      }

      function achievementCard(a, unlocked) {
        var rarityColors = {
          common:    { border: '#353a46', glow: 'transparent' },
          rare:      { border: '#22c55e', glow: 'rgba(34,197,94,0.1)' },
          epic:      { border: '#7c3aed', glow: 'rgba(124,58,237,0.1)' },
          legendary: { border: '#eab308', glow: 'rgba(234,179,8,0.15)' }
        };
        var rc = rarityColors[a.rarity] || rarityColors.common;
        var rarityLabels = { common: 'Común', rare: 'Raro', epic: 'Épico', legendary: 'Legendario' };

        return '<div style="background:' + (unlocked ? rc.glow : '#1a1d24') + ';border:1px solid ' + (unlocked ? rc.border : '#2f343f') + ';border-radius:16px;padding:20px;text-align:center;transition:transform 0.2s;"' +
          (unlocked ? ' onmouseover="this.style.transform=\'translateY(-2px)\'" onmouseout="this.style.transform=\'none\'"' : '') + '>' +
          '<div style="width:80px;height:80px;margin:0 auto 12px;' + (unlocked ? '' : 'filter:grayscale(1);opacity:0.3;') + '">' +
            (a.img
              ? '<img src="' + U.esc(a.img) + '" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<span style=&quot;font-size:40px;line-height:80px;display:block;&quot;>' + a.icon + '</span>\'" />'
              : '<span style="font-size:40px;line-height:80px;display:block;">' + a.icon + '</span>') +
          '</div>' +
          '<p style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:' + (unlocked ? '#f4f6f9' : '#4a5060') + ';margin:0 0 4px;">' + U.esc(a.name) + '</p>' +
          '<p style="font-family:Manrope,sans-serif;font-size:11px;color:' + (unlocked ? '#8b93a3' : '#3a3f4a') + ';margin:0 0 8px;">' + U.esc(a.description || a.hint || '') + '</p>' +
          (unlocked
            ? '<span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;color:white;background:' + rc.border + ';">' + (rarityLabels[a.rarity] || 'Común') + ' · +' + (a.xp_reward || 0) + ' XP</span>'
            : '<div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:8px;"><img src="assets/icons/ui/icono-candado.png" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;"><span style="font-size:11px;color:#3a3f4a;font-family:Manrope,sans-serif;">Bloqueado</span></div>') +
        '</div>';
      }

      async function init() {
        try {
          var profile   = await API.getProfile();
          var achData   = await API.getAchievements().catch(function() { return null; });
          var xpProfile = await API.getXpProfile().catch(function() { return null; });

          var avatarHtml = profile.avatar
            ? '<img src="' + U.esc(profile.avatar) + '" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(216,151,231,0.5);">'
            : '<img src="assets/icons/ui/icono-perfil.png" style="width:40px;height:40px;border-radius:50%;object-fit:contain;background:#2e323d;padding:6px;">';

          var xpBarHtml = xpProfile ? U.xpBarHtml(xpProfile) : '';

          var achHtml = '';
          if (!achData) {
            achHtml = '<p style="color:#8b93a3;font-family:Manrope,sans-serif;text-align:center;padding:32px;">No hay logros disponibles.</p>';
          } else {
            var unlocked = achData.unlocked || [];
            var locked   = achData.locked   || [];

            if (unlocked.length) {
              achHtml +=
                '<h3 style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#f4f6f9;margin:0 0 14px;">Desbloqueados (' + unlocked.length + ')</h3>' +
                '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px;">' +
                  unlocked.map(function(a) { return achievementCard(a, true); }).join('') +
                '</div>';
            }

            if (locked.length) {
              achHtml +=
                '<h3 style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#4a5060;margin:0 0 14px;">Bloqueados (' + locked.length + ')</h3>' +
                '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">' +
                  locked.map(function(a) { return achievementCard(a, false); }).join('') +
                '</div>';
            }

            if (!unlocked.length && !locked.length) {
              achHtml = '<p style="color:#8b93a3;font-family:Manrope,sans-serif;text-align:center;padding:32px;">No hay logros disponibles.</p>';
            }
          }

          var inner =
            '<div style="min-height:100vh;padding:20px 16px 40px;">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
                '<h2 style="font-family:Poppins,sans-serif;font-size:22px;font-weight:700;color:#f4f6f9;margin:0;">Logros</h2>' +
                '<button id="profile-menu-btn" style="background:transparent;border:none;cursor:pointer;padding:0;">' + avatarHtml + '</button>' +
              '</div>' +
              navHtml() +
              xpBarHtml +
              (xpBarHtml ? '<div style="margin-bottom:24px;"></div>' : '') +
              achHtml +
            '</div>';

          app.innerHTML = inner;

          document.getElementById('profile-menu-btn').addEventListener('click', async function() {
            try {
              var p = await API.getProfile();
              U.showDrawer(p.avatar, p.nombre, null, false);
            } catch(e) { U.showDrawer(null, null, null, false); }
          });

        } catch(err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
        window.scrollTo(0, 0);
      }

      init();
    })();
  </script>
  <script>
    window.addEventListener('load', () => {
      const ls = document.getElementById('loading-screen');
      ls.style.opacity = '0';
      ls.style.pointerEvents = 'none';
    });
  </script>
</body>
</html>
