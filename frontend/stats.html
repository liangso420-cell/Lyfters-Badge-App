<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estadísticas — Lyfter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando estadísticas...</span>
    <div id="server-wakeup-notice" style="display:none;margin-top:16px;font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;text-align:center;max-width:240px;">
      <img src="assets/icons/ui/reloj-de-arena.png" style="width:32px;height:32px;object-fit:contain;display:block;margin:0 auto 6px;opacity:0.7;" />
      El servidor está despertando...<br>Esto puede tardar hasta 1 minuto.
    </div>
  </div>
  <div id="app" style="position:relative;z-index:1;width:100%;max-width:100%;margin:0 auto;padding:24px clamp(16px,4vw,44px) 70px;"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }
    if (['admin','superadmin','god_admin'].indexOf(user.role) === -1) {
      window.location.replace('profile.html'); return;
    }

    var app = document.getElementById('app');
    var isGod = user.role === 'god_admin';

    async function init() {
      app.innerHTML = renderHeader();
      U.hideLoading();

      if (isGod) {
        await renderGodStats();
      } else {
        await renderWorkspaceStats();
      }
    }

    function renderHeader() {
      return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">' +
        '<button onclick="history.back()" style="width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#f4f6f9;font-size:18px;cursor:pointer;">←</button>' +
        '<h1 style="font-family:Poppins,sans-serif;font-size:22px;font-weight:700;color:#f4f6f9;margin:0;">Estadísticas</h1>' +
      '</div>';
    }

    // ── GOD ADMIN STATS ──
    async function renderGodStats() {
      try {
        var stats = await fetch(API.base + '/admin/stats/global', { headers: API.authHeaders() }).then(r => r.json());
        var wsRes = await fetch(API.base + '/workspaces/', { headers: API.authHeaders() }).then(r => r.json());

        app.insertAdjacentHTML('beforeend', kpiCards([
          { label: 'Workspaces', value: wsRes.length || 0, icon: 'icono-usuarios.png', color: '#70cfff' },
          { label: 'Usuarios totales', value: stats.total_users || 0, icon: 'icono-participantes.png', color: '#d897e7' },
          { label: 'Eventos totales', value: stats.total_events || 0, icon: 'icono-evento.png', color: '#e68a8d' },
          { label: 'Badges canjeados', value: stats.total_redeemed || 0, icon: 'icono-reclamado.png', color: '#4ade80' },
        ]));

        app.insertAdjacentHTML('beforeend', chartCard('chart-ws', 'Workspaces más activos'));
        renderBarChart('chart-ws', wsRes.map(function(w){ return w.name; }), wsRes.map(function(w){ return w.member_count || 0; }), '#70cfff');

        if (stats.users_by_month) {
          app.insertAdjacentHTML('beforeend', chartCard('chart-users', 'Crecimiento de usuarios'));
          renderLineChart('chart-users', stats.users_by_month.labels, stats.users_by_month.data, '#d897e7');
        }

        app.insertAdjacentHTML('beforeend',
          '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:20px;margin-bottom:16px;">' +
            '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 12px;">Ver estadísticas de workspace</h3>' +
            '<select id="ws-selector" onchange="loadWorkspaceStats(this.value)" style="width:100%;height:44px;border-radius:10px;border:1px solid #2f343f;background:#2e323d;color:#f4f6f9;font-family:Manrope,sans-serif;font-size:14px;padding:0 12px;">' +
              '<option value="">Seleccioná un workspace...</option>' +
              wsRes.map(function(w) { return '<option value="' + (w.id||w._id) + '">' + U.esc(w.name) + '</option>'; }).join('') +
            '</select>' +
            '<div id="ws-stats-container"></div>' +
          '</div>');

        window.loadWorkspaceStats = async function(wsId) {
          if (!wsId) return;
          var container = document.getElementById('ws-stats-container');
          container.innerHTML = '<p style="color:#8b93a3;font-size:13px;padding:16px;text-align:center;">Cargando...</p>';
          try {
            var eventsRes = await fetch(API.base + '/admin/events?ws_override=' + wsId, { headers: API.authHeaders() }).then(function(r){ return r.json(); });
            container.innerHTML = '';
            if (!eventsRes.length) {
              container.innerHTML = '<p style="color:#8b93a3;font-size:13px;padding:16px;text-align:center;">Sin eventos en este workspace.</p>';
              return;
            }
            eventsRes.forEach(function(ev) {
              var card = document.createElement('div');
              card.style.cssText = 'background:#2e323d;border-radius:12px;padding:14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;';
              var evId = ev.id || ev._id;
              var evName = U.esc(ev.name || ev.nombre || '');
              card.setAttribute('data-event-id', evId);
              card.innerHTML =
                '<div style="font-family:Poppins,sans-serif;font-size:14px;font-weight:600;color:#f4f6f9;">' + evName + '</div>' +
                '<a href="event-stats.html?event=' + evId + '&name=' + encodeURIComponent(ev.name||ev.nombre||'') + '" style="padding:6px 14px;border-radius:8px;background:rgba(112,207,255,0.15);color:#70cfff;font-family:Poppins,sans-serif;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;">Ver stats →</a>';
              container.appendChild(card);
            });
          } catch(e) {
            container.innerHTML = '<p style="color:#e68a8d;font-size:13px;padding:16px;text-align:center;">Error al cargar eventos.</p>';
          }
        };

      } catch(e) {
        app.insertAdjacentHTML('beforeend', errorCard('No se pudieron cargar las estadísticas globales.'));
      }
    }

    // ── ADMIN / SUPERADMIN STATS ──
    async function renderWorkspaceStats() {
      try {
        var eventsRes = await fetch(API.base + '/admin/events', { headers: API.authHeaders() }).then(r => r.json());

        app.insertAdjacentHTML('beforeend', kpiCards([
          { label: 'Eventos', value: eventsRes.length || 0, icon: 'icono-evento.png', color: '#70cfff' },
          { label: 'Participantes', value: eventsRes.reduce(function(a,e){ return a + (e.participant_count||0); }, 0), icon: 'icono-participantes.png', color: '#d897e7' },
        ]));

        app.insertAdjacentHTML('beforeend', '<div id="events-list"></div>');
        var evList = document.getElementById('events-list');
        eventsRes.forEach(function(ev) {
          var card = document.createElement('div');
          card.style.cssText = 'background:#1c1f27;border:1px solid #2f343f;border-radius:16px;padding:18px;margin-bottom:12px;';
          var evId = ev.id || ev._id;
          var evName = U.esc(ev.name || ev.nombre || '');
          card.setAttribute('data-event-id', evId);
          card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div>' +
              '<div style="font-family:Poppins,sans-serif;font-size:15px;font-weight:700;color:#f4f6f9;">' + evName + '</div>' +
              '<div style="font-size:12px;color:#8b93a3;margin-top:4px;">' + (ev.status||'') + '</div>' +
            '</div>' +
            '<a href="event-stats.html?event=' + evId + '&name=' + encodeURIComponent(ev.name||ev.nombre||'') + '" style="padding:8px 16px;border-radius:8px;background:rgba(112,207,255,0.15);color:#70cfff;font-family:Poppins,sans-serif;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;">Ver stats →</a>' +
          '</div>';
          evList.appendChild(card);
        });

      } catch(e) {
        app.insertAdjacentHTML('beforeend', errorCard('No se pudieron cargar los eventos.'));
      }
    }

    // ── STATS DE EVENTO ESPECÍFICO ──
    window.loadEventStats = async function(eventId, eventName) {
      var containerId = 'event-stats-' + eventId;
      var existing = document.getElementById(containerId);
      if (!existing) {
        var parentCard = document.querySelector('[data-event-id="' + eventId + '"]');
        if (!parentCard) return;
        var div = document.createElement('div');
        div.id = containerId;
        div.style.cssText = 'background:#15171d;border:1px solid #2f343f;border-radius:12px;padding:16px;margin-top:8px;';
        parentCard.insertAdjacentElement('afterend', div);
        existing = div;
      }
      existing.innerHTML = '<p style="color:#8b93a3;font-size:13px;text-align:center;padding:16px;">Cargando...</p>';

      try {
        var stats = await fetch(API.base + '/admin/events/' + eventId + '/stats', { headers: API.authHeaders() }).then(r => r.json());
        var participants = stats.participants || [];
        var badgeStats = stats.badge_stats || [];
        var hourlyStats = stats.hourly_scans || [];
        var reviews = stats.reviews || {};

        existing.innerHTML =
          kpiCards([
            { label: 'Participantes', value: participants.length, icon: 'icono-participantes.png', color: '#70cfff' },
            { label: 'Completaron 100%', value: participants.filter(function(p){ return p.progress === 100; }).length, icon: 'icono-reclamado.png', color: '#4ade80' },
            { label: 'Promedio progreso', value: Math.round(participants.reduce(function(a,p){ return a+(p.progress||0); },0)/(participants.length||1)) + '%', icon: 'icono-badges-creados.png', color: '#d897e7' },
          ]) +
          (reviews.total > 0
            ? '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center;">' +
                '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 12px;">Reseñas</h3>' +
                '<div style="font-size:40px;font-weight:800;color:#ffc850;font-family:Poppins,sans-serif;">' + reviews.avg_rating + '</div>' +
                '<div style="font-size:18px;color:#ffc850;">' + '★'.repeat(Math.round(reviews.avg_rating)) + '☆'.repeat(5 - Math.round(reviews.avg_rating)) + '</div>' +
                '<div style="font-size:12px;color:#8b93a3;margin-top:4px;">' + reviews.total + ' reseñas</div>' +
                chartCard('chart-reviews-' + eventId, 'Distribución de calificaciones') +
              '</div>'
            : '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;color:#8b93a3;font-size:13px;">Sin reseñas aún</div>') +
          (badgeStats.length ? chartCard('chart-badges-' + eventId, 'Badges más escaneados') : '') +
          (hourlyStats.length ? chartCard('chart-hours-' + eventId, 'Hora pico de escaneos') : '') +
          participantsTable(participants) +
          '<button onclick="exportToExcel(\'' + eventId + '\',\'' + U.esc(eventName) + '\')" style="width:100%;margin-top:16px;padding:14px;border-radius:12px;border:1px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.1);color:#4ade80;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Exportar a Excel</button>';

        window['_eventStats_' + eventId] = { participants: participants, badgeStats: badgeStats, eventName: eventName };

        setTimeout(function() {
          if (reviews.total > 0) {
            var dist = reviews.distribution || {};
            renderBarChart('chart-reviews-' + eventId, ['1★','2★','3★','4★','5★'], [dist[1]||0, dist[2]||0, dist[3]||0, dist[4]||0, dist[5]||0], '#ffc850');
          }
          if (badgeStats.length) renderBarChart('chart-badges-' + eventId, badgeStats.map(function(b){ return b.name; }), badgeStats.map(function(b){ return b.count; }), '#d897e7');
          if (hourlyStats.length) renderBarChart('chart-hours-' + eventId, hourlyStats.map(function(h){ return h.hour + 'h'; }), hourlyStats.map(function(h){ return h.count; }), '#70cfff');
        }, 100);

      } catch(e) {
        existing.innerHTML = '<p style="color:#e68a8d;font-size:13px;text-align:center;padding:16px;">Error al cargar stats.</p>';
      }
    };

    // ── EXPORTAR EXCEL ──
    window.exportToExcel = function(eventId, eventName) {
      var data = window['_eventStats_' + eventId];
      if (!data) return;

      var wb = XLSX.utils.book_new();

      var participantsData = [['Nombre', 'Email', 'Badges obtenidos', 'Total badges', 'Progreso %']].concat(
        data.participants.map(function(p) {
          return [p.name, p.email, p.badges_obtained, p.total_badges, p.progress + '%'];
        })
      );
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(participantsData), 'Participantes');

      var badgesData = [['Badge', 'Veces escaneado']].concat(
        data.badgeStats.map(function(b) { return [b.name, b.count]; })
      );
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(badgesData), 'Badges');

      XLSX.writeFile(wb, (eventName || 'evento') + '_stats.xlsx');
      U.toast('Excel descargado', 'success');
    };

    // ── HELPERS UI ──
    function kpiCards(items) {
      return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;">' +
        items.map(function(item) {
          return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;text-align:center;">' +
            '<img src="assets/icons/ui/' + item.icon + '" style="width:28px;height:28px;object-fit:contain;margin-bottom:8px;" />' +
            '<div style="font-family:Poppins,sans-serif;font-size:24px;font-weight:800;color:' + item.color + ';">' + item.value + '</div>' +
            '<div style="font-size:12px;color:#8b93a3;margin-top:4px;">' + item.label + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
    }

    function chartCard(id, title) {
      return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:20px;margin-bottom:16px;">' +
        '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 16px;">' + title + '</h3>' +
        '<canvas id="' + id + '" height="200"></canvas>' +
      '</div>';
    }

    function participantsTable(participants) {
      if (!participants.length) return '<p style="color:#8b93a3;text-align:center;padding:16px;">Sin participantes aún.</p>';
      return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;margin-bottom:16px;overflow-x:auto;">' +
        '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 12px;">Participantes</h3>' +
        '<table style="width:100%;border-collapse:collapse;font-family:Manrope,sans-serif;font-size:13px;">' +
          '<thead><tr style="border-bottom:1px solid #2f343f;">' +
            '<th style="text-align:left;padding:8px 12px;color:#8b93a3;font-weight:700;">Nombre</th>' +
            '<th style="text-align:center;padding:8px 12px;color:#8b93a3;font-weight:700;">Badges</th>' +
            '<th style="text-align:center;padding:8px 12px;color:#8b93a3;font-weight:700;">Progreso</th>' +
          '</tr></thead>' +
          '<tbody>' +
            participants.map(function(p) {
              var pct = p.progress || 0;
              var color = pct === 100 ? '#4ade80' : pct > 50 ? '#d897e7' : '#8b93a3';
              return '<tr style="border-bottom:1px solid #1a1d24;">' +
                '<td style="padding:10px 12px;color:#f4f6f9;">' + U.esc(p.name||'') + '</td>' +
                '<td style="padding:10px 12px;text-align:center;color:#f4f6f9;">' + (p.badges_obtained||0) + '/' + (p.total_badges||0) + '</td>' +
                '<td style="padding:10px 12px;text-align:center;color:' + color + ';font-weight:700;">' + pct + '%</td>' +
              '</tr>';
            }).join('') +
          '</tbody>' +
        '</table>' +
      '</div>';
    }

    function errorCard(msg) {
      return '<div style="text-align:center;padding:32px;color:#8b93a3;font-size:14px;">' +
        '<img src="assets/icons/ui/icono-alerta.png" style="width:40px;height:40px;object-fit:contain;margin-bottom:12px;opacity:0.6;" />' +
        '<p>' + msg + '</p>' +
      '</div>';
    }

    function renderBarChart(id, labels, data, color) {
      var ctx = document.getElementById(id);
      if (!ctx) return;
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{ data: data, backgroundColor: color + '66', borderColor: color, borderWidth: 2, borderRadius: 6 }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8b93a3' }, grid: { color: '#2f343f' } },
            y: { ticks: { color: '#8b93a3' }, grid: { color: '#2f343f' } }
          }
        }
      });
    }

    function renderLineChart(id, labels, data, color) {
      var ctx = document.getElementById(id);
      if (!ctx) return;
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{ data: data, borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.4, pointBackgroundColor: color }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8b93a3' }, grid: { color: '#2f343f' } },
            y: { ticks: { color: '#8b93a3' }, grid: { color: '#2f343f' } }
          }
        }
      });
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
</body>
</html>
