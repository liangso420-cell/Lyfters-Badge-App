<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canjear badge — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando...</span>
  <div id="server-wakeup-notice" style="display:none;margin-top:16px;font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;text-align:center;max-width:240px;">
    <img src="assets/icons/ui/reloj-de-arena.png" style="width:32px;height:32px;object-fit:contain;display:block;margin:0 auto 6px;opacity:0.7;" />
    El servidor está despertando...<br>Esto puede tardar hasta 1 minuto.
  </div>
  </div>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;
      var app = document.getElementById('app');

      /* ── 1. Extraer event_id y token desde el path o query params ── */
      function parseParams() {
        // Formato canónico: /redeem/{event_id}/{token}  (Vercel con rewrite)
        var pathMatch = window.location.pathname.match(/\/redeem\/([^\/]+)\/([^\/\s]+)/);
        if (pathMatch) return { eventId: pathMatch[1], token: pathMatch[2] };

        // Fallback para dev con Live Server: ?event={event_id}&token={token}
        var qs = new URLSearchParams(window.location.search);
        var eventId = qs.get('event');
        var token   = qs.get('token');
        if (eventId && token) return { eventId: eventId, token: token };

        return null;
      }

      var params = parseParams();

      /* ── 2. URL inválida ── */
      if (!params) {
        app.innerHTML =
          '<section class="device-frame px-4 pt-24 text-center">' +
            '<div class="text-5xl mb-4">🔍</div>' +
            '<p class="text-base font-semibold text-gray-700">' + U.t('redeem_not_recognized') + '</p>' +
            '<p class="text-sm text-gray-400 mt-2">' + U.t('redeem_not_recognized_desc') + '</p>' +
            '<a href="profile.html" class="inline-block mt-6 px-6 py-3 rounded-btn text-white font-semibold text-sm" style="background:#6C63FF;">' + U.t('redeem_go_home') + '</a>' +
          '</section>';
        return;
      }

      /* ── 3. Verificar sesión; redirigir a login si no hay ── */
      var user = API.currentUser();
      if (!user) {
        window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search + window.location.hash));
        return;
      }

      /* ── 4. Estado de carga ── */
      function showLoading() {
        var ls = document.getElementById('loading-screen');
        if (!ls) return;
        ls.style.display = 'flex';
        ls.style.opacity = '1';
        ls.style.pointerEvents = '';
      }

      /* ── 5. Estado éxito ── */
      function showSuccess(r) {
        var isDup  = r.status === 'already_redeemed' || r.status === 'duplicate';
        var isLast = r.complete && !isDup;
        var badge  = r.badge || {};
        var _qp = new URLSearchParams(window.location.search);
        var iconUrl = (r.badge && r.badge.icon_url) || _qp.get('icon_url') || '';
        var badgeIcon = iconUrl
          ? '<img src="' + iconUrl + '" style="width:72px;height:72px;object-fit:contain;display:block;margin:0 auto 12px;" />'
          : '<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#9C8FFF);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">' +
              '<img src="assets/icons/ui/icono-reclamado.png" style="width:44px;height:44px;object-fit:contain;" />' +
            '</div>';
        var user  = API.currentUser() || {};
        var userName = user.name ? user.name.split(' ')[0] : '';

        if (isDup) {
          app.innerHTML =
            '<div style="position:fixed;inset:0;background:rgba(21,23,29,0.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;">' +
              '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:20px;padding:32px 24px;max-width:320px;width:100%;text-align:center;">' +
                '<img src="assets/icons/ui/icono-alerta.png" style="width:48px;height:48px;object-fit:contain;display:block;margin:0 auto 16px;" />' +
                '<h3 style="font-family:Poppins,sans-serif;font-size:18px;font-weight:700;color:#f4f6f9;margin:0 0 8px;">¡Ya tenés este badge!</h3>' +
                '<p style="font-family:Manrope,sans-serif;font-size:14px;color:#8b93a3;margin:0 0 24px;">Ya coleccionaste <strong style="color:#d897e7;">' + U.esc(badge.name) + '</strong>. ¡Buscá otro para seguir sumando XP!</p>' +
                '<div style="display:flex;flex-direction:column;gap:10px;">' +
                  '<button onclick="history.back()" style="width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(180deg,#ec9799,#e68a8d);color:#3a1f20;font-family:Poppins,sans-serif;font-size:15px;font-weight:700;cursor:pointer;">Escanear otro badge</button>' +
                  '<button onclick="window.location.href=\'user-events.html\'" style="width:100%;padding:12px;border-radius:12px;border:1px solid #2f343f;background:transparent;color:#8b93a3;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Ver mis eventos</button>' +
                '</div>' +
              '</div>' +
            '</div>';
          U.hideLoading();
          return;
        }

        var title, subtitle, accentColor, bgGradient;
        if (isLast) {
          title       = U.t('redeem_completed_event');
          subtitle    = U.t('redeem_completed_desc') + (userName ? ', ' + U.esc(userName) : '') + '!';
          accentColor = '#6C63FF';
          bgGradient  = 'linear-gradient(135deg, #EEEDFF 0%, #E0DEFF 100%)';
        } else {
          title       = U.t('redeem_badge_obtained');
          subtitle    = U.esc(badge.desc || badge.name || '');
          accentColor = '#6C63FF';
          bgGradient  = 'linear-gradient(135deg, #EEEDFF 0%, #F0EEFF 100%)';
        }


        var animBlock = '';

        var prizeBlock = (isLast && r.prize)
          ? '<div class="prize-box">' +
              '<p class="prize-label">🎁 ' + U.t('redeem_prize_unlocked') + '</p>' +
              '<p class="prize-text">' + U.esc(r.prize) + '</p>' +
            '</div>'
          : '';

        var progressBlock = '';
        var prog = r.progreso || r.progress;
        if (prog && !isDup) {
          var obtained = prog.obtenidos != null ? prog.obtenidos : prog.obtained;
          var total    = prog.total;
          var pct = total ? Math.round((obtained / total) * 100) : 0;
          progressBlock =
            '<div class="progress-wrap">' +
              '<div class="progress-bar-bg">' +
                '<div class="progress-bar-fill" style="width:' + pct + '%;background:' + accentColor + ';"></div>' +
              '</div>' +
              '<p class="progress-label">' + obtained + ' ' + U.t('redeem_of') + ' ' + total + ' ' + U.t('redeem_badges') + '</p>' +
            '</div>';
        }

        var xpBlock = '';
        if (!isDup) {
          var xpVal = r.xp_gained || r.xp_earned || 0;
          if (xpVal > 0) {
            xpBlock =
              '<div style="text-align:center;width:100%;margin:12px 0;">' +
                '<span style="display:inline-block;padding:6px 20px;border-radius:999px;border:1.5px solid #4ade80;color:#4ade80;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;background:rgba(74,222,128,0.08);">+' + xpVal + ' XP</span>' +
                (r.xp && r.xp.level ? ' <span style="display:inline-block;padding:4px 10px;border-radius:6px;background:#2e323d;color:#f4f6f9;font-family:Poppins,sans-serif;font-size:11px;font-weight:700;">Nv. ' + r.xp.level + '</span>' : '') +
              '</div>';
          }
        }

        var shareUrl  = window.location.origin + '/profile.html';
        var badgeName = badge.name || 'un badge';
        var shareText = 'Acabo de obtener el badge "' + badgeName + '" en Lyfter Badge App. ¡Coleccioná los tuyos!';

        var linkedinUrl = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(shareUrl) + '&summary=' + encodeURIComponent(shareText);

        var hasWebShare = typeof navigator !== 'undefined' && !!navigator.share;

        var shareButtons = !isDup
          ? '<div class="share-section">' +
              '<p class="share-label">Compartir logro</p>' +
              '<div class="share-btns">' +
                '<a href="' + linkedinUrl + '" target="_blank" rel="noopener" class="share-btn linkedin-btn">' +
                  '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' +
                  'LinkedIn' +
                '</a>' +
                '<button id="share-instagram" class="share-btn instagram-btn">' +
                  '<img src="https://liangso420-cell.github.io/Lyfters-Badge-App/assets/icons/ui/Instagram-Logo.png" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:6px;" />' +
                  'Compartir en Instagram' +
                '</button>' +
              '</div>' +
            '</div>'
          : '';

        var styles =
          '<style>' +
          '.redeem-card{background:#1c1f27;border:1px solid #2f343f;border-radius:24px;padding:36px 28px;text-align:center;max-width:360px;margin:0 auto;width:100%;}' +
          '.badge-glow{display:inline-flex;align-items:center;justify-content:center;width:100px;height:100px;border-radius:50%;margin:0 auto 20px;font-size:52px;box-shadow:0 0 0 12px rgba(108,99,255,0.08),0 0 0 24px rgba(108,99,255,0.04);}' +
          '.redeem-title{font-size:22px;font-weight:700;margin-bottom:8px;}' +
          '.redeem-sub{font-size:14px;color:#9CA3AF;margin-bottom:4px;}' +
          '.prize-box{background:linear-gradient(135deg,#EEEDFF,#E0DEFF);border-radius:14px;padding:16px;margin:20px 0;}' +
          '.prize-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6C63FF;margin-bottom:6px;}' +
          '.prize-text{font-size:15px;font-weight:700;color:#1A1A2E;}' +
          '.progress-wrap{margin:16px 0;}' +
          '.progress-bar-bg{height:6px;background:#E5E7EB;border-radius:99px;overflow:hidden;margin-bottom:6px;}' +
          '.progress-bar-fill{height:100%;border-radius:99px;transition:width .6s ease;}' +
          '.progress-label{font-size:12px;color:#9CA3AF;}' +
          '.share-section{margin:20px 0 4px;}' +
          '.share-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#9CA3AF;margin-bottom:12px;}' +
          '.share-btns{display:flex;flex-direction:column;align-items:center;}' +
          '.share-btn{width:100%;max-width:320px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;border-radius:14px;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s;}' +
          '.share-btn:hover{opacity:.85;}' +
          '.linkedin-btn{background:#0A66C2;color:#fff;}' +
          '.instagram-btn{background:linear-gradient(135deg,#833AB4,#FD1D1D,#F77737);color:#fff;}' +
          '.copy-btn{background:#F3F4F6;color:#374151;}' +
          '.redeem-profile-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-top:16px;font-family:inherit;transition:opacity .15s;}' +
          '.redeem-profile-btn:hover{opacity:.9;}' +
          '@keyframes bounceIn{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}' +
          '</style>';

        app.innerHTML =
          styles +
          '<section style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;box-sizing:border-box;background:' + bgGradient + ';">' +
            '<div class="redeem-card anim-pop">' +
              animBlock +
              '<div style="text-align:center;margin-bottom:16px;">' + badgeIcon + '</div>' +
              '<h2 class="redeem-title" style="color:' + accentColor + ';">' + title + '</h2>' +
              '<p class="redeem-sub">' + subtitle + '</p>' +
              xpBlock +
              progressBlock +
              prizeBlock +
              shareButtons +
              '<button id="btn-genial" class="redeem-profile-btn" style="background:' + accentColor + ';">' + U.t('awesome') + '</button>' +
            '</div>' +
          '</section>';

        document.getElementById('btn-genial').addEventListener('click', function () {
          window.location.href = 'user-events.html';
        });

        var igBtn = document.getElementById('share-instagram');
        if (igBtn) {
          igBtn.addEventListener('click', async function () {
            if (navigator.share) {
              try {
                await navigator.share({ title: 'Lyfter Badge', text: shareText, url: shareUrl });
              } catch(e) {}
            } else {
              navigator.clipboard.writeText(shareUrl + ' — ' + shareText).then(function() {
                U.toast('Link copiado al portapapeles', 'success');
              }).catch(function() {
                window.open('https://www.instagram.com/', '_blank');
              });
            }
          });
        }

        var copyBtn = document.getElementById('share-copy');
        if (copyBtn) {
          copyBtn.addEventListener('click', function () {
            navigator.clipboard.writeText(shareUrl + '?badge=' + encodeURIComponent(badgeName))
              .then(function () { U.toast('Link copiado', 'success'); })
              .catch(function () { U.toast('No se pudo copiar', 'error'); });
          });
        }

        if (isLast) {
          setTimeout(function () {
            if (typeof launchConfetti === 'function') launchConfetti();
          }, 300);
        }

        // Feedback de XP y logros (solo en scans nuevos).
        if (!isDup && r.xp && r.xp.gained > 0) {
          U.showXpGain(r.xp.gained, { levelUp: r.xp.levelUp, level: r.xp.level });
        }
        if (!isDup && r.achievements && r.achievements.length) {
          setTimeout(function () {
            U.showAchievementUnlocks(r.achievements, function () {});
          }, 900);
        }
      }

      /* ── 6a. No unido al evento ── */
      function showNotJoined() {
        app.innerHTML =
          '<section class="device-frame px-4 pt-12 pb-12">' +
            '<div class="card-soft p-8 text-center anim-fade">' +
              '<div style="margin-bottom:12px;"><img src="assets/icons/ui/icono-alerta.png" style="width:48px;height:48px;object-fit:contain;"></div>' +
              '<h2 class="text-xl font-bold text-gray-800">Primero únete al evento</h2>' +
              '<p class="text-sm text-gray-500 mt-2">Debes escanear el QR del evento antes de canjear badges.</p>' +
              '<a href="scan.html" class="inline-block mt-6 w-full py-3 rounded-btn text-center font-semibold" style="background:linear-gradient(180deg,#ec9799,#e68a8d);color:#3a1f20;text-decoration:none;">Escanear QR del evento</a>' +
            '</div>' +
          '</section>';
      }

      /* ── 6. Estado error ── */
      function showError(msg) {
        var lower      = (msg || '').toLowerCase();
        var isExpired  = lower.includes('sesión') || lower.includes('expirada') || lower.includes('expired');
        var isInvalid  = lower.includes('badge no encontrado') || lower.includes('inválido') || lower.includes('invalid');
        var isInactive = lower.includes('inactivo') || lower.includes('no encontrado');

        var icon, heading;
        if (isExpired)       { icon = '<img src="assets/icons/ui/icono-candado.png" style="width:48px;height:48px;object-fit:contain;">'; heading = U.t('redeem_session_expired'); }
        else if (isInvalid)  { icon = '❌'; heading = U.t('redeem_invalid_qr'); }
        else if (isInactive) { icon = '📭'; heading = U.t('redeem_event_unavailable'); }
        else                 { icon = '<img src="assets/icons/ui/icono-alerta.png" style="width:48px;height:48px;object-fit:contain;display:block;margin:0 auto 12px;">'; heading = U.t('redeem_could_not'); }

        var primaryBtn = isExpired
          ? '<button id="redeem-relogin" class="mt-6 w-full py-3 rounded-btn text-white font-semibold" style="background:#6C63FF;">' + U.t('redeem_login_again') + '</button>'
          : '<button id="redeem-retry" class="mt-6 w-full py-3 rounded-btn text-white font-semibold" style="background:#6C63FF;">' + U.t('redeem_retry') + '</button>';

        app.innerHTML =
          '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:24px;">' +
            icon +
            '<h2 class="text-xl font-bold text-gray-800">' + heading + '</h2>' +
            '<p class="text-sm text-gray-500 mt-2">' + U.esc(msg) + '</p>' +
            primaryBtn +
            '<button id="redeem-home" class="mt-3 w-full py-3 rounded-btn font-semibold text-primary" style="background:#EEEDFF;">' + U.t('redeem_go_home') + '</button>' +
          '</div>';

        var retryBtn = document.getElementById('redeem-retry');
        if (retryBtn) {
          retryBtn.addEventListener('click', function () { showLoading(); doRedeem(); });
        }

        var reloginBtn = document.getElementById('redeem-relogin');
        if (reloginBtn) {
          reloginBtn.addEventListener('click', function () {
            API.logout();
            window.location.href = 'login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search + window.location.hash);
          });
        }

        document.getElementById('redeem-home').addEventListener('click', function () {
          window.location.href = 'profile.html';
        });
      }

      /* ── 7. Lógica principal ── */
      async function doRedeem() {
        try {
          var result = await API.redeem(params.eventId, params.token);
          U.hideLoading();
          showSuccess(result);
        } catch (err) {
          U.hideLoading();
          if (err.status === 'not_joined') { showNotJoined(); return; }
          var msg = (err && err.message) ? err.message : 'Error inesperado';
          // 401 ya fue manejado por api.js (clearSession + redirect), pero por si acaso:
          if (msg.toLowerCase().includes('sesión') || msg.toLowerCase().includes('expirada')) {
            window.location.href = 'login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search + window.location.hash);
            return;
          }
          showError(msg);
        }
      }

      U.showPendingToast();
      showLoading();
      doRedeem();
    })();
  </script>
  <script>
    window.addEventListener('load', () => {
      const ls = document.getElementById('loading-screen');
      ls.style.opacity = '0';
      ls.style.pointerEvents = 'none';
    });
  </script>
  <script src="js/stars.js"></script>
</body>
</html>
