<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estadísticas del evento — Lyfter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando estadísticas...</span>
  </div>
  <div id="app" style="position:relative;z-index:1;width:100%;max-width:100%;margin:0 auto;padding:24px clamp(16px,4vw,44px) 70px;"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }
    if (['admin','superadmin','god_admin'].indexOf(user.role) === -1) {
      window.location.replace('profile.html'); return;
    }

    var qs = new URLSearchParams(window.location.search);
    var eventId = qs.get('event');
    var eventName = qs.get('name') || 'Evento';
    var app = document.getElementById('app');

    if (!eventId) { window.location.replace('stats.html'); return; }

    async function init() {
      app.innerHTML =
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">' +
          '<button onclick="history.back()" style="width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#f4f6f9;font-size:18px;cursor:pointer;">←</button>' +
          '<h1 style="font-family:Poppins,sans-serif;font-size:20px;font-weight:700;color:#f4f6f9;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + U.esc(eventName) + '</h1>' +
        '</div>' +
        '<div id="stats-container"><p style="color:#8b93a3;text-align:center;padding:32px;">Cargando...</p></div>';

      U.hideLoading();

      try {
        var stats = await fetch(API.base + '/admin/events/' + eventId + '/stats', { headers: API.authHeaders() }).then(r => r.json());
        var participants = stats.participants || stats.participantes || [];
        var badgeStats = (stats.badge_stats || stats.badge_ranking || []).map(function(b) {
          return { name: b.name || b.nombre, count: b.count };
        });
        var hourlyStats = (stats.hourly_scans || stats.actividad_por_hora || []).map(function(h) {
          return { hour: h.hour != null ? h.hour : h.hora, count: h.count };
        });
        var reviews = stats.reviews || {};

        var container = document.getElementById('stats-container');
        container.innerHTML =
          kpiCards([
            { label: 'Participantes', value: participants.length, icon: 'icono-participantes.png', color: '#70cfff' },
            { label: 'Completaron 100%', value: participants.filter(function(p){ return p.progress === 100; }).length, icon: 'icono-reclamado.png', color: '#4ade80' },
            { label: 'Promedio progreso', value: Math.round(participants.reduce(function(a,p){ return a+(p.progress||0); },0)/(participants.length||1)) + '%', icon: 'icono-badges-creados.png', color: '#d897e7' },
          ]) +

          (reviews.total > 0
            ? '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:20px;margin-bottom:16px;">' +
                '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 16px;">Reseñas del evento</h3>' +
                '<div style="text-align:center;margin-bottom:16px;">' +
                  '<div style="font-size:48px;font-weight:800;color:#ffc850;font-family:Poppins,sans-serif;">' + reviews.avg_rating + '</div>' +
                  '<div style="font-size:20px;color:#ffc850;">' + '★'.repeat(Math.round(reviews.avg_rating)) + '☆'.repeat(5 - Math.round(reviews.avg_rating)) + '</div>' +
                  '<div style="font-size:12px;color:#8b93a3;margin-top:4px;">' + reviews.total + ' reseñas</div>' +
                '</div>' +
                chartCard('chart-reviews', 'Distribución de calificaciones') +
              '</div>'
            : '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;color:#8b93a3;font-size:13px;">Sin reseñas aún</div>') +

          (badgeStats.length ? chartCard('chart-badges', 'Badges más escaneados') : '') +
          (hourlyStats.length ? chartCard('chart-hours', 'Hora pico de escaneos') : '') +
          participantsTable(participants) +
          '<button onclick="exportToExcel()" style="width:100%;margin-top:16px;padding:14px;border-radius:12px;border:1px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.1);color:#4ade80;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Exportar a Excel</button>';

        window._statsData = { participants: participants, badgeStats: badgeStats, eventName: eventName };

        setTimeout(function() {
          if (reviews.total > 0) {
            var dist = reviews.distribution || {};
            renderBarChart('chart-reviews',
              ['1★','2★','3★','4★','5★'],
              [dist[1]||0, dist[2]||0, dist[3]||0, dist[4]||0, dist[5]||0],
              '#ffc850');
          }
          if (badgeStats.length) renderBarChart('chart-badges', badgeStats.map(function(b){ return b.name; }), badgeStats.map(function(b){ return b.count; }), '#d897e7');
          if (hourlyStats.length) renderBarChart('chart-hours', hourlyStats.map(function(h){ return h.hour+'h'; }), hourlyStats.map(function(h){ return h.count; }), '#70cfff');
        }, 100);

      } catch(e) {
        document.getElementById('stats-container').innerHTML = '<p style="color:#e68a8d;text-align:center;padding:32px;">Error al cargar estadísticas.</p>';
      }
    }

    window.exportToExcel = function() {
      var data = window._statsData;
      if (!data) return;
      var wb = XLSX.utils.book_new();
      var ws1 = XLSX.utils.aoa_to_sheet(
        [['Nombre','Email','Badges obtenidos','Total badges','Progreso %']].concat(
          data.participants.map(function(p){ return [p.name, p.email, p.badges_obtained, p.total_badges, p.progress+'%']; })
        )
      );
      XLSX.utils.book_append_sheet(wb, ws1, 'Participantes');
      var ws2 = XLSX.utils.aoa_to_sheet(
        [['Badge','Veces escaneado']].concat(data.badgeStats.map(function(b){ return [b.name, b.count]; }))
      );
      XLSX.utils.book_append_sheet(wb, ws2, 'Badges');
      XLSX.writeFile(wb, data.eventName + '_stats.xlsx');
      U.toast('Excel descargado', 'success');
    };

    function kpiCards(items) {
      return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;">' +
        items.map(function(item) {
          return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;text-align:center;">' +
            '<img src="assets/icons/ui/' + item.icon + '" style="width:28px;height:28px;object-fit:contain;margin-bottom:8px;" />' +
            '<div style="font-family:Poppins,sans-serif;font-size:24px;font-weight:800;color:' + item.color + ';">' + item.value + '</div>' +
            '<div style="font-size:12px;color:#8b93a3;margin-top:4px;">' + item.label + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
    }

    function chartCard(id, title) {
      return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:20px;margin-bottom:16px;">' +
        '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 16px;">' + title + '</h3>' +
        '<canvas id="' + id + '" height="200"></canvas>' +
      '</div>';
    }

    function participantsTable(participants) {
      if (!participants.length) return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;color:#8b93a3;font-size:13px;">Sin participantes aún.</div>';
      return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;margin-bottom:16px;overflow-x:auto;">' +
        '<h3 style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin:0 0 12px;">Participantes</h3>' +
        '<table style="width:100%;border-collapse:collapse;font-family:Manrope,sans-serif;font-size:13px;">' +
          '<thead><tr style="border-bottom:1px solid #2f343f;">' +
            '<th style="text-align:left;padding:8px 12px;color:#8b93a3;font-weight:700;">Nombre</th>' +
            '<th style="text-align:center;padding:8px 12px;color:#8b93a3;font-weight:700;">Badges</th>' +
            '<th style="text-align:center;padding:8px 12px;color:#8b93a3;font-weight:700;">Progreso</th>' +
          '</tr></thead>' +
          '<tbody>' +
            participants.map(function(p) {
              var pct = p.progress || 0;
              var color = pct === 100 ? '#4ade80' : pct > 50 ? '#d897e7' : '#8b93a3';
              return '<tr style="border-bottom:1px solid #1a1d24;">' +
                '<td style="padding:10px 12px;color:#f4f6f9;">' + U.esc(p.name||'') + '</td>' +
                '<td style="padding:10px 12px;text-align:center;color:#f4f6f9;">' + (p.badges_obtained||0) + '/' + (p.total_badges||0) + '</td>' +
                '<td style="padding:10px 12px;text-align:center;color:' + color + ';font-weight:700;">' + pct + '%</td>' +
              '</tr>';
            }).join('') +
          '</tbody>' +
        '</table>' +
      '</div>';
    }

    function renderBarChart(id, labels, data, color) {
      var ctx = document.getElementById(id);
      if (!ctx) return;
      new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: color+'66', borderColor: color, borderWidth: 2, borderRadius: 6 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b93a3' }, grid: { color: '#2f343f' } }, y: { ticks: { color: '#8b93a3' }, grid: { color: '#2f343f' } } } }
      });
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
</body>
</html>
