<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil — Lyfter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando perfil...</span>
  </div>
  <div id="app" style="position:relative;z-index:1;width:100%;max-width:100%;margin:0 auto;padding:24px clamp(16px,4vw,44px) 70px;"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }

    var app = document.getElementById('app');

    async function init() {
      var profile = await API.getProfile();
      U.hideLoading();

      var initials = (user.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
      var avatarHtml = user.avatar
        ? '<img src="' + U.esc(user.avatar) + '" style="width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid #d897e7;" />'
        : '<div style="width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#d897e7,#e68a8d);display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;font-size:32px;font-weight:700;color:#1c1f27;">' + initials + '</div>';

      app.innerHTML =
        '<div style="padding:16px 20px 0;display:flex;justify-content:flex-end;">' +
          '<button onclick="history.back()" style="width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#f4f6f9;font-size:18px;cursor:pointer;">←</button>' +
        '</div>' +
        '<div style="padding:24px 20px 28px;text-align:center;display:flex;flex-direction:column;align-items:center;">' +
          avatarHtml +
          '<h2 style="font-family:Poppins,sans-serif;font-size:22px;font-weight:700;color:#f4f6f9;margin:14px 0 4px;">' + U.esc(user.name||'') + '</h2>' +
          '<p style="font-family:Manrope,sans-serif;font-size:13px;color:#8b93a3;margin:0 0 12px;">' + U.esc(user.email||'') + '</p>' +
          '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;background:rgba(216,151,231,0.12);border:1px solid rgba(216,151,231,0.25);">' +
            '<img src="assets/icons/ui/icono-evento.png" style="width:20px;height:20px;object-fit:contain;">' +
            '<span style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#d897e7;">' + (profile.xp_total||0) + ' XP</span>' +
            '<span style="font-size:12px;color:#8b93a3;">· Nv. ' + (profile.level||1) + '</span>' +
          '</div>' +
        '</div>' +

        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;">' +
          btn('profile-stats.html', '<img src="assets/icons/ui/icono-participantes.png" style="width:28px;height:28px;object-fit:contain;">', 'Stats', 'Tus estadísticas', '#70cfff') +
          btn('profile-activity.html', '<img src="assets/icons/ui/icono-calendario-blanco.png" style="width:28px;height:28px;object-fit:contain;">', 'Mi actividad', 'Guardados y eventos', '#d897e7') +
          btn('profile-reviews.html', '<img src="assets/icons/ui/icono-evento.png" style="width:28px;height:28px;object-fit:contain;">', 'Reseñas', 'Tus reseñas enviadas', '#ffc850') +
          btn('profile-achievements.html', '<img src="assets/icons/ui/icono-badges-creados.png" style="width:28px;height:28px;object-fit:contain;">', 'Logros', 'Badges y logros', '#4ade80') +
        '</div>';
    }

    function btn(href, icon, title, subtitle, color) {
      return '<a href="' + href + '" style="background:#1c1f27;border:1px solid #2f343f;border-radius:20px;padding:24px 16px;text-decoration:none;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;cursor:pointer;">' +
        '<span style="font-size:32px;">' + icon + '</span>' +
        '<div style="font-family:Poppins,sans-serif;font-size:15px;font-weight:700;color:#f4f6f9;">' + title + '</div>' +
        '<div style="font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;">' + subtitle + '</div>' +
      '</a>';
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
</body>
</html>
