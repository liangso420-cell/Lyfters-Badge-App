<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="app"></main>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function() {
      'use strict';
      var U = window.LyfterUtils;
      var app = document.getElementById('app');

      var token = new URLSearchParams(window.location.search).get('token');

      if (!token) {
        app.innerHTML =
          '<section class="device-frame px-4 pt-24 text-center">' +
            '<div class="text-5xl mb-4">❌</div>' +
            '<h2 class="text-lg font-bold text-gray-800 mb-2">Enlace inválido</h2>' +
            '<p class="text-sm text-gray-400 mb-4">Este enlace no es válido o ya expiró.</p>' +
            '<a href="login.html" class="px-6 py-3 rounded-btn text-white font-semibold text-sm inline-block" style="background:#6C63FF;">Ir al login</a>' +
          '</section>';
        return;
      }

      app.innerHTML =
        '<section class="device-frame px-4 pt-12 pb-12">' +
          '<div class="card-soft p-8 anim-fade">' +
            '<div class="text-center mb-6">' +
              '<div class="text-4xl mb-2"><img src="assets/icons/ui/icono-candado.png" style="width:18px;height:18px;object-fit:contain;"></div>' +
              '<h2 class="text-2xl font-bold">Nueva contraseña</h2>' +
              '<p class="text-gray-400 text-sm mt-1">Ingresa tu nueva contraseña</p>' +
            '</div>' +
            '<div class="space-y-4">' +
              '<div>' +
                '<label class="text-sm font-medium text-gray-600">Nueva contraseña</label>' +
                '<input id="new-password" type="password" placeholder="Mínimo 6 caracteres" class="w-full mt-1 px-4 py-3 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
              '</div>' +
              '<div>' +
                '<label class="text-sm font-medium text-gray-600">Confirmar contraseña</label>' +
                '<input id="confirm-password" type="password" placeholder="Repite la contraseña" class="w-full mt-1 px-4 py-3 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
              '</div>' +
              '<button id="reset-btn" class="w-full py-3 rounded-btn text-white font-semibold" style="background:#6C63FF;">Restablecer contraseña</button>' +
            '</div>' +
          '</div>' +
        '</section>';

      document.getElementById('reset-btn').addEventListener('click', async function() {
        var btn = this;
        var password = document.getElementById('new-password').value;
        var confirm = document.getElementById('confirm-password').value;

        if (!password || password.length < 6) { U.toast('Mínimo 6 caracteres', 'error'); return; }
        if (password !== confirm) { U.toast('Las contraseñas no coinciden', 'error'); return; }

        btn.disabled = true; btn.textContent = 'Guardando...';
        try {
          var res = await fetch('https://lyfters-badge-app.onrender.com/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, password: password })
          });
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Error');
          U.toast('¡Contraseña actualizada! Inicia sesión', 'success');
          setTimeout(function() { window.location.href = 'login.html'; }, 1500);
        } catch(err) {
          U.toast(err.message || 'No se pudo restablecer', 'error');
          btn.disabled = false; btn.textContent = 'Restablecer contraseña';
        }
      });
    })();
  </script>
  <script src="js/stars.js"></script>
</body>
</html>
