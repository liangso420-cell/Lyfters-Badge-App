<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis reseñas — Lyfter</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando reseñas...</span>
  </div>
  <div id="app" style="position:relative;z-index:1;width:100%;max-width:100%;margin:0 auto;padding:24px clamp(16px,4vw,44px) 70px;"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API.currentUser();
    if (!user) { window.location.replace('login.html'); return; }

    var app = document.getElementById('app');

    async function init() {
      U.hideLoading();

      try {
        var res = await fetch(API.base + '/auth/my-reviews', { headers: API.authHeaders() }).then(r => r.json());
        var reviews = res.reviews || [];
        var labels = {
          recommend: { si:'Sí', no:'No', talvez:'Tal vez' },
          best_part: { organizacion:'Organización', contenido:'Contenido', networking:'Networking', badges:'Badges', otro:'Otro' },
          return_again: { si:'Sí', no:'No', depende:'Depende' }
        };

        var initials = (user.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
        var avatarEl = user.avatar
          ? '<img src="' + U.esc(user.avatar) + '" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(216,151,231,0.4);" />'
          : '<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#d897e7,#e68a8d);display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;font-size:13px;font-weight:800;color:#1c1f27;">' + initials + '</div>';

        app.innerHTML =
          '<div style="display:flex;align-items:center;justify-content:space-between;margin:24px 0 20px;">' +
            '<div style="display:flex;align-items:center;gap:12px;">' +
              '<button onclick="history.back()" style="width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#f4f6f9;font-size:18px;cursor:pointer;">←</button>' +
              '<h1 style="font-family:Poppins,sans-serif;font-size:20px;font-weight:700;color:#f4f6f9;margin:0;">Mis reseñas</h1>' +
            '</div>' +
            '<button id="home-avatar-btn" style="background:none;border:none;cursor:pointer;padding:0;">' + avatarEl + '</button>' +
          '</div>' +
          (reviews.length
            ? reviews.map(function(r) {
                var stars = '★'.repeat(r.rating) + '<span style="color:#2e323d;">' + '★'.repeat(5-r.rating) + '</span>';
                return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:14px;padding:16px;margin-bottom:12px;">' +
                  '<div style="font-family:Poppins,sans-serif;font-size:14px;font-weight:700;color:#f4f6f9;margin-bottom:6px;">' + U.esc(r.event_name||'Evento') + '</div>' +
                  '<div style="font-size:20px;color:#ffc850;margin-bottom:10px;">' + stars + '</div>' +
                  '<div style="display:flex;flex-wrap:wrap;gap:8px;">' +
                    (r.recommend ? pill('¿Recomendaría?', labels.recommend[r.recommend]||r.recommend, '#70cfff') : '') +
                    (r.best_part ? pill('Lo mejor', labels.best_part[r.best_part]||r.best_part, '#d897e7') : '') +
                    (r.return_again ? pill('¿Volvería?', labels.return_again[r.return_again]||r.return_again, '#4ade80') : '') +
                  '</div>' +
                '</div>';
              }).join('')
            : '<div style="text-align:center;padding:48px 24px;">' +
                '<div style="margin-bottom:12px;"><img src="assets/icons/ui/icono-evento.png" style="width:48px;height:48px;object-fit:contain;"></div>' +
                '<p style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#f4f6f9;margin:0 0 8px;">Sin reseñas aún</p>' +
                '<p style="font-family:Manrope,sans-serif;font-size:13px;color:#8b93a3;">Tus reseñas aparecerán aquí.</p>' +
              '</div>');

        var avatarBtn = document.getElementById('home-avatar-btn');
        if (avatarBtn) {
          avatarBtn.addEventListener('click', async function() {
            var _u = API.currentUser();
            U.showDrawer(_u ? _u.avatar : null, _u ? _u.name : null, null, false);
            API.getProfile().then(function(p) {
              if (p.avatar) { var img = document.querySelector('#drawer-panel img'); if (img) img.src = p.avatar; }
            }).catch(function(){});
          });
        }
      } catch(e) {
        app.innerHTML = '<p style="color:#e68a8d;text-align:center;padding:32px;">Error al cargar reseñas.</p>';
      }
    }

    function pill(label, value, color) {
      return '<div style="background:rgba(255,255,255,0.04);border:1px solid #2f343f;border-radius:8px;padding:5px 8px;">' +
        '<div style="font-size:10px;color:#8b93a3;font-weight:700;text-transform:uppercase;">' + label + '</div>' +
        '<div style="font-size:12px;color:' + color + ';font-weight:700;">' + value + '</div>' +
      '</div>';
    }

    setTimeout(function() { U.hideLoading(); }, 6000);
    init();
  })();
  </script>
  <nav class="lyfter-bottom-nav">
    <a href="inicio.html" class="lyfter-nav-item"><i class="bi bi-house-fill"></i><span>Inicio</span></a>
    <a href="profile.html" class="lyfter-nav-item"><i class="bi bi-compass"></i><span>Explorar</span></a>
    <a href="scan.html" class="lyfter-nav-item"><i class="bi bi-qr-code-scan"></i><span>Escanear</span></a>
    <a href="user-events.html" class="lyfter-nav-item"><img src="assets/icons/ui/icono-evento.png" style="width:22px;height:22px;object-fit:contain;opacity:0.5;" class="nav-evento-icon" /><span>Eventos</span></a>
    <a href="profile-new.html" class="lyfter-nav-item active" id="nav-perfil-btn"><div class="lyfter-nav-dot"></div></a>
  </nav>
  <script>
  (function() {
    var API = window.LyfterAPI;
    var U = window.LyfterUtils;
    var user = API && API.currentUser();
    if (!API || !user) return;
    API.getProfile().then(function(profile) {
      var profileAvatar = profile.avatar || (user && user.avatar) || null;
      var initials = (user && user.name ? user.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase() : '?');
      var navAvatar = profileAvatar
        ? '<img src="' + U.esc(profileAvatar) + '" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(216,151,231,0.5);" />'
        : '<div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#d897e7,#e68a8d);display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif;font-size:9px;font-weight:800;color:#1c1f27;">' + initials + '</div>';
      var navPerfilBtn = document.getElementById('nav-perfil-btn');
      if (navPerfilBtn) navPerfilBtn.insertAdjacentHTML('afterbegin', navAvatar);
    }).catch(function() {});
  })();
  </script>
</body>
</html>
