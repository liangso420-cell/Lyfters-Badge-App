<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Lyfter Badge App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { primary: '#6C63FF', 'primary-soft': '#EEEDFF', base: '#F8F9FA' },
          borderRadius: { card: '16px', btn: '8px' },
          boxShadow: { soft: '0 4px 20px rgba(0,0,0,0.08)' },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search)); return; }
      if (user.role !== 'admin') { window.location.replace('profile.html'); return; }

      var app = document.getElementById('app');
      app.innerHTML = U.loadingHtml();

      function metricCard(icon, value, label, color) {
        return '<div class="bg-white rounded-card p-5 shadow-soft flex items-center gap-4">' +
          '<div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl flex-shrink-0" style="background:' + color + '20;">' + icon + '</div>' +
          '<div><p class="text-2xl font-bold text-gray-800">' + value + '</p><p class="text-xs text-gray-500 mt-0.5">' + label + '</p></div>' +
          '</div>';
      }

      function progressBar(item) {
        var pct = Math.min(100, item.porcentaje || 0);
        return '<div class="mb-4">' +
          '<div class="flex justify-between items-center mb-1">' +
            '<span class="text-sm font-medium text-gray-700 truncate max-w-[60%]">' + U.esc(item.nombre) + '</span>' +
            '<span class="text-xs text-primary font-semibold ml-2">' + pct + '%</span>' +
          '</div>' +
          '<div class="w-full h-3 bg-gray-100 rounded-full overflow-hidden">' +
            '<div class="h-3 rounded-full transition-all duration-700" style="width:' + pct + '%; background:#6C63FF;"></div>' +
          '</div>' +
          '<div class="flex justify-between text-xs text-gray-400 mt-1">' +
            '<span>' + item.total_canjeados + ' canjes / ' + item.total_badges + ' badges</span>' +
            '<span>' + item.participantes_unicos + ' participantes</span>' +
          '</div>' +
        '</div>';
      }

      function rolBadge(rol) {
        if (rol === 'admin') return '<span class="px-2 py-0.5 rounded-full text-xs font-medium text-white" style="background:#6C63FF;">Admin</span>';
        return '<span class="px-2 py-0.5 rounded-full text-xs font-medium text-gray-600 bg-gray-100">Participante</span>';
      }

      function fmtDate(iso) {
        if (!iso) return '—';
        try { return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }); }
        catch(e) { return iso; }
      }

      function buildUserRow(u, currentUserId) {
        var isSelf = u.id === currentUserId;
        var nextRol = u.rol === 'admin' ? 'participant' : 'admin';
        var btnLabel = u.rol === 'admin' ? '→ Participante' : '→ Admin';
        var disabledAttr = isSelf ? ' disabled' : '';
        var disabledClass = isSelf ? ' opacity-40 cursor-not-allowed' : ' hover:bg-gray-50';
        return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">' +
          '<td class="py-3 pr-4 font-medium text-gray-800">' + U.esc(u.nombre) + (isSelf ? ' <span class="text-xs text-gray-400">(tú)</span>' : '') + '</td>' +
          '<td class="py-3 pr-4 text-sm text-gray-500 hidden sm:table-cell">' + U.esc(u.email) + '</td>' +
          '<td class="py-3 pr-4">' + rolBadge(u.rol) + '</td>' +
          '<td class="py-3 pr-4 text-xs text-gray-400 hidden md:table-cell">' + fmtDate(u.created_at) + '</td>' +
          '<td class="py-3">' +
            '<button data-uid="' + u.id + '" data-rol="' + nextRol + '" data-nombre="' + U.esc(u.nombre) + '" data-btnlabel="' + U.esc(btnLabel) + '"' + disabledAttr +
              ' class="role-btn px-3 py-1.5 rounded-btn text-xs font-medium border border-gray-200 text-gray-600' + disabledClass + '">' +
              btnLabel +
            '</button>' +
          '</td>' +
        '</tr>';
      }

      function buildLbRow(entry, rank) {
        var medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        var avatarHtml = entry.avatar
          ? '<img src="' + entry.avatar + '" class="w-8 h-8 rounded-full object-cover border border-gray-200" />'
          : '<div class="w-8 h-8 rounded-full bg-primary-soft flex items-center justify-center text-sm">👤</div>';
        return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">' +
          '<td class="py-3 pr-4 text-center text-sm w-8">' + medal + '</td>' +
          '<td class="py-3 pr-4"><div class="flex items-center gap-2">' + avatarHtml + '<span class="text-sm font-medium text-gray-800">' + U.esc(entry.nombre) + '</span></div></td>' +
          '<td class="py-3 text-sm font-bold text-primary text-right">' + entry.badges + ' 🏅</td>' +
        '</tr>';
      }

      async function init() {
        try {
          var [events, dash, usersList, leaderboard] = await Promise.all([
            API.listAdminEvents(),
            API.getDashboard(),
            API.getUsers(),
            API.getLeaderboard()
          ]);

          var activeId = U.ensureActive(events);

          var metrics =
            '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">' +
              metricCard('👥', dash.total_participantes,    'Participantes',     '#6C63FF') +
              metricCard('🎪', dash.total_eventos,          'Eventos',           '#43D9AD') +
              metricCard('🏅', dash.total_badges_creados,   'Badges creados',    '#FF8C42') +
              metricCard('✅', dash.total_badges_canjeados, 'Badges canjeados',  '#16a34a') +
            '</div>';

          var progreso = dash.progreso_por_evento && dash.progreso_por_evento.length
            ? '<div class="bg-white rounded-card p-6 shadow-soft mb-6">' +
                '<h3 class="font-bold text-gray-800 mb-4">Progreso por evento</h3>' +
                dash.progreso_por_evento.map(progressBar).join('') +
              '</div>'
            : '';

          var allUsers = usersList || [];

          var usersHtml;
          if (!allUsers.length) {
            usersHtml = '<p class="text-sm text-gray-400 text-center py-6">Sin usuarios registrados.</p>';
          } else {
            var rows = allUsers.map(function(u) { return buildUserRow(u, user.id); }).join('');
            usersHtml =
              '<div class="mb-3">' +
                '<input id="user-search" type="text" placeholder="Buscar por nombre o email..." ' +
                  'class="w-full px-4 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm" />' +
              '</div>' +
              '<div class="overflow-x-auto">' +
                '<table class="w-full text-sm">' +
                  '<thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100">' +
                    '<th class="py-3 pr-4 font-medium">Nombre</th>' +
                    '<th class="py-3 pr-4 font-medium hidden sm:table-cell">Email</th>' +
                    '<th class="py-3 pr-4 font-medium">Rol</th>' +
                    '<th class="py-3 pr-4 font-medium hidden md:table-cell">Registro</th>' +
                    '<th class="py-3 font-medium">Cambiar rol</th>' +
                  '</tr></thead>' +
                  '<tbody id="users-tbody">' + rows + '</tbody>' +
                '</table>' +
              '</div>';
          }

          var lbHtml = leaderboard.length
            ? '<table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100">' +
                '<th class="py-3 pr-4 w-8">#</th><th class="py-3 pr-4">Usuario</th><th class="py-3 text-right">Badges</th>' +
              '</tr></thead><tbody>' +
              leaderboard.map(function(e, i) { return buildLbRow(e, i + 1); }).join('') +
              '</tbody></table>'
            : '<p class="text-sm text-gray-400 text-center py-6">Sin datos todavía.</p>';

          var inner =
            '<div class="anim-fade">' +
              metrics +
              progreso +
              '<div class="bg-white rounded-card p-6 shadow-soft">' +
                '<div class="flex gap-2 mb-5">' +
                  '<button id="admin-tab-users" class="tab-btn flex-1 py-2 rounded-btn text-sm font-medium text-white" style="background:#6C63FF;">Usuarios</button>' +
                  '<button id="admin-tab-lb" class="tab-btn flex-1 py-2 rounded-btn text-sm font-medium text-gray-500 bg-gray-100">Clasificación</button>' +
                '</div>' +
                '<div id="admin-panel-users">' + usersHtml + '</div>' +
                '<div id="admin-panel-lb" style="display:none;">' + lbHtml + '</div>' +
              '</div>' +
            '</div>';

          app.innerHTML = U.adminShell('participation', inner, events, activeId);
          U.mountAdminShell();

          document.getElementById('admin-tab-users').addEventListener('click', function() {
            document.getElementById('admin-panel-users').style.display = '';
            document.getElementById('admin-panel-lb').style.display = 'none';
            document.getElementById('admin-tab-users').style.background = '#6C63FF';
            document.getElementById('admin-tab-users').style.color = 'white';
            document.getElementById('admin-tab-lb').style.background = '';
            document.getElementById('admin-tab-lb').style.color = '';
            document.getElementById('admin-tab-lb').className = 'tab-btn flex-1 py-2 rounded-btn text-sm font-medium text-gray-500 bg-gray-100';
          });
          document.getElementById('admin-tab-lb').addEventListener('click', function() {
            document.getElementById('admin-panel-users').style.display = 'none';
            document.getElementById('admin-panel-lb').style.display = '';
            document.getElementById('admin-tab-lb').style.background = '#6C63FF';
            document.getElementById('admin-tab-lb').style.color = 'white';
            document.getElementById('admin-tab-users').style.background = '';
            document.getElementById('admin-tab-users').style.color = '';
            document.getElementById('admin-tab-users').className = 'tab-btn flex-1 py-2 rounded-btn text-sm font-medium text-gray-500 bg-gray-100';
          });

          Array.prototype.forEach.call(document.querySelectorAll('.role-btn'), function(btn) {
            btn.addEventListener('click', function() {
              var uid = btn.getAttribute('data-uid');
              var rol = btn.getAttribute('data-rol');
              var nombre = btn.getAttribute('data-nombre');
              var rolLabel = rol === 'admin' ? 'Admin' : 'Participante';
              U.showConfirm(
                '¿Cambiar el rol de ' + nombre + ' a ' + rolLabel + '?',
                async function() {
                  btn.disabled = true;
                  btn.textContent = '...';
                  try {
                    await API.changeUserRole(uid, rol);
                    U.toast('Rol de ' + nombre + ' actualizado a ' + rolLabel, 'success');
                    init();
                  } catch(err) {
                    U.toast(err.message || 'No se pudo cambiar el rol', 'error');
                    btn.disabled = false;
                    btn.textContent = btn.getAttribute('data-btnlabel');
                  }
                },
                null,
                { confirmLabel: 'Cambiar', danger: false }
              );
            });
          });

          var searchInput = document.getElementById('user-search');
          if (searchInput) {
            searchInput.addEventListener('input', function() {
              var q = searchInput.value.trim().toLowerCase();
              var filtered = q
                ? allUsers.filter(function(u) {
                    return u.nombre.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
                  })
                : allUsers;
              var tbody = document.getElementById('users-tbody');
              if (tbody) {
                tbody.innerHTML = filtered.length
                  ? filtered.map(function(u) { return buildUserRow(u, user.id); }).join('')
                  : '<tr><td colspan="5" class="py-6 text-center text-sm text-gray-400">Sin resultados para "' + U.esc(q) + '"</td></tr>';
                Array.prototype.forEach.call(tbody.querySelectorAll('.role-btn'), function(btn) {
                  btn.addEventListener('click', function() {
                    var uid = btn.getAttribute('data-uid');
                    var rol = btn.getAttribute('data-rol');
                    var nombre = btn.getAttribute('data-nombre');
                    var rolLabel = rol === 'admin' ? 'Admin' : 'Participante';
                    U.showConfirm(
                      '¿Cambiar el rol de ' + nombre + ' a ' + rolLabel + '?',
                      async function() {
                        btn.disabled = true; btn.textContent = '...';
                        try {
                          await API.changeUserRole(uid, rol);
                          U.toast('Rol de ' + nombre + ' actualizado a ' + rolLabel, 'success');
                          init();
                        } catch(err) {
                          U.toast(err.message || 'No se pudo cambiar el rol', 'error');
                          btn.disabled = false;
                          btn.textContent = btn.getAttribute('data-btnlabel');
                        }
                      },
                      null,
                      { confirmLabel: 'Cambiar', danger: false }
                    );
                  });
                });
              }
            });
          }

        } catch (err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
        window.scrollTo(0, 0);
      }

      init();
    })();
  </script>
</body>
</html>
