<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Lyfter Badge App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { primary: '#6C63FF', 'primary-soft': '#EEEDFF', base: '#F8F9FA' },
          borderRadius: { card: '16px', btn: '8px' },
          boxShadow: { soft: '0 4px 20px rgba(0,0,0,0.08)' },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search)); return; }
      if (user.role !== 'admin') { window.location.replace('profile.html'); return; }

      var app = document.getElementById('app');
      app.innerHTML = U.loadingHtml();

      function metricCard(icon, value, label, color) {
        return '<div class="bg-white rounded-card p-5 shadow-soft flex items-center gap-4">' +
          '<div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl flex-shrink-0" style="background:' + color + '20;">' + icon + '</div>' +
          '<div><p class="text-2xl font-bold text-gray-800">' + value + '</p><p class="text-xs text-gray-500 mt-0.5">' + label + '</p></div>' +
          '</div>';
      }

      function progressBar(item) {
        var pct = Math.min(100, item.porcentaje || 0);
        return '<div class="mb-4">' +
          '<div class="flex justify-between items-center mb-1">' +
            '<span class="text-sm font-medium text-gray-700 truncate max-w-[60%]">' + U.esc(item.nombre) + '</span>' +
            '<span class="text-xs text-primary font-semibold ml-2">' + pct + '%</span>' +
          '</div>' +
          '<div class="w-full h-3 bg-gray-100 rounded-full overflow-hidden">' +
            '<div class="h-3 rounded-full transition-all duration-700" style="width:' + pct + '%; background:#6C63FF;"></div>' +
          '</div>' +
          '<div class="flex justify-between text-xs text-gray-400 mt-1">' +
            '<span>' + item.total_canjeados + ' canjes / ' + item.total_badges + ' badges</span>' +
            '<span>' + item.participantes_unicos + ' participantes</span>' +
          '</div>' +
        '</div>';
      }

      function buildLbRow(entry, rank) {
        var medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        var avatarHtml = entry.avatar
          ? '<img src="' + entry.avatar + '" class="w-8 h-8 rounded-full object-cover border border-gray-200" />'
          : '<div class="w-8 h-8 rounded-full bg-primary-soft flex items-center justify-center text-sm">👤</div>';
        return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">' +
          '<td class="py-3 pr-4 text-center text-sm w-8">' + medal + '</td>' +
          '<td class="py-3 pr-4"><div class="flex items-center gap-2">' + avatarHtml + '<span class="text-sm font-medium text-gray-800">' + U.esc(entry.nombre) + '</span></div></td>' +
          '<td class="py-3 text-sm font-bold text-primary text-right">' + entry.badges + ' 🏅</td>' +
        '</tr>';
      }

      async function init() {
        try {
          var [events, dash, leaderboard] = await Promise.all([
            API.listAdminEvents(),
            API.getDashboard(),
            API.getLeaderboard()
          ]);

          var activeId = U.ensureActive(events);

          var metrics =
            '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">' +
              metricCard('👥', dash.total_participantes,    'Participantes',     '#6C63FF') +
              metricCard('🎪', dash.total_eventos,          'Eventos',           '#43D9AD') +
              metricCard('🏅', dash.total_badges_creados,   'Badges creados',    '#FF8C42') +
              metricCard('✅', dash.total_badges_canjeados, 'Badges canjeados',  '#16a34a') +
            '</div>';

          var progreso = dash.progreso_por_evento && dash.progreso_por_evento.length
            ? '<div class="bg-white rounded-card p-6 shadow-soft mb-6">' +
                '<h3 class="font-bold text-gray-800 mb-4">Progreso por evento</h3>' +
                dash.progreso_por_evento.map(progressBar).join('') +
              '</div>'
            : '';

          var lbHtml = leaderboard.length
            ? '<table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100">' +
                '<th class="py-3 pr-4 w-8">#</th><th class="py-3 pr-4">Usuario</th><th class="py-3 text-right">Badges</th>' +
              '</tr></thead><tbody>' +
              leaderboard.map(function(e, i) { return buildLbRow(e, i + 1); }).join('') +
              '</tbody></table>'
            : '<p class="text-sm text-gray-400 text-center py-6">Sin datos todavía.</p>';

          var statsSection =
            '<div class="bg-white rounded-card p-6 shadow-soft mb-6">' +
              '<h3 class="font-bold text-gray-800 mb-4">📊 Estadísticas por evento</h3>' +
              '<select id="stats-event-select" class="w-full px-4 py-2.5 bg-base rounded-btn border border-gray-200 focus:border-primary outline-none text-sm mb-4">' +
                '<option value="">Selecciona un evento...</option>' +
                events.map(function(e) { return '<option value="' + e.id + '">' + U.esc(e.name) + '</option>'; }).join('') +
              '</select>' +
              '<div id="event-stats-content"></div>' +
            '</div>';

          var inner =
            '<div class="anim-fade">' +
              metrics +
              progreso +
              statsSection +
              '<div class="bg-white rounded-card p-6 shadow-soft">' +
                '<h3 class="font-bold text-gray-800 mb-4">Clasificación</h3>' +
                lbHtml +
              '</div>' +
            '</div>';

          app.innerHTML = U.adminShell('participation', inner, events, activeId);
          U.mountAdminShell();
          Array.prototype.forEach.call(document.querySelectorAll('p, h1, h2, h3, h4, button, label, span:not(.text-primary):not(.text-white)'), function(el) {
            if (el.children.length === 0 && el.textContent.trim()) { el.setAttribute('data-i18n', ''); }
          });
          if (U.getCurrentLang() !== 'es') U.translatePage();

          var statsSelect = document.getElementById('stats-event-select');
          if (statsSelect) {
            statsSelect.addEventListener('change', async function() {
              var eid = statsSelect.value;
              var content = document.getElementById('event-stats-content');
              if (!eid) { content.innerHTML = ''; return; }
              content.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">Cargando estadísticas...</div>';
              try {
                var s = await API.getEventStats(eid);

                var distTotal = Object.values(s.progreso_distribucion).reduce(function(a,b){ return a+b; }, 0) || 1;
                var distBars = ['0-25','26-50','51-75','76-100'].map(function(k) {
                  var val = s.progreso_distribucion[k] || 0;
                  var pct = Math.round(val / distTotal * 100);
                  return '<div class="flex items-center gap-2 mb-2">' +
                    '<span class="text-xs text-gray-500 w-16">' + k + '%</span>' +
                    '<div class="flex-1 h-4 bg-gray-100 rounded-full overflow-hidden">' +
                      '<div class="h-4 rounded-full" style="width:' + pct + '%; background:#6C63FF;"></div>' +
                    '</div>' +
                    '<span class="text-xs text-gray-500 w-8 text-right">' + val + '</span>' +
                  '</div>';
                }).join('');

                var medals = ['🥇','🥈','🥉'];
                var badgeRankHtml = s.badge_ranking.slice(0,5).map(function(b, i) {
                  return '<div class="flex items-center gap-3 py-2 border-b border-gray-100 last:border-0">' +
                    '<span class="text-lg w-6">' + (medals[i] || (i+1)) + '</span>' +
                    '<span class="text-xl">' + (b.icon||'🏅') + '</span>' +
                    '<span class="flex-1 text-sm text-gray-700">' + U.esc(b.nombre) + '</span>' +
                    '<span class="text-sm font-bold text-primary">' + b.count + '</span>' +
                  '</div>';
                }).join('') || '<p class="text-xs text-gray-400 text-center py-2">Sin datos</p>';

                var topUsersHtml = s.top_usuarios.slice(0,5).map(function(u, i) {
                  var avatarEl = u.avatar
                    ? '<img src="' + u.avatar + '" class="w-7 h-7 rounded-full object-cover" />'
                    : '<div class="w-7 h-7 rounded-full bg-primary-soft flex items-center justify-center text-xs">👤</div>';
                  return '<div class="flex items-center gap-2 py-2 border-b border-gray-100 last:border-0">' +
                    '<span class="text-xs text-gray-400 w-4">' + (i+1) + '</span>' +
                    avatarEl +
                    '<span class="flex-1 text-sm text-gray-700">' + U.esc(u.nombre) + '</span>' +
                    '<span class="text-sm font-bold text-primary">' + u.badges + ' 🏅</span>' +
                  '</div>';
                }).join('') || '<p class="text-xs text-gray-400 text-center py-2">Sin datos</p>';

                var actividadHtml = s.actividad_por_hora.length
                  ? (function() {
                      var maxCount = s.actividad_por_hora.reduce(function(m,a){ return Math.max(m, a.count); }, 1);
                      return s.actividad_por_hora.map(function(a) {
                        var barH = Math.max(8, Math.round(a.count / maxCount * 60));
                        return '<div class="flex flex-col items-center gap-1">' +
                          '<span class="text-xs text-gray-500">' + a.count + '</span>' +
                          '<div class="w-6 rounded-t" style="height:' + barH + 'px; background:#6C63FF; opacity:0.8;"></div>' +
                          '<span class="text-xs text-gray-400">' + a.hora + 'h</span>' +
                        '</div>';
                      }).join('');
                    })()
                  : '<p class="text-xs text-gray-400 text-center py-2">Sin datos de actividad</p>';

                content.innerHTML =
                  '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">' +
                    '<div class="bg-base rounded-card p-4 text-center"><p class="text-2xl font-bold text-primary">' + s.participantes_activos + '</p><p class="text-xs text-gray-500 mt-1">Participantes activos</p></div>' +
                    '<div class="bg-base rounded-card p-4 text-center"><p class="text-2xl font-bold text-green-600">' + s.completaron + '</p><p class="text-xs text-gray-500 mt-1">Completaron evento</p></div>' +
                    '<div class="bg-base rounded-card p-4 text-center"><p class="text-2xl font-bold text-orange-500">' + s.total_canjeados + '</p><p class="text-xs text-gray-500 mt-1">Badges canjeados</p></div>' +
                    '<div class="bg-base rounded-card p-4 text-center"><p class="text-2xl font-bold text-purple-600">' + s.pct_completaron + '%</p><p class="text-xs text-gray-500 mt-1">Tasa completación</p></div>' +
                  '</div>' +
                  '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">' +
                    '<div class="bg-base rounded-card p-4">' +
                      '<p class="text-sm font-semibold text-gray-700 mb-3">📈 Distribución de progreso</p>' +
                      distBars +
                    '</div>' +
                    '<div class="bg-base rounded-card p-4">' +
                      '<p class="text-sm font-semibold text-gray-700 mb-3">✅ Finalización</p>' +
                      '<div class="flex items-center gap-3 mb-2">' +
                        '<div class="flex-1 h-4 bg-gray-100 rounded-full overflow-hidden">' +
                          '<div class="h-4 rounded-full bg-green-500" style="width:' + s.pct_completaron + '%;"></div>' +
                        '</div>' +
                        '<span class="text-xs text-green-600 font-bold">' + s.pct_completaron + '%</span>' +
                      '</div>' +
                      '<div class="flex justify-between text-xs text-gray-500">' +
                        '<span>✅ ' + s.completaron + ' completaron</span>' +
                        '<span>❌ ' + s.no_completaron + ' no completaron</span>' +
                      '</div>' +
                    '</div>' +
                  '</div>' +
                  '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">' +
                    '<div class="bg-base rounded-card p-4">' +
                      '<p class="text-sm font-semibold text-gray-700 mb-3">🏆 Badges más obtenidos</p>' +
                      badgeRankHtml +
                    '</div>' +
                    '<div class="bg-base rounded-card p-4">' +
                      '<p class="text-sm font-semibold text-gray-700 mb-3">👥 Top participantes</p>' +
                      topUsersHtml +
                    '</div>' +
                  '</div>' +
                  (s.actividad_por_hora.length
                    ? '<div class="bg-base rounded-card p-4">' +
                        '<p class="text-sm font-semibold text-gray-700 mb-3">⏰ Actividad por hora</p>' +
                        '<div class="flex items-end gap-1 h-20">' + actividadHtml + '</div>' +
                      '</div>'
                    : '');

              } catch(err) {
                content.innerHTML = '<p class="text-sm text-red-400 text-center py-4">Error: ' + U.esc(err.message) + '</p>';
              }
            });
          }

        } catch (err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
        window.scrollTo(0, 0);
      }

      init();
    })();
  </script>
</body>
</html>
