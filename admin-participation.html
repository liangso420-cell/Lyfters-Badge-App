<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/dotlottie-web.js"></script>
  <script>
    // DotLottie se expone como variable global
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof DotLottie !== 'undefined') window.DotLottie = DotLottie;
    });
  </script>
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando...</span>
  </div>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search)); return; }
      if (user.role !== 'admin') { window.location.replace('profile.html'); return; }

      var app = document.getElementById('app');

      function metricCard(iconPath, value, label, color) {
        return '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;">' +
          '<div style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:' + color + '22;">' +
            '<img src="' + iconPath + '" style="width:28px;height:28px;object-fit:contain;" />' +
          '</div>' +
          '<div>' +
            '<p style="font-family:Poppins,sans-serif;font-size:26px;font-weight:700;color:#f4f6f9;margin:0;">' + value + '</p>' +
            '<p style="font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;margin:2px 0 0;">' + label + '</p>' +
          '</div>' +
        '</div>';
      }

      function progressBar(item) {
        var pct = Math.min(100, item.porcentaje || 0);
        return '<div style="margin-bottom:18px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
            '<span style="font-family:Manrope,sans-serif;font-size:14px;font-weight:600;color:#f4f6f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%;">' + U.esc(item.nombre) + '</span>' +
            '<span style="font-family:Poppins,sans-serif;font-size:13px;font-weight:700;color:#d897e7;margin-left:8px;">' + pct + '%</span>' +
          '</div>' +
          '<div style="width:100%;height:10px;background:#2e323d;border-radius:999px;overflow:hidden;">' +
            '<div style="height:10px;border-radius:999px;background:linear-gradient(90deg,#d897e7,#e68a8d);width:' + pct + '%;transition:width .7s;"></div>' +
          '</div>' +
          '<div style="display:flex;justify-content:space-between;font-family:Manrope,sans-serif;font-size:11px;color:#8b93a3;margin-top:4px;">' +
            '<span>' + item.total_canjeados + ' canjes / ' + item.total_badges + ' badges</span>' +
            '<span>' + item.participantes_unicos + ' participantes</span>' +
          '</div>' +
        '</div>';
      }

      async function init() {
        try {
          var [events, dash] = await Promise.all([
            API.listAdminEvents(),
            API.getDashboard()
          ]);
          var activeId = U.ensureActive(events);

          var metrics =
            '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;">' +
              metricCard('assets/icons/ui/icono-participantes.png',  dash.total_participantes,    U.t('admin_participants'),    '#6C63FF') +
              metricCard('assets/icons/ui/icono-evento.png',         dash.total_eventos,          U.t('admin_events'),          '#43D9AD') +
              metricCard('assets/icons/ui/icono-badges-creados.png', dash.total_badges_creados,   U.t('admin_badges_created'),  '#FF8C42') +
              metricCard('assets/icons/ui/icono-reclamado.png',      dash.total_badges_canjeados, U.t('admin_badges_redeemed'), '#16a34a') +
            '</div>';

          var recentEvents = events.slice(0, 5);
          var eventProgressHtml = recentEvents.map(function(e) {
            var item = (dash.progreso_por_evento || []).find(function(p) { return p.nombre === e.name; }) || {};
            var pct = Math.min(100, item.porcentaje || 0);
            return progressBar({ nombre: e.name, porcentaje: pct, total_canjeados: item.total_canjeados || 0, total_badges: item.total_badges || 0, participantes_unicos: item.participantes_unicos || 0 });
          }).join('');

          var inner =
            '<div class="anim-fade">' +
              metrics +
              '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:18px;padding:24px;margin-bottom:20px;">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">' +
                  '<h3 style="font-family:Poppins,sans-serif;font-size:18px;font-weight:700;color:#f4f6f9;margin:0;">Progreso por evento</h3>' +
                '</div>' +
                '<div style="position:relative;margin-bottom:16px;">' +
                  '<span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">🔍</span>' +
                  '<input id="progress-search" type="text" placeholder="Buscar evento..." style="width:100%;height:44px;padding:0 18px 0 44px;background:#2e323d;border:1px solid #353a46;border-radius:10px;color:#f4f6f9;font-family:Manrope,sans-serif;font-size:14px;outline:none;box-sizing:border-box;" />' +
                '</div>' +
                '<div id="progress-list">' + eventProgressHtml + '</div>' +
              '</div>' +
            '</div>';

          app.innerHTML = U.adminShell('participation', inner, events, activeId);
          U.mountAdminShell();
          U.hideLoading();

          var progressSearch = document.getElementById('progress-search');
          if (progressSearch) {
            progressSearch.addEventListener('input', function() {
              var q = progressSearch.value.trim().toLowerCase();
              var filtered = q
                ? events.filter(function(e) { return e.name.toLowerCase().includes(q); })
                : events.slice(0, 5);
              var list = document.getElementById('progress-list');
              if (!list) return;
              if (!filtered.length) {
                list.innerHTML = '<p style="color:#8b93a3;text-align:center;padding:16px;font-family:Manrope,sans-serif;font-size:14px;">Sin resultados</p>';
                return;
              }
              list.innerHTML = filtered.map(function(e) {
                var item = (dash.progreso_por_evento || []).find(function(p) { return p.nombre === e.name; }) || {};
                var pct = Math.min(100, item.porcentaje || 0);
                return progressBar({ nombre: e.name, porcentaje: pct, total_canjeados: item.total_canjeados || 0, total_badges: item.total_badges || 0, participantes_unicos: item.participantes_unicos || 0 });
              }).join('');
            });
          }

        } catch(err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          U.hideLoading();
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
        window.scrollTo(0, 0);
      }

      setTimeout(U.hideLoading, 6000);
      init();
    })();
  </script>
  <script src="js/stars.js"></script>
  <script src="js/particles.js"></script>
</body>
</html>
