services:
  - type: web
    name: lyfter-badge-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: lyfter_badges
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXP_HOURS
        value: "24"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
