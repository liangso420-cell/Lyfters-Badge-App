<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unirse al evento — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div id="app" class="rounded-card p-8 w-full max-w-sm text-center" style="background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);">
    <div class="text-4xl mb-4">🎪</div>
    <p class="text-gray-400 text-sm">Cargando...</p>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (function() {
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;
      var app = document.getElementById('app');
      var params  = new URLSearchParams(window.location.search);
      var eventId = params.get('event');
      var wsToken = params.get('token');
      var wsCode  = params.get('code');

      // ── Flujo workspace invite ──────────────────────────────
      if (wsToken || wsCode) {
        var user = API.currentUser();
        if (!user) {
          var next = encodeURIComponent(window.location.pathname + window.location.search);
          app.innerHTML =
            '<div class="text-4xl mb-4">🏢</div>' +
            '<h2 class="text-xl font-bold mb-2" style="color:#f4f6f9;">Fuiste invitado</h2>' +
            '<p class="text-gray-400 text-sm mb-6">Necesitás una cuenta para aceptar la invitación.</p>' +
            '<a href="register.html?invite_token=' + encodeURIComponent(wsToken||'') + '&invite_code=' + encodeURIComponent(wsCode||'') + '" class="w-full py-3 rounded-btn font-semibold block text-center mb-3" style="background:linear-gradient(180deg,#ec9799,#e68a8d);color:#3a1f20;text-decoration:none;">Crear cuenta y unirme</a>' +
            '<a href="login.html?next=' + next + '" class="text-sm text-center block" style="color:#8b93a3;text-decoration:none;">Ya tengo cuenta — Iniciar sesión</a>';
          return;
        }
        app.innerHTML =
          '<div class="text-4xl mb-4">🏢</div>' +
          '<h2 class="text-xl font-bold mb-2" style="color:#f4f6f9;">Fuiste invitado a un workspace</h2>' +
          '<p class="text-gray-400 text-sm mb-6">Aceptá la invitación para unirte.</p>' +
          '<button id="btn-join-ws" class="w-full py-3 rounded-btn font-semibold" style="background:linear-gradient(180deg,#ec9799,#e68a8d);color:#3a1f20;border:none;cursor:pointer;font-size:16px;">Unirme al workspace</button>';
        document.getElementById('btn-join-ws').addEventListener('click', async function() {
          var btn = this;
          btn.disabled = true; btn.textContent = 'Procesando...';
          try {
            var body = {};
            if (wsToken) body.token = wsToken;
            if (wsCode)  body.code  = wsCode;
            var res = await fetch(API.base + '/workspaces/join', {
              method: 'POST',
              headers: Object.assign({}, API.authHeaders(), {'Content-Type': 'application/json'}),
              body: JSON.stringify(body)
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Error');
            app.innerHTML =
              '<div class="text-5xl mb-4">🎉</div>' +
              '<h2 class="text-xl font-bold mb-2" style="color:#f4f6f9;">¡Bienvenido a ' + (data.workspace || 'el workspace') + '!</h2>' +
              '<p class="text-gray-400 text-sm mb-6">Rol: ' + (data.role || '') + '</p>' +
              '<a href="profile.html" class="w-full py-3 rounded-btn font-semibold block text-center" style="background:#6C63FF;color:#fff;text-decoration:none;">Ir al perfil</a>';
          } catch(e) {
            app.innerHTML =
              '<div class="text-4xl mb-4">⚠️</div>' +
              '<p class="text-gray-400 mb-4">' + (e.message || 'Error') + '</p>' +
              '<a href="profile.html" class="text-sm" style="color:#6C63FF;">← Volver al perfil</a>';
          }
        });
        return;
      }

      // ── Flujo evento (QR de acceso) ────────────────────────
      if (!eventId) {
        app.innerHTML = '<div class="text-4xl mb-4">❌</div><p class="text-gray-600">QR inválido.</p>';
        return;
      }

      var user = API.currentUser();
      if (!user) {
        window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search));
        return;
      }

      API.joinEvent(eventId).then(function(r) {
        var msg = r.status === 'already_joined' ? 'Ya estás registrado en este evento.' : '¡Te uniste al evento!';
        app.innerHTML =
          '<div class="text-5xl mb-4">🎉</div>' +
          '<h2 class="text-xl font-bold mb-2" style="color:#6C63FF;">' + msg + '</h2>' +
          '<p class="text-gray-500 text-sm mb-6">' + (r.event ? (r.event.name || r.event.nombre || '') : '') + '</p>' +
          '<button id="go-profile" class="w-full py-3 rounded-btn text-white font-semibold" style="background:#6C63FF;">Ver mis badges</button>';
        document.getElementById('go-profile').addEventListener('click', function() {
          window.LyfterUtils.setActiveId(eventId);
          window.location.href = 'profile.html';
        });
      }).catch(function(err) {
        app.innerHTML =
          '<div class="text-4xl mb-4">⚠️</div>' +
          '<p class="text-gray-600 mb-4">' + (err.message || 'No se pudo unir al evento') + '</p>' +
          '<a href="profile.html" class="text-sm" style="color:#6C63FF;">← Volver al perfil</a>';
      });
    })();
  </script>
  <script src="js/stars.js"></script>
  <script src="js/particles.js"></script>
</body>
</html>
