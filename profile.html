<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorar — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando...</span>
  <div id="server-wakeup-notice" style="display:none;margin-top:16px;font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;text-align:center;max-width:240px;">
    <img src="assets/icons/ui/reloj-de-arena.png" style="width:32px;height:32px;object-fit:contain;display:block;margin:0 auto 6px;opacity:0.7;" />
    El servidor está despertando...<br>Esto puede tardar hasta 1 minuto.
  </div>
  </div>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search)); return; }
      if (['admin','superadmin','god_admin'].indexOf(user.role) !== -1) { window.location.replace('workspace-select.html'); return; }

      var app = document.getElementById('app');

      function fmtDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }); }
        catch(e) { return ''; }
      }

      function navHtml() {
        return '<a href="landing.html" style="display:inline-flex;align-items:center;gap:6px;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;color:#8b93a3;text-decoration:none;margin-bottom:10px;padding:4px 8px;border-radius:8px;transition:color .15s;" onmouseover="this.style.color=\'#d897e7\'" onmouseout="this.style.color=\'#8b93a3\'">← Inicio</a>' +
        '<div style="display:flex;gap:4px;margin-bottom:24px;background:#1c1f27;border:1px solid #2f343f;border-radius:12px;padding:4px;">' +
          '<a href="profile.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:700;background:linear-gradient(135deg,rgba(216,151,231,0.3),rgba(230,138,141,0.2));color:#f4f6f9;">Explorar</a>' +
          '<a href="user-events.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Eventos</a>' +
          '<a href="scan.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Escanear</a>' +
          '<a href="user-achievements.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Logros</a>' +
          '<a href="user-ranking.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Ranking</a>' +
        '</div>';
      }

      async function init() {
        try {
          var profile = await API.getProfile();
          var events = await API.listEvents();
          var recommended = await API.getRecommended().catch(function() { return []; });

          var avatarHtml = profile.avatar
            ? '<img src="' + U.esc(profile.avatar) + '" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(216,151,231,0.5);">'
            : '<img src="assets/icons/ui/icono-perfil.png" style="width:40px;height:40px;border-radius:50%;object-fit:contain;background:#2e323d;padding:6px;">';

          var recommendedIds = recommended.map(function(e) { return e.id; });
          var otherEvents = events.filter(function(e) { return recommendedIds.indexOf(e.id) === -1; });

          function eventCard(e, isRecommended) {
            var photoHtml = e.photo
              ? '<div style="position:relative;height:180px;overflow:hidden;border-radius:16px 16px 0 0;"><img src="' + U.esc(e.photo) + '" style="width:100%;height:100%;object-fit:cover;" /></div>'
              : '<div style="height:180px;border-radius:16px 16px 0 0;background:linear-gradient(120deg,#d897e7 0%,#e68a8d 60%,#ffcb8a 100%);display:flex;align-items:center;justify-content:center;"><img src="assets/icons/ui/icono-evento.png" style="width:60px;height:60px;object-fit:contain;filter:brightness(0) invert(1);opacity:0.7;"></div>';

            var statusColors = { upcoming: '#3b82f6', open: '#16a34a', ongoing: '#6C63FF', closed: '#d97706', postponed: '#9333ea' };
            var statusLabels = { upcoming: 'Próximo', open: 'Abierto', ongoing: 'En curso', closed: 'Registro cerrado', postponed: 'Pospuesto' };
            var statusColor = statusColors[e.status] || '#6C63FF';
            var statusLabel = statusLabels[e.status] || e.status;

            return '<div data-eid="' + e.id + '" class="event-card" style="background:#1c1f27;border:1px solid #2f343f;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform=\'translateY(-2px)\'" onmouseout="this.style.transform=\'none\'">' +
              photoHtml +
              '<div style="padding:16px;">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
                  '<span style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;color:white;background:' + statusColor + ';">' + statusLabel + '</span>' +
                  (isRecommended ? '<span style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;background:rgba(216,151,231,0.2);color:#d897e7;">✨ Para ti</span>' : '') +
                '</div>' +
                '<h3 style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#f4f6f9;margin:0 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + U.esc(e.name) + '</h3>' +
                (e.description ? '<p style="font-family:Manrope,sans-serif;font-size:12px;color:#8b93a3;margin:0 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + U.esc(e.description) + '</p>' : '') +
                '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">' +
                  '<span style="font-size:11px;color:#8b93a3;font-family:Manrope,sans-serif;display:flex;align-items:center;"><img src="assets/icons/ui/icono-calendario-blanco.png" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;margin-right:4px;filter:brightness(0) invert(0.5);"> ' + fmtDate(e.start) + (e.end ? ' — ' + fmtDate(e.end) : '') + '</span>' +
                  (e.location ? '<span style="font-size:11px;color:#8b93a3;font-family:Manrope,sans-serif;display:flex;align-items:center;gap:3px;"><img src="assets/icons/ui/icono-ubicacion.png" style="width:14px;height:14px;object-fit:contain;opacity:0.7;"> ' + U.esc(e.location) + '</span>' : '') +
                '</div>' +
                (e.tags && e.tags.length ? '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">' + e.tags.slice(0,3).map(function(tag) { return '<span style="font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid #353a46;color:#8b93a3;font-family:Manrope,sans-serif;">' + U.esc(tag) + '</span>'; }).join('') + '</div>' : '') +
              '</div>' +
            '</div>';
          }

          var inner =
            '<div style="min-height:100vh;padding:20px 16px 40px;">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
                '<div>' +
                  '<p style="font-family:Manrope,sans-serif;font-size:13px;color:#8b93a3;margin:0;">Bienvenido,</p>' +
                  '<h2 style="font-family:Poppins,sans-serif;font-size:22px;font-weight:700;color:#f4f6f9;margin:0;">' + U.esc(profile.nombre || user.name) + '</h2>' +
                '</div>' +
                '<button id="profile-menu-btn" style="background:transparent;border:none;cursor:pointer;padding:0;">' + avatarHtml + '</button>' +
              '</div>' +
              navHtml() +
              '<div style="position:relative;margin-bottom:20px;">' +
                '<img src="assets/icons/ui/lupa.png" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;object-fit:contain;opacity:0.5;">' +
                '<input id="events-search" type="text" placeholder="Buscar eventos..." style="width:100%;height:48px;padding:0 18px 0 44px;background:#1c1f27;border:1px solid #2f343f;border-radius:12px;color:#f4f6f9;font-family:Manrope,sans-serif;font-size:14px;outline:none;box-sizing:border-box;" />' +
              '</div>' +
              (recommended.length
                ? '<h3 style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#f4f6f9;margin:0 0 12px;">Recomendados para ti</h3>' +
                  '<div id="recommended-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));gap:16px;margin-bottom:24px;">' +
                    recommended.map(function(e) { return eventCard(e, true); }).join('') +
                  '</div>'
                : '') +
              '<h3 style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#f4f6f9;margin:0 0 12px;">Todos los eventos</h3>' +
              '<div id="all-events-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));gap:16px;">' +
                (otherEvents.length
                  ? otherEvents.map(function(e) { return eventCard(e, false); }).join('')
                  : '<p style="color:#8b93a3;font-family:Manrope,sans-serif;">No hay más eventos disponibles.</p>') +
              '</div>' +
            '</div>';

          app.innerHTML = inner;

          document.getElementById('profile-menu-btn').addEventListener('click', async function() {
            try {
              var p = await API.getProfile();
              U.showDrawer(p.avatar, p.nombre, null, false);
            } catch(e) { U.showDrawer(null, null, null, false); }
          });

          var searchInput = document.getElementById('events-search');
          if (searchInput) {
            searchInput.addEventListener('input', function() {
              var q = searchInput.value.trim().toLowerCase();
              Array.prototype.forEach.call(document.querySelectorAll('.event-card'), function(card) {
                var eid = card.getAttribute('data-eid');
                var ev = events.concat(recommended).find(function(e) { return e.id === eid; });
                if (!ev) return;
                var match = !q || ev.name.toLowerCase().includes(q) || (ev.tags || []).join(' ').toLowerCase().includes(q);
                card.style.display = match ? '' : 'none';
              });
            });
          }

          Array.prototype.forEach.call(document.querySelectorAll('.event-card'), function(card) {
            card.addEventListener('click', function() {
              var eid = card.getAttribute('data-eid');
              if (eid) window.location.href = 'event-detail.html?id=' + eid;
            });
          });

        } catch(err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
        window.scrollTo(0, 0);
      }

      init();
    })();
  </script>
  <script>
    window.addEventListener('load', () => {
      const ls = document.getElementById('loading-screen');
      ls.style.opacity = '0';
      ls.style.pointerEvents = 'none';
    });
  </script>
</body>
</html>
