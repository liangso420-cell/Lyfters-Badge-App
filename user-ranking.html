<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking — Lyfter Badge App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="loading-screen">
    <img src="assets/icons/ui/logo-lyfter.jpeg" alt="Lyfter" />
    <div class="loader"></div>
    <span>Cargando...</span>
  </div>
  <main id="app"></main>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stars.js"></script>
  <script>
    (function () {
      'use strict';
      var API = window.LyfterAPI;
      var U   = window.LyfterUtils;

      var user = API.currentUser();
      if (!user) { window.location.replace('login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search)); return; }
      if (user.role === 'admin') { window.location.replace('admin-event.html'); return; }

      var app = document.getElementById('app');
      app.innerHTML = U.loadingHtml();

      function navHtml() {
        return '<div style="display:flex;gap:4px;margin-bottom:24px;background:#1c1f27;border:1px solid #2f343f;border-radius:12px;padding:4px;">' +
          '<a href="profile.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Explorar</a>' +
          '<a href="user-events.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Mis Eventos</a>' +
          '<a href="scan.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Escanear</a>' +
          '<a href="user-achievements.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Logros</a>' +
          '<a href="user-ranking.html" style="flex:1;padding:8px 4px;border-radius:8px;text-decoration:none;text-align:center;font-family:Manrope,sans-serif;font-size:12px;font-weight:700;background:linear-gradient(135deg,rgba(216,151,231,0.3),rgba(230,138,141,0.2));color:#f4f6f9;">Ranking</a>' +
        '</div>';
      }

      function buildTable(data, currentUserId) {
        if (!data.length) return '<p style="color:#8b93a3;font-family:Manrope,sans-serif;text-align:center;padding:32px;">Sin datos todavía.</p>';
        var medals = ['🥇', '🥈', '🥉'];
        return '<table style="width:100%;border-collapse:collapse;">' +
          '<thead>' +
            '<tr style="border-bottom:1px solid #2f343f;">' +
              '<th style="padding:12px 8px;text-align:left;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;letter-spacing:.1em;">#</th>' +
              '<th style="padding:12px 8px;text-align:left;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;letter-spacing:.1em;">Usuario</th>' +
              '<th style="padding:12px 8px;text-align:right;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;letter-spacing:.1em;">Badges</th>' +
            '</tr>' +
          '</thead>' +
          '<tbody>' +
            data.map(function(entry, i) {
              var rank = medals[i] || '<span style="color:#8b93a3;font-weight:700;">' + (i + 1) + '</span>';
              var isSelf = entry.user_id === currentUserId || entry.id === currentUserId;
              var avatarHtml = entry.avatar
                ? '<img src="' + U.esc(entry.avatar) + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid #2f343f;" />'
                : '<img src="assets/icons/ui/icono-perfil.png" style="width:36px;height:36px;border-radius:50%;object-fit:contain;background:#2e323d;padding:4px;" />';
              return '<tr style="border-bottom:1px solid #2f343f;' + (isSelf ? 'background:rgba(216,151,231,0.08);' : (i < 3 ? 'background:rgba(216,151,231,0.04);' : '')) + '">' +
                '<td style="padding:14px 8px;font-size:18px;text-align:left;">' + rank + '</td>' +
                '<td style="padding:14px 8px;">' +
                  '<div style="display:flex;align-items:center;gap:10px;">' +
                    avatarHtml +
                    '<div>' +
                      '<p style="font-family:Poppins,sans-serif;font-size:14px;font-weight:' + (isSelf ? '700' : '600') + ';color:' + (isSelf ? '#d897e7' : '#f4f6f9') + ';margin:0;">' +
                        U.esc(entry.nombre || entry.name || '') + (isSelf ? ' <span style="font-size:11px;color:#d897e7;">(tú)</span>' : '') +
                      '</p>' +
                      (entry.email ? '<p style="font-family:Manrope,sans-serif;font-size:11px;color:#8b93a3;margin:2px 0 0;">' + U.esc(entry.email) + '</p>' : '') +
                    '</div>' +
                  '</div>' +
                '</td>' +
                '<td style="padding:14px 8px;text-align:right;font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#d897e7;">' + (entry.badges || 0) + '</td>' +
              '</tr>';
            }).join('') +
          '</tbody>' +
        '</table>';
      }

      async function init() {
        try {
          var [leaderboard, xpLeaderboard] = await Promise.all([
            API.getLeaderboard(),
            API.getXpLeaderboard()
          ]);
          var top8 = leaderboard.slice(0, 8);
          var top8xp = xpLeaderboard.slice(0, 8);

          function buildBadgeTable(data) {
            if (!data.length) return '<p style="color:#8b93a3;text-align:center;padding:32px;font-family:Manrope,sans-serif;">Sin datos todavía.</p>';
            return '<table style="width:100%;border-collapse:collapse;">' +
              '<thead><tr style="border-bottom:1px solid #2f343f;">' +
                '<th style="padding:12px 8px;text-align:left;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;">#</th>' +
                '<th style="padding:12px 8px;text-align:left;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;">Usuario</th>' +
                '<th style="padding:12px 8px;text-align:right;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;">Badges</th>' +
              '</tr></thead><tbody>' +
              data.map(function(entry, i) {
                var medals = ['🥇','🥈','🥉'];
                var rank = medals[i] || (i+1);
                var avatarHtml = entry.avatar
                  ? '<img src="' + entry.avatar + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">'
                  : '<img src="assets/icons/ui/icono-perfil.png" style="width:36px;height:36px;border-radius:50%;object-fit:contain;background:#2e323d;padding:4px;">';
                var isMe = user && entry.id === user.id;
                return '<tr style="border-bottom:1px solid #2f343f;' + (i < 3 ? 'background:rgba(216,151,231,0.04);' : '') + (isMe ? 'background:rgba(108,99,255,0.08);' : '') + '">' +
                  '<td style="padding:14px 8px;font-size:18px;">' + rank + '</td>' +
                  '<td style="padding:14px 8px;"><div style="display:flex;align-items:center;gap:10px;">' + avatarHtml +
                    '<p style="font-family:Poppins,sans-serif;font-size:14px;font-weight:600;color:#f4f6f9;margin:0;">' + U.esc(entry.nombre) + (isMe ? ' <span style="font-size:11px;color:#d897e7;">(tú)</span>' : '') + '</p>' +
                  '</div></td>' +
                  '<td style="padding:14px 8px;text-align:right;font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#d897e7;">' + entry.badges + '</td>' +
                '</tr>';
              }).join('') + '</tbody></table>';
          }

          function buildXpTable(data) {
            if (!data.length) return '<p style="color:#8b93a3;text-align:center;padding:32px;font-family:Manrope,sans-serif;">Sin datos todavía.</p>';
            return '<table style="width:100%;border-collapse:collapse;">' +
              '<thead><tr style="border-bottom:1px solid #2f343f;">' +
                '<th style="padding:12px 8px;text-align:left;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;">#</th>' +
                '<th style="padding:12px 8px;text-align:left;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;">Usuario</th>' +
                '<th style="padding:12px 8px;text-align:center;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;">Nivel</th>' +
                '<th style="padding:12px 8px;text-align:right;font-family:Manrope,sans-serif;font-size:11px;font-weight:700;color:#8b93a3;">XP Total</th>' +
              '</tr></thead><tbody>' +
              data.map(function(entry, i) {
                var medals = ['🥇','🥈','🥉'];
                var rank = medals[i] || (i+1);
                var avatarHtml = entry.avatar
                  ? '<img src="' + entry.avatar + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">'
                  : '<img src="assets/icons/ui/icono-perfil.png" style="width:36px;height:36px;border-radius:50%;object-fit:contain;background:#2e323d;padding:4px;">';
                var isMe = user && entry.id === user.id;
                return '<tr style="border-bottom:1px solid #2f343f;' + (i < 3 ? 'background:rgba(216,151,231,0.04);' : '') + (isMe ? 'background:rgba(108,99,255,0.08);' : '') + '">' +
                  '<td style="padding:14px 8px;font-size:18px;">' + rank + '</td>' +
                  '<td style="padding:14px 8px;"><div style="display:flex;align-items:center;gap:10px;">' + avatarHtml +
                    '<p style="font-family:Poppins,sans-serif;font-size:14px;font-weight:600;color:#f4f6f9;margin:0;">' + U.esc(entry.nombre) + (isMe ? ' <span style="font-size:11px;color:#d897e7;">(tú)</span>' : '') + '</p>' +
                  '</div></td>' +
                  '<td style="padding:14px 8px;text-align:center;">' +
                    '<span style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;background:rgba(216,151,231,0.15);color:#d897e7;">Lv. ' + (entry.level || 1) + '</span>' +
                  '</td>' +
                  '<td style="padding:14px 8px;text-align:right;font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#d897e7;">' + (entry.xp || 0) + ' XP</td>' +
                '</tr>';
              }).join('') + '</tbody></table>';
          }

          var inner =
            '<div style="display:flex;gap:4px;margin-bottom:24px;background:#1c1f27;border:1px solid #2f343f;border-radius:12px;padding:4px;">' +
              '<button class="nav-tab" data-page="explore" style="flex:1;padding:8px 4px;border-radius:8px;border:none;cursor:pointer;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Explorar</button>' +
              '<button class="nav-tab" data-page="my-events" style="flex:1;padding:8px 4px;border-radius:8px;border:none;cursor:pointer;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Mis Eventos</button>' +
              '<button class="nav-tab" data-page="scan" style="flex:1;padding:8px 4px;border-radius:8px;border:none;cursor:pointer;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Escanear</button>' +
              '<button class="nav-tab" data-page="achievements" style="flex:1;padding:8px 4px;border-radius:8px;border:none;cursor:pointer;font-family:Manrope,sans-serif;font-size:12px;font-weight:600;background:transparent;color:#8b93a3;">Logros</button>' +
              '<button class="nav-tab active-tab" data-page="ranking" style="flex:1;padding:8px 4px;border-radius:8px;border:none;cursor:pointer;font-family:Manrope,sans-serif;font-size:12px;font-weight:700;background:linear-gradient(135deg,rgba(216,151,231,0.3),rgba(230,138,141,0.2));color:#f4f6f9;">Ranking</button>' +
            '</div>' +
            '<div style="background:#1c1f27;border:1px solid #2f343f;border-radius:18px;overflow:hidden;">' +
              '<div style="display:flex;border-bottom:1px solid #2f343f;">' +
                '<button id="tab-leaderboard" style="flex:1;padding:16px;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;background:linear-gradient(90deg,rgba(216,151,231,0.18),rgba(230,138,141,0.10));color:#f4f6f9;border-bottom:2px solid #d897e7;">Leaderboard</button>' +
                '<button id="tab-ranking" style="flex:1;padding:16px;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;background:transparent;color:#8b93a3;border-bottom:2px solid transparent;">Ranking Global</button>' +
              '</div>' +
              '<div style="padding:20px;">' +
                '<div id="panel-leaderboard">' + buildBadgeTable(top8) + '</div>' +
                '<div id="panel-ranking" style="display:none;">' + buildXpTable(top8xp) + '</div>' +
              '</div>' +
            '</div>';

          app.innerHTML = inner;

          Array.prototype.forEach.call(document.querySelectorAll('.nav-tab'), function(tab) {
            tab.addEventListener('click', function() {
              var page = tab.getAttribute('data-page');
              if (page === 'ranking') return;
              if (page === 'explore') window.location.href = 'profile.html';
              if (page === 'my-events') window.location.href = 'user-events.html';
              if (page === 'scan') window.location.href = 'scan.html';
              if (page === 'achievements') window.location.href = 'user-achievements.html';
            });
          });

          document.getElementById('tab-leaderboard').addEventListener('click', function() {
            document.getElementById('panel-leaderboard').style.display = '';
            document.getElementById('panel-ranking').style.display = 'none';
            this.style.background = 'linear-gradient(90deg,rgba(216,151,231,0.18),rgba(230,138,141,0.10))';
            this.style.color = '#f4f6f9';
            this.style.borderBottom = '2px solid #d897e7';
            document.getElementById('tab-ranking').style.background = 'transparent';
            document.getElementById('tab-ranking').style.color = '#8b93a3';
            document.getElementById('tab-ranking').style.borderBottom = '2px solid transparent';
          });

          document.getElementById('tab-ranking').addEventListener('click', function() {
            document.getElementById('panel-ranking').style.display = '';
            document.getElementById('panel-leaderboard').style.display = 'none';
            this.style.background = 'linear-gradient(90deg,rgba(216,151,231,0.18),rgba(230,138,141,0.10))';
            this.style.color = '#f4f6f9';
            this.style.borderBottom = '2px solid #d897e7';
            document.getElementById('tab-leaderboard').style.background = 'transparent';
            document.getElementById('tab-leaderboard').style.color = '#8b93a3';
            document.getElementById('tab-leaderboard').style.borderBottom = '2px solid transparent';
          });

        } catch(err) {
          app.innerHTML = U.errorHtml(err && err.message ? err.message : 'Error inesperado');
          var retry = document.getElementById('err-retry');
          if (retry) retry.addEventListener('click', init);
        }
      }

      init();
    })();
  </script>
  <script>
    window.addEventListener('load', () => {
      const ls = document.getElementById('loading-screen');
      ls.style.opacity = '0';
      ls.style.pointerEvents = 'none';
    });
  </script>
  <script src="js/particles.js"></script>
</body>
</html>
